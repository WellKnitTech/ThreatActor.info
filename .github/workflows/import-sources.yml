name: Automated Source Imports

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '21 3 * * 1'
  workflow_dispatch:
    inputs:
      source:
        description: 'Optional single source key'
        required: false
        type: string
      limit:
        description: 'Optional source record limit for supported fetchers'
        required: false
        type: string

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2.5'
        bundler-cache: true

    - name: Run automated source imports
      env:
        SOURCE: ${{ github.event.inputs.source || '' }}
        LIMIT: ${{ github.event.inputs.limit || '' }}
      run: |
        args=(--apply --date "$(date -u +%F)")
        if [ -n "$SOURCE" ]; then
          args+=(--source "$SOURCE")
        fi
        if [ -n "$LIMIT" ]; then
          args+=(--limit "$LIMIT")
        fi
        ruby scripts/import-automated-sources.rb "${args[@]}"

    - name: Build site
      run: bundle exec jekyll build --safe

    - name: Open import pull request
      if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if git diff --quiet; then
          echo "No source import changes detected."
          exit 0
        fi

        branch="automated/source-imports-${GITHUB_RUN_ID}"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -b "$branch"
        git add _data/actors _threat_actors _data/generated _malware api
        git commit -m "Automate source imports"
        git push -u origin "$branch"
        gh pr create \
          --base main \
          --head "$branch" \
          --title "Automated source imports" \
          --body "Automated source import refresh generated by the scheduled import workflow."
