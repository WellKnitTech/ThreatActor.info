# Builds with this repo's Gemfile (Jekyll 4.x). Do not use actions/jekyll-build-pages@v1:
# that image ships github-pages/Jekyll 3.x and conflicts with Gemfile.lock.
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.5"
          bundler-cache: true

      - name: Install gems
        run: bundle install

      - name: Generate pages
        run: ruby scripts/generate-pages.rb --force

      - name: Generate indexes
        run: ruby scripts/generate-indexes.rb

      - name: Build Jekyll site
        run: bundle exec jekyll build --safe --destination _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
