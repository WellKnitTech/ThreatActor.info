---
name: Weekly Threat Data

on:
  # Weekly on Sunday at 3am UTC
  schedule:
    - cron: '0 3 * * 0'
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main for script changes
  push:
    branches:
      - main
    paths:
      - 'scripts/**'

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          
      - name: Install dependencies
        run: bundle install
          
      - name: Fetch MISP reference data
        run: ruby scripts/fetch-misp-references.rb
        continue-on-error: true
          
      - name: Fetch MITRE ATT&CK
        run: ruby scripts/import-mitre.rb --write 2>&1 || echo "MITRE skipped"
        continue-on-error: true
          
      - name: Fetch MISP threat actors
        run: |
          ruby scripts/import-misp-galaxy.rb fetch --output data/imports/misp-galaxy/$(date +%Y-%m-%d) 2>&1 || echo "MISP skipped"
        continue-on-error: true
          
      - name: Fetch CISA KEV
        run: ruby scripts/import-cisa-kev.rb fetch 2>&1 || echo "CISA skipped"
        continue-on-error: true
          
      - name: Map CISA CVEs to actors
        run: ruby scripts/import-cisa-kev.rb map 2>&1 || echo "CISA map skipped"
        continue-on-error: true
          
      - name: Generate pages
        run: ruby scripts/generate-pages.rb --force
        continue-on-error: true
          
      - name: Validate content
        run: ruby scripts/validate-content.rb
        continue-on-error: true
          
      - name: Build site
        run: bundle exec jekyll build --safe
        continue-on-error: true
          
      - name: Commit data changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Weekly threat data update ($(date +'%Y-%m-%d'))"
        continue-on-error: true
          
      - name: Push changes
        run: git push
        continue-on-error: true