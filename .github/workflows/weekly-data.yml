---
name: Weekly Auto Import

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'schemas/**'
      - '.github/workflows/weekly-data.yml'

permissions:
  contents: write
  pull-requests: write
  pages: read

jobs:
  auto-import:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.5'
          bundler-cache: true
          
      - name: Capture actor baseline
        run: |
          mkdir -p tmp/delta-baseline
          cp -R _data/actors tmp/delta-baseline/actors

      - name: Configure import branch
        run: |
          RUN_DATE=$(date -u +%Y-%m-%d)
          BRANCH_NAME="automation/weekly-auto-import-${RUN_DATE}"
          echo "RUN_DATE=${RUN_DATE}" >> "$GITHUB_ENV"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> "$GITHUB_ENV"
          git checkout -B "$BRANCH_NAME"

      - name: Fetch MISP reference data
        run: ruby scripts/fetch-misp-references.rb
        continue-on-error: true
          
      - name: Fetch MITRE ATT&CK
        run: ruby scripts/import-mitre.rb --write
          
      - name: Fetch MISP threat actors
        run: |
          ruby scripts/import-misp-galaxy.rb fetch --output "data/imports/misp-galaxy/${RUN_DATE}"
        continue-on-error: true
          
      - name: Fetch ETDA ThaiCERT
        run: |
          ruby scripts/import-etda-thaicert.rb fetch --output "data/imports/etda-thaicert/${RUN_DATE}"
        continue-on-error: true
          
      - name: Fetch Malpedia enrichment data
        run: |
          ruby scripts/import-malpedia.rb fetch --output "data/imports/malpedia/${RUN_DATE}" --no-details
        continue-on-error: true
          
      - name: Fetch APT Groups & Operations
        run: |
          ruby scripts/import-apt-groups-operations.rb fetch --output "data/imports/apt-groups-operations/${RUN_DATE}"
        continue-on-error: true
          
      - name: Fetch APTnotes references
        run: |
          ruby scripts/import-aptnotes.rb fetch --output "data/imports/aptnotes/${RUN_DATE}"
        continue-on-error: true
          
      - name: Enrich existing actors from MISP (additive updates only)
        run: |
          SNAPSHOT="data/imports/misp-galaxy/${RUN_DATE}"
          if [ -d "$SNAPSHOT" ]; then
            ruby scripts/import-misp-galaxy.rb import --snapshot "$SNAPSHOT" --new-only --report-json "tmp/misp-galaxy-report.json"
          fi
        continue-on-error: true
          
      - name: Enrich existing actors from ETDA (additive updates only)
        run: |
          SNAPSHOT="data/imports/etda-thaicert/${RUN_DATE}"
          if [ -d "$SNAPSHOT" ]; then
            ruby scripts/import-etda-thaicert.rb import --snapshot "$SNAPSHOT" --new-only --report-json "tmp/etda-thaicert-report.json"
          fi
        continue-on-error: true
          
      - name: Enrich from Malpedia
        run: |
          SNAPSHOT="data/imports/malpedia/${RUN_DATE}"
          if [ -d "$SNAPSHOT" ]; then
            ruby scripts/import-malpedia.rb import --snapshot "$SNAPSHOT" --report-json "tmp/malpedia-report.json"
          fi
        continue-on-error: true
          
      - name: Enrich from APT Groups & Operations
        run: |
          SNAPSHOT="data/imports/apt-groups-operations/${RUN_DATE}"
          if [ -d "$SNAPSHOT" ]; then
            ruby scripts/import-apt-groups-operations.rb import --snapshot "$SNAPSHOT" --report-json "tmp/apt-groups-operations-report.json"
          fi
        continue-on-error: true
          
      - name: Enrich from APTnotes
        run: |
          SNAPSHOT="data/imports/aptnotes/${RUN_DATE}"
          if [ -d "$SNAPSHOT" ]; then
            ruby scripts/import-aptnotes.rb import --snapshot "$SNAPSHOT" --report-json "tmp/aptnotes-report.json"
          fi
        continue-on-error: true
          
      - name: Fetch CISA KEV
        run: ruby scripts/import-cisa-kev.rb fetch
          
      - name: Map CISA CVEs to actors
        run: ruby scripts/import-cisa-kev.rb map
          
      - name: Backfill source attribution
        run: ruby scripts/backfill-source-attribution.rb
        continue-on-error: true

      - name: Evaluate source deltas
        run: |
          ruby scripts/evaluate-source-deltas.rb \
            --current _data/actors \
            --previous tmp/delta-baseline/actors \
            --report-json tmp/source-delta-report.json \
            --max-change-ratio 0.10 \
            --max-identity-change-ratio 0.02
          
      - name: Validate content and build
        run: bash scripts/validate.sh
          
      - name: Commit data changes
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Weekly threat data import (${RUN_DATE})"
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi
          
      - name: Push changes
        if: steps.commit.outputs.changes == 'true'
        run: git push --set-upstream origin "$BRANCH_NAME"

      - name: Open import pull request
        if: steps.commit.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ env.BRANCH_NAME }}
          base: main
          draft: true
          title: "Weekly threat data import (${{ env.RUN_DATE }})"
          body: |
            Automated weekly source import.

            Validation performed:
            - `ruby scripts/evaluate-source-deltas.rb`
            - `bash scripts/validate.sh`
          labels: automated-import