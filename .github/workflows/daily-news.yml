---
name: Daily Security News

on:
  # Daily at 2am UTC for news
  schedule:
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pages: read

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.5'
          bundler-cache: true
          
      - name: Install dependencies
        run: bundle install
          
      - name: Capture actor baseline
        run: |
          mkdir -p tmp/delta-baseline
          cp -R _data/actors tmp/delta-baseline/actors

      # News changes constantly - needs daily
      - name: Fetch security news
        run: ruby scripts/fetch-news.rb
          
      - name: Generate pages
        run: ruby scripts/generate-pages.rb --force

      - name: Generate API indexes
        run: ruby scripts/generate-indexes.rb

      - name: Evaluate source deltas
        run: |
          ruby scripts/evaluate-source-deltas.rb \
            --current _data/actors \
            --previous tmp/delta-baseline/actors \
            --report-json tmp/source-delta-report.json \
            --max-change-ratio 0.10 \
            --max-identity-change-ratio 0.02

      - name: Validate content
        run: ruby scripts/validate-content.rb

      - name: Validate JSON schemas
        run: ruby scripts/validate-json-schemas.rb

      - name: Build site
        run: bundle exec jekyll build --safe

      - name: Validate built API JSON
        run: |
          ruby -e "require 'json'; Dir.glob('_site/api/**/*.json').each { |path| JSON.parse(File.read(path)) }"
          
      - name: Commit news changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Daily news update ($(date +'%Y-%m-%d'))"
          
      - name: Push changes
        run: git push
        continue-on-error: true