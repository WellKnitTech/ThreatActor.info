<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  {{ site.seo_tag }}
  <script>
    // Check for saved theme preference or default to dark
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
      }
    })();
  </script>
</head>
<body>
  <header>
    <h1>{{ site.title }}</h1>
    <nav>
      <ul>
        <li><a href="{{ site.baseurl }}/">Home</a></li>
        <li><a href="{{ site.baseurl }}/threat-actors">Threat Actors</a></li>
      </ul>
    </nav>
    <div class="header-controls">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
        <span class="toggle-icon">☀️</span>
      </button>
    </div>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>&copy; {{ "now" | date: "%Y" }} {{ site.title }}</p>
  </footer>
  <script>
    (function() {
      const toggleBtn = document.getElementById('theme-toggle');
      const toggleIcon = toggleBtn.querySelector('.toggle-icon');
      
      // Set initial icon based on current theme
      if (document.documentElement.classList.contains('light-theme')) {
        toggleIcon.textContent = '🌙';
      } else {
        toggleIcon.textContent = '☀️';
      }
      
      toggleBtn.addEventListener('click', function() {
        const isLight = document.documentElement.classList.toggle('light-theme');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        toggleIcon.textContent = isLight ? '🌙' : '☀️';
      });
    })();
    
    // IOC Copy Functionality
    (function() {
      // Find all IOC blocks in the content
      const iocBlocks = document.querySelectorAll('.ioc-block');
      
      iocBlocks.forEach(function(block) {
        // Get the IOC value(s) from the block
        const codeElement = block.querySelector('code');
        const liElements = block.querySelectorAll('li');
        
        let iocValue = '';
        if (codeElement) {
          iocValue = codeElement.textContent.trim();
        } else if (liElements.length > 0) {
          iocValue = Array.from(liElements).map(li => li.textContent.trim()).join('\n');
        }
        
        if (!iocValue) return;
        
        // Create copy button
        const copyBtn = document.createElement('button');
        copyBtn.className = 'ioc-copy-btn';
        copyBtn.textContent = 'Copy';
        copyBtn.title = 'Click to copy IOC';
        
        copyBtn.addEventListener('click', function(e) {
          e.preventDefault();
          navigator.clipboard.writeText(iocValue).then(function() {
            copyBtn.textContent = 'Copied!';
            copyBtn.classList.add('copied');
            setTimeout(function() {
              copyBtn.textContent = 'Copy';
              copyBtn.classList.remove('copied');
            }, 2000);
          }).catch(function(err) {
            console.error('Failed to copy:', err);
            copyBtn.textContent = 'Error';
          });
        });
        
        block.appendChild(copyBtn);
      });
    })();
  </script>
</body>
</html>
