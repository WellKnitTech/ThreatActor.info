<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  {{ site.seo_tag }}
  <script>
    // Check for saved theme preference or default to dark
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
      }
    })();
  </script>
</head>
<body>
  <header>
    <h1>{{ site.title }}</h1>
    <nav>
      <ul>
        <li><a href="{{ site.baseurl }}/">Home</a></li>
        <li><a href="{{ site.baseurl }}/threat-actors">Threat Actors</a></li>
      </ul>
    </nav>
    <div class="header-controls">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
        <span class="toggle-icon">☀️</span>
      </button>
    </div>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>&copy; {{ "now" | date: "%Y" }} {{ site.title }}</p>
  </footer>
  <script>
    (function() {
      const toggleBtn = document.getElementById('theme-toggle');
      const toggleIcon = toggleBtn.querySelector('.toggle-icon');
      
      if (document.documentElement.classList.contains('light-theme')) {
        toggleIcon.textContent = '🌙';
      } else {
        toggleIcon.textContent = '☀️';
      }
      
      toggleBtn.addEventListener('click', function() {
        const isLight = document.documentElement.classList.toggle('light-theme');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        toggleIcon.textContent = isLight ? '🌙' : '☀️';
      });
    })();
    
    // Make all code elements click-to-copy
    (function() {
      console.log('IOC copy init...');
      
      // Find all code elements in the page
      const codes = document.querySelectorAll('.content code, .highlight code, code');
      console.log('Found codes:', codes.length);
      
      codes.forEach(function(code) {
        const text = code.textContent.trim();
        if (!text || text.length < 4) return;
        
        // Only add to likely IOCs ( IPs, hashes, domains, etc )
        const isIOC = /[\d:]/.test(text) || /^[a-f0-9]{32,}$/i.test(text) || /\./.test(text);
        if (!isIOC) return;
        
        console.log('Adding button to:', text);
        
        // Clean the IOC value
        const iocValue = text.replace('[.]', '.').replace('(dot)', '.');
        
        const btn = document.createElement('button');
        btn.innerHTML = '📋';
        btn.title = 'Click to copy: ' + iocValue;
        btn.style.cssText = 'margin-left:8px;padding:2px 6px;background:var(--accent);border:none;border-radius:3px;cursor:pointer;font-size:11px;vertical-align:middle;';
        
        btn.onclick = function() {
          navigator.clipboard.writeText(iocValue).then(function() {
            btn.innerHTML = '✓';
            setTimeout(function() { btn.innerHTML = '📋'; }, 1000);
          });
        };
        
        code.parentNode.style.display = 'inline';
        code.parentNode.style.position = 'relative';
        code.parentNode.appendChild(btn);
      });
    })();
  </script>
</body>
</html>
