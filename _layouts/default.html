<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  {{ site.seo_tag }}
  <script>
    // Check for saved theme preference or default to dark
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
      }
    })();
  </script>
</head>
<body>
  <header>
    <h1>{{ site.title }}</h1>
    <nav>
      <ul>
        <li><a href="{{ site.baseurl }}/">Home</a></li>
        <li><a href="{{ site.baseurl }}/threat-actors">Threat Actors</a></li>
      </ul>
    </nav>
    <div class="header-controls">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
        <span class="toggle-icon">☀️</span>
      </button>
    </div>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>&copy; {{ "now" | date: "%Y" }} {{ site.title }}</p>
  </footer>
  <script>
    (function() {
      const toggleBtn = document.getElementById('theme-toggle');
      const toggleIcon = toggleBtn.querySelector('.toggle-icon');
      
      if (document.documentElement.classList.contains('light-theme')) {
        toggleIcon.textContent = '🌙';
      } else {
        toggleIcon.textContent = '☀️';
      }
      
      toggleBtn.addEventListener('click', function() {
        const isLight = document.documentElement.classList.toggle('light-theme');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        toggleIcon.textContent = isLight ? '🌙' : '☀️';
      });
    })();
    
    // IOC Copy - Individual + Category + All
    (function() {
      const content = document.querySelector('.content');
      if (!content) return;
      
      // Find all code elements in list items within IOC sections
      const codes = content.querySelectorAll('li code');
      if (codes.length === 0) return;
      
      // Track categories
      const categories = {};
      let totalCount = 0;
      
      // Process each IOC
      codes.forEach(function(code) {
        const parent = code.parentNode;
        if (parent.tagName !== 'LI') return;
        
        // Get cleaned IOC value
        let iocValue = code.textContent.trim().replace('[.]', '.').replace('(dot)', '.');
        totalCount++;
        
        // Determine category
        let category = 'Other';
        if (/^[\d.]+$/.test(iocValue)) category = 'IP Addresses';
        else if (/^[a-f0-9]{32}$/i.test(iocValue)) category = 'MD5';
        else if (/^[a-f0-9]{40}$/i.test(iocValue)) category = 'SHA1';
        else if (/^[a-f0-9]{64}$/i.test(iocValue)) category = 'SHA256';
        else if (/^[a-f0-9]{8,}$/i.test(iocValue)) category = 'Hashes';
        else if (iocValue.includes('.')) category = 'Domains';
        else if (iocValue.includes('://') || iocValue.startsWith('http')) category = 'URLs';
        
        // Track category
        if (!categories[category]) categories[category] = [];
        categories[category].push(iocValue);
        
        // Add inline copy button to each IOC
        const btn = document.createElement('span');
        btn.innerHTML = '&#x1F4CB;';
        btn.title = 'Copy: ' + iocValue;
        btn.style.cssText = 'cursor:pointer;margin-left:6px;font-size:12px;opacity:0.6;vertical-align:middle;';
        btn.onclick = function(e) {
          e.preventDefault();
          navigator.clipboard.writeText(iocValue).then(function() {
            btn.innerHTML = '&#x2714;';
            setTimeout(function() { btn.innerHTML = '&#x1F4CB;'; }, 1000);
          });
        };
        parent.insertBefore(btn, code.nextSibling);
      });
      
      // Add bulk copy buttons after IOC heading
      const headings = content.querySelectorAll('h2, h3, h4');
      headings.forEach(function(h) {
        if (!h.textContent.toLowerCase().includes('indicator')) return;
        
        const container = document.createElement('span');
        container.style.cssText = 'margin-left:16px;display:inline-flex;gap:8px;';
        
        // All IOCs button
        const allBtn = document.createElement('button');
        allBtn.textContent = 'Copy All (' + totalCount + ')';
        allBtn.style.cssText = 'background:var(--accent);border:none;color:white;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;';
        allBtn.title = 'Copy all IOCs';
        allBtn.onclick = function() {
          let allIocs = [];
          Object.values(categories).forEach(function(arr) { allIocs = allIocs.concat(arr); });
          navigator.clipboard.writeText(allIocs.join('\n')).then(function() {
            allBtn.textContent = 'Copied!';
            setTimeout(function() { allBtn.textContent = 'Copy All (' + totalCount + ')'; }, 1500);
          });
        };
        container.appendChild(allBtn);
        
        // Per-category buttons
        Object.keys(categories).forEach(function(cat) {
          const catBtn = document.createElement('button');
          catBtn.textContent = cat + ' (' + categories[cat].length + ')';
          catBtn.style.cssText = 'background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-secondary);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px;';
          catBtn.title = 'Copy ' + cat;
          catBtn.onclick = function() {
            navigator.clipboard.writeText(categories[cat].join('\n')).then(function() {
              catBtn.textContent = 'Copied!';
              setTimeout(function() { catBtn.textContent = cat + ' (' + categories[cat].length + ')'; }, 1500);
            });
          };
          container.appendChild(catBtn);
        });
        
        h.parentNode.insertBefore(container, h.nextSibling);
      });
    })();
  </script>
</body>
</html>
