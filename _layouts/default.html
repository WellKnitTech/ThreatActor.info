<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  {{ site.seo_tag }}
  <script>
    // Check for saved theme preference or default to dark
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
      }
    })();
  </script>
</head>
<body>
  <header>
    <h1>{{ site.title }}</h1>
    <nav>
      <ul>
        <li><a href="{{ site.baseurl }}/">Home</a></li>
        <li><a href="{{ site.baseurl }}/threat-actors">Threat Actors</a></li>
      </ul>
    </nav>
    <div class="header-controls">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
        <span class="toggle-icon">☀️</span>
      </button>
    </div>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>&copy; {{ "now" | date: "%Y" }} {{ site.title }}</p>
  </footer>
  <script>
    (function() {
      const toggleBtn = document.getElementById('theme-toggle');
      const toggleIcon = toggleBtn.querySelector('.toggle-icon');
      
      // Set initial icon based on current theme
      if (document.documentElement.classList.contains('light-theme')) {
        toggleIcon.textContent = '🌙';
      } else {
        toggleIcon.textContent = '☀️';
      }
      
      toggleBtn.addEventListener('click', function() {
        const isLight = document.documentElement.classList.toggle('light-theme');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        toggleIcon.textContent = isLight ? '🌙' : '☀️';
      });
    })();
    
    // IOC Copy Functionality - Find IOC sections and add copy to individual items
    (function() {
      // Find the IOC section by looking for its heading
      const content = document.querySelector('.content');
      if (!content) return;
      
      // Look for all h3 and h4 headings in IOC sections
      const headings = content.querySelectorAll('h3, h4');
      let inIOCSection = false;
      
      headings.forEach(function(heading) {
        const text = heading.textContent.toLowerCase();
        if (text.includes('indicator') || text.includes('ioc')) {
          inIOCSection = true;
        } else if (text.includes('introduction') || text.includes('malware') || text.includes('campaign') || text.includes('attribution') || text.includes('reference')) {
          inIOCSection = false;
        }
        
        if (inIOCSection) {
          // Find all list items after this heading until the next heading
          let sibling = heading.nextElementSibling;
          while (sibling && !['H3', 'H4'].includes(sibling.tagName)) {
            // Handle list items
            const lis = sibling.querySelectorAll ? sibling.querySelectorAll('li') : [];
            lis.forEach(function(li, idx) {
              const text = li.textContent.trim();
              if (!text || !text.includes('`')) return;
              
              // Extract IOC value from backticks
              const codeMatch = text.match(/`([^`]+)`/);
              if (!codeMatch) return;
              
              const iocValue = codeMatch[1].replace('[.]', '.').replace('(dot)', '.');
              
              // Create copy button
              const copyBtn = document.createElement('button');
              copyBtn.className = 'ioc-copy-btn';
              copyBtn.textContent = 'Copy';
              copyBtn.title = 'Click to copy: ' + iocValue.substring(0, 30) + '...';
              
              copyBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                navigator.clipboard.writeText(iocValue).then(function() {
                  copyBtn.textContent = 'Copied!';
                  copyBtn.classList.add('copied');
                  setTimeout(function() {
                    copyBtn.textContent = 'Copy';
                    copyBtn.classList.remove('copied');
                  }, 1500);
                });
              });
              
              // Style the list item
              li.style.position = 'relative';
              li.appendChild(copyBtn);
            });
            sibling = sibling.nextElementSibling;
          }
        }
      });
    })();
  </script>
</body>
</html>
