<script>
(function () {
  const shell = document.getElementById('ioc-browser-shell');
  if (!shell) return;

  const BASE = shell.dataset.baseurl || '';
  const staticTitle = shell.dataset.staticTitle || 'IOCs';

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function getEffectiveType() {
    const t = shell.dataset.iocType || '';
    if (t === 'other') {
      const p = new URLSearchParams(window.location.search).get('ioc_type');
      return p || '';
    }
    return t;
  }

  function techniqueHref(tid) {
    const m = String(tid).match(/^([Tt]\d{4})(?:\.\d{3})?/);
    const parent = m ? m[1].toLowerCase() : String(tid).toLowerCase();
    return BASE + '/techniques/' + parent + '/';
  }

  let payload = null;
  let sortState = { key: 'value', dir: 1 };

  function normalizeCmp(a, b) {
    return String(a || '').toLowerCase().localeCompare(String(b || '').toLowerCase());
  }

  function filterRecords(records) {
    const actor = document.getElementById('ioc-filter-actor').value;
    const atomicOnly = document.getElementById('ioc-filter-atomic').checked;
    const q = document.getElementById('ioc-filter-q').value.trim().toLowerCase();

    return records.filter(rec => {
      if (atomicOnly && !rec.atomic) return false;
      if (actor && rec.actor_slug !== actor) return false;
      if (q) {
        const hay = [rec.value, rec.normalized_value, rec.actor_name, rec.label, rec.source_text].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }

  function sortRecords(records) {
    const k = sortState.key;
    const d = sortState.dir;
    const arr = records.slice();
    arr.sort((a, b) => {
      let va = k === 'actor' ? a.actor_name : (a[k] != null ? a[k] : '');
      let vb = k === 'actor' ? b.actor_name : (b[k] != null ? b[k] : '');
      const c = normalizeCmp(va, vb);
      return c * d;
    });
    return arr;
  }

  function renderTable(type, records) {
    if (!records.length) {
      return '<p class="ioc-group-empty">No records match the current filters.</p>';
    }
    const sorted = sortRecords(records);
    const headers = [
      { key: 'value', label: 'Value' },
      { key: 'actor', label: 'Actor' },
      { key: 'label', label: 'Label' },
      { key: 'source_text', label: 'Source' }
    ];
    const ths = headers.map(h => {
      const active = sortState.key === h.key ? ' sorted' : '';
      return '<th scope="col" class="ioc-th' + active + '" data-sort="' + h.key + '">' + esc(h.label) + '</th>';
    }).join('');

    const rows = sorted.map(rec => {
      const rawVal = rec.value || rec.normalized_value || '';
      const enc = encodeURIComponent(rec.normalized_value || rec.value || '');
      let valueCell = '<code class="ioc-value-cell">' + esc(rawVal) + '</code>' +
        ' <button type="button" class="ioc-copy-btn" data-copy-enc="' + enc + '">Copy</button>';
      if (type === 'attack_technique' && rec.normalized_value) {
        valueCell += ' <a class="ioc-tech-link" href="' + esc(techniqueHref(rec.normalized_value)) + '">ATT&CK →</a>';
      }
      return '<tr data-ioc-enc="' + enc + '">' +
        '<td>' + valueCell + '</td>' +
        '<td>' + (rec.actor_permalink
          ? '<a href="' + esc(BASE + rec.actor_permalink) + '">' + esc(rec.actor_name || '') + '</a>'
          : esc(rec.actor_name || '')) + '</td>' +
        '<td>' + esc(rec.label || '') + '</td>' +
        '<td class="ioc-source-cell">' + esc((rec.source_text || '').slice(0, 240)) + '</td></tr>';
    }).join('');

    return '<div class="ioc-table-wrap"><table class="ioc-table"><thead><tr>' + ths + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  function renderGroups() {
    const root = document.getElementById('ioc-groups-root');
    if (!payload || !payload.groups) {
      root.innerHTML = '<p class="load-error">Invalid IOC payload.</p>';
      return;
    }

    const type = payload.type;
    const frag = document.createDocumentFragment();

    payload.groups.forEach((group, gi) => {
      const recs = filterRecords(group.records || []);
      const details = document.createElement('details');
      details.className = 'ioc-group-card';
      details.dataset.groupKey = group.key;

      const summary = document.createElement('summary');
      summary.className = 'ioc-group-summary';
      summary.innerHTML =
        '<span class="ioc-group-title">' + esc(group.label || group.key) + '</span>' +
        '<span class="ioc-group-count">' + recs.length + ' / ' + (group.count || 0) + '</span>' +
        '<span class="ioc-group-actions">' +
        '<button type="button" class="secondary ioc-copy-group" data-gi="' + gi + '">Copy values</button> ' +
        '<button type="button" class="secondary ioc-csv-group" data-gi="' + gi + '">CSV</button>' +
        '</span>';

      const body = document.createElement('div');
      body.className = 'ioc-group-body';
      body.innerHTML = renderTable(type, recs);

      details.appendChild(summary);
      details.appendChild(body);
      frag.appendChild(details);
    });

    root.innerHTML = '';
    root.appendChild(frag);

    root.querySelectorAll('.ioc-th').forEach(th => {
      th.addEventListener('click', () => {
        const k = th.getAttribute('data-sort');
        if (sortState.key === k) sortState.dir = -sortState.dir;
        else {
          sortState.key = k;
          sortState.dir = 1;
        }
        renderGroups();
      });
    });

    root.querySelectorAll('.ioc-copy-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        const enc = btn.getAttribute('data-copy-enc');
        const t = enc ? decodeURIComponent(enc) : '';
        if (navigator.clipboard && t) navigator.clipboard.writeText(t);
      });
    });

    root.querySelectorAll('.ioc-copy-group').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        const gi = parseInt(btn.getAttribute('data-gi'), 10);
        const g = payload.groups[gi];
        if (!g) return;
        const text = filterRecords(g.records || []).map(r => r.value || r.normalized_value).join('\n');
        if (navigator.clipboard) navigator.clipboard.writeText(text);
      });
    });

    root.querySelectorAll('.ioc-csv-group').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        const gi = parseInt(btn.getAttribute('data-gi'), 10);
        const g = payload.groups[gi];
        if (!g) return;
        const recs = sortRecords(filterRecords(g.records || []));
        const lines = [['value', 'actor', 'label', 'source_text'].join(',')].concat(
          recs.map(r => {
            const row = [r.value || r.normalized_value, r.actor_name, r.label || '', r.source_text || ''];
            return row.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',');
          })
        );
        const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'iocs-' + type + '-' + String(g && g.key != null ? g.key : gi).replace(/[^\w.-]+/g, '_') + '.csv';
        a.click();
        URL.revokeObjectURL(a.href);
      });
    });

    applyDeepLink();
  }

  function applyDeepLink() {
    const raw = new URLSearchParams(window.location.search).get('value');
    if (!raw) return;
    const decoded = decodeURIComponent(raw).trim();
    const lw = decoded.toLowerCase();

    document.querySelectorAll('details.ioc-group-card').forEach(det => {
      const tbody = det.querySelector('tbody');
      if (!tbody) return;
      tbody.querySelectorAll('tr').forEach(tr => {
        const enc = tr.getAttribute('data-ioc-enc');
        if (!enc) return;
        let v;
        try {
          v = decodeURIComponent(enc);
        } catch (e) {
          return;
        }
        if (v.toLowerCase() === lw) {
          det.open = true;
          tr.classList.add('ioc-search-deep-match');
          tr.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
      });
    });
  }

  function debounce(fn, ms) {
    let t;
    return function () {
      clearTimeout(t);
      const args = arguments;
      t = setTimeout(() => fn.apply(null, args), ms);
    };
  }

  function bindFilters() {
    const rerender = debounce(() => renderGroups(), 120);
    document.getElementById('ioc-filter-actor').addEventListener('change', rerender);
    document.getElementById('ioc-filter-atomic').addEventListener('change', rerender);
    document.getElementById('ioc-filter-q').addEventListener('input', rerender);
    document.getElementById('ioc-filter-clear').addEventListener('click', () => {
      document.getElementById('ioc-filter-actor').value = '';
      document.getElementById('ioc-filter-atomic').checked = false;
      document.getElementById('ioc-filter-q').value = '';
      renderGroups();
    });

    const toggle = document.getElementById('ioc-facet-toggle');
    const inner = document.getElementById('ioc-facet-inner');
    if (toggle && inner) {
      toggle.addEventListener('click', () => {
        const open = inner.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    }
  }

  function heroFromPayload() {
    document.getElementById('ioc-hero-desc').textContent = payload.description || '';
    document.getElementById('ioc-hero-title').textContent = payload.label || staticTitle;
    document.getElementById('ioc-stat-total').textContent = payload.count ?? '-';
    document.getElementById('ioc-stat-unique').textContent = payload.unique_values ?? '-';
    document.getElementById('ioc-stat-atomic').textContent = payload.atomic_count ?? '-';
    document.getElementById('ioc-stat-grouping').textContent = (payload.groups || []).length;
    document.getElementById('ioc-hero-stats').hidden = false;
  }

  function populateActors() {
    const sel = document.getElementById('ioc-filter-actor');
    const facet = (payload.facets && payload.facets.actor) || [];
    facet.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.slug;
      opt.textContent = a.name + ' (' + a.count + ')';
      sel.appendChild(opt);
    });
  }

  const eff = getEffectiveType();
  const loadMsg = document.getElementById('ioc-load-msg');

  if (!eff) {
    loadMsg.innerHTML = 'This page lists IOC types that use custom subsection headings. Open the <a href="' + esc(BASE + '/iocs/') + '">IOC hub</a> and use a type card, or append <code>?ioc_type=your_type_key</code> to this URL.';
    return;
  }

  fetch(BASE + '/api/iocs/by-type/' + encodeURIComponent(eff) + '.json')
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      payload = data;
      loadMsg.remove();
      heroFromPayload();
      populateActors();
      bindFilters();
      renderGroups();
    })
    .catch(() => {
      loadMsg.innerHTML = '<span class="load-error">Could not load IOC data for this type. Run <code>ruby scripts/generate-indexes.rb</code> after adding IOC content.</span>';
    });
})();
</script>
