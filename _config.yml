title: "Threat Actor Info"
description: "An attempt at a community wiki about threat actors"
baseurl: "" # Your base URL
url: "https://threatactor.info" # Your site URL
theme: jekyll-theme-hacker
sass:
  quiet_deps: true

collections:
  threat_actors:
    output: true
    permalink: /:path/
  malware:
    output: true
    permalink: /malware/:path/
  techniques:
    output: true
    permalink: /techniques/:path/
  tactics:
    output: true
    permalink: /tactics/:path/
  campaigns:
    output: true
    permalink: /campaigns/:path/
  mitigations:
    output: true
    permalink: /mitigations/:path/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

paginate: 5
paginate_path: "/page:num/"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
