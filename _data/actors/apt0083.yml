    type: "malware"
    stix_id: "malware--b4d80f8b-d2b9-4448-8844-4bef777ed676"
    description: "NanoCore is a modular remote access tool developed in .NET that can be used to spy on victims and steal information. It has been used by threat actors since 2013.(Citation: DigiTrust NanoCore Jan 2017)(Citation: Cofense NanoCore Mar 2018)(Citation: PaloAlto NanoCore Feb 2016)(Citation: Unit 42 Gorgon Group Aug 2018)"
  - name: "Agent Tesla"
    mitre_id: "S0331"
    url: "https://attack.mitre.org/software/S0331"
    type: "malware"
    stix_id: "malware--e7a5229f-05eb-440e-b982-9a6d2b2b87c8"
    description: "Agent Tesla is a spyware Trojan written for the .NET framework that has been observed since at least 2014.(Citation: Fortinet Agent Tesla April 2018)(Citation: Bitdefender Agent Tesla April 2020)(Citation: Malwarebytes Agent Tesla April 2020)"
  - name: "NETWIRE"
    mitre_id: "S0198"
    url: "https://attack.mitre.org/software/S0198"
    type: "malware"
    stix_id: "malware--2a70812b-f1ef-44db-8578-a496a227aef2"
    description: "NETWIRE is a publicly available, multiplatform remote administration tool (RAT) that has been used by criminal and APT groups since at least 2012.(Citation: FireEye APT33 Sept 2017)(Citation: McAfee Netwire Mar 2015)(Citation: FireEye APT33 Webinar Sept 2017)"
  - name: "DarkComet"
    mitre_id: "S0334"
    url: "https://attack.mitre.org/software/S0334"
    type: "malware"
    stix_id: "malware--53ab35c2-d00e-491a-8753-41d35ae7e547"
    description: "DarkComet is a Windows remote administration tool and backdoor.(Citation: TrendMicro DarkComet Sept 2014)(Citation: Malwarebytes DarkComet March 2018)"
  - name: "Lokibot"
    mitre_id: "S0447"
    url: "https://attack.mitre.org/software/S0447"
    type: "malware"
    stix_id: "malware--cb741463-f0fe-42e0-8d45-bc7e8335f5ae"
    description: "Lokibot is a widely distributed information stealer that was first reported in 2015. It is designed to steal sensitive information such as usernames, passwords, cryptocurrency wallets, and other credentials. Lokibot can also create a backdoor into infected systems to allow an attacker to install additional payloads.(Citation: Infoblox Lokibot January 2019)(Citation: Morphisec Lokibot April 2020)(Citation: CISA Lokibot September 2020)"
