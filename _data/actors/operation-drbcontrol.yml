description: Operation DRBControl is a cyberespionage campaign targeting gambling
  companies in Southeast Asia, first identified in 2019. The operation involves the
  use of HyperBro malware and SysUpdate variants, with evidence of customer database
  and source code exfiltration. The threat actor has employed domain spoofing for
  command and control and has shown a consistent interest in the gambling industry.
  Trend Micro's analysis linked multiple tools and malware families to this campaign,
  indicating a sophisticated and evolving threat landscape.
