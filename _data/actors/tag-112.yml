description: TAG-112 is a Chinese state-sponsored APT that compromised Tibetan websites,
  including Tibet Post and Gyudmed Tantric University, to deliver Cobalt Strike malware.
  The group exploited vulnerabilities in the Joomla CMS to embed malicious JavaScript
  that spoofed a TLS certificate error, tricking users into downloading a compromised
  security certificate. TAG-112's infrastructure, concealed using Cloudflare, shows
  notable overlap with TAG-102, but it employs less sophisticated tactics, relying
  on Cobalt Strike rather than custom malware. The campaign reflects ongoing cyber-espionage
  efforts targeting Tibetan entities, likely for information collection and surveillance.
