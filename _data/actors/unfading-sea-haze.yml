description: Unfading Sea Haze is a threat actor focused on espionage, targeting government
  and military organizations in the South China Sea region since 2018. They employ
  spear-phishing emails with malicious attachments to gain initial access, followed
  by the deployment of custom malware such as Gh0st RAT variants and SharpJSHandler.
  The group utilizes scheduled tasks and manipulates local administrator accounts
  for persistence, while also incorporating Remote Monitoring and Management tools
  into their attacks. Unfading Sea Haze demonstrates a sophisticated and patient approach,
  remaining undetected for years and showing adaptability through evolving exfiltration
  tactics and malware arsenal.
