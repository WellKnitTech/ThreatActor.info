software:
  - name: "WarzoneRAT"
    mitre_id: "S0670"
    url: "https://attack.mitre.org/software/S0670"
    type: "malware"
    stix_id: "malware--fde19a18-e502-467f-be14-58c71b4e7f4b"
    description: "WarzoneRAT is a malware-as-a-service remote access tool (RAT) written in C++ that has been publicly available for purchase since at least late 2018.(Citation: Check Point Warzone Feb 2020)(Citation: Uptycs Warzone UAC Bypass November 2020)"
  - name: "Sunbird"
    mitre_id: "S1082"
    url: "https://attack.mitre.org/software/S1082"
    type: "malware"
    stix_id: "malware--feae299d-e34f-4fc9-8545-486d0905bd41"
    description: "Sunbird is one of two mobile malware families known to be used by the APT Confucius.  Analysis suggests that Sunbird was first active in early 2017. While Sunbird and Hornbill overlap in core capabilities, Sunbird has a more extensive set of malicious features.(Citation: lookout_hornbill_sunbird_0221)"
  - name: "Hornbill"
    mitre_id: "S1077"
    url: "https://attack.mitre.org/software/S1077"
    type: "malware"
    stix_id: "malware--15d78a95-af6a-4b06-8dae-76bedb0ec5a1"
    description: "Hornbill is one of two mobile malware families known to be used by the APT Confucius. Analysis suggests that Hornbill was first active in early 2018. While Hornbill and Sunbird overlap in core capabilities, Hornbill has tools and behaviors suggesting more passive reconnaissance.(Citation: lookout_hornbill_sunbird_0221)"
