description: Storm-1099 is a sophisticated Russia-affiliated influence actor that
  has been conducting pro-Russia influence operations targeting international supporters
  of Ukraine since Spring 2022. They are known for their website forgery operation
  called "Doppelganger" and have been actively spreading false information. They have
  been involved in pushing the claim that Hamas acquired Ukrainian weapons for an
  attack on Israel. Storm-1099 has also been implicated in amplifying images of graffiti
  in Paris, suggesting possible Russian involvement and aligning with Russia's Active
  Measures playbook.
