name: 军刀狮 - APT-C-38
aliases:
- 军刀狮 - APT-C-38
description: 从2015年7月起至今，军刀狮组织（APT-C-38）在中东地区展开了有组织、有计划、针对性的不间断攻击，其攻击平台为Windows和Android。由于军刀狮组织的攻击目标有一个主要的特色目标是西亚中东某国的库尔德人，另Windows端RAT包含的PDB路径下出现多次的“Saber”，而亚洲狮为该中东国家的代表动物，结合该组织的一些其它特点以及360对   APT
  组织的命名规则，我们将该组织命名为军刀狮（APT-C-38）。
