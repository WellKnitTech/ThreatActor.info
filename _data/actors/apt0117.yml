name: "Fox Kitten"
aliases: ["Fox Kitten","Lemon Sandstorm","Parisite","PARISITE","Pay2key","Pay2Key","Pioneer Kitten","PIONEER KITTEN","PioneerKitten","RUBIDIUM","UNC757"]
description: "Fox Kitten is threat actor with a suspected nexus to the Iranian government that has been active since at least 2017 against entities in the Middle East, North Africa, Europe, Australia, and North America. Fox Kitten has targeted multiple industrial verticals including oil and gas, technology, government, defense, healthcare, manufacturing, and engineering. [ClearkSky Fox Kitten February 2020](https://www.clearskysec.com/fox-kitten/) [CrowdStrike PIONEER KITTEN August 2020](https://www.crowdstrike.com/blog/who-is-pioneer-kitten/) [Dragos PARISITE](https://www.dragos.com/threat/parisite/) [ClearSky Pay2Kitten December 2020](https://www.clearskysec.com/wp-content/uploads/2020/12/Pay2Kitten.pdf)"
