software:
  - name: "China Chopper"
    mitre_id: "S0020"
    url: "https://attack.mitre.org/software/S0020"
    type: "malware"
    stix_id: "malware--5a3a31fe-5a8f-48e1-bff0-a753e5b1be70"
    description: "China Chopper is a Web Shell hosted on Web servers to provide access back into an enterprise network that does not rely on an infected system calling back to a remote command and control server.(Citation: Lee 2013) It has been used by several threat groups.(Citation: Dell TG-3390)(Citation: FireEye Periscope March 2018)(Citation: CISA AA21-200A APT40 July 2021)(Citation: Rapid7 HAFNIUM Mar 2021)"
  - name: "Pay2Key"
    mitre_id: "S0556"
    url: "https://attack.mitre.org/software/S0556"
    type: "malware"
    stix_id: "malware--77ca1aa3-280c-4b67-abaa-e8fb891a8f83"
    description: "Pay2Key is a ransomware written in C++ that has been used by Fox Kitten since at least July 2020 including campaigns against Israeli companies. Pay2Key has been incorporated with a leak site to display stolen sensitive information to further pressure victims into payment.(Citation: ClearkSky Fox Kitten February 2020)(Citation: Check Point Pay2Key November 2020)"
  - name: "ngrok"
    mitre_id: "S0508"
    url: "https://attack.mitre.org/software/S0508"
    type: "tool"
    stix_id: "tool--2f7f03bb-f367-4a5a-ad9b-310a12a48906"
    description: "ngrok is a legitimate reverse proxy tool that can create a secure tunnel to servers located behind firewalls or on local machines that do not have a public IP. ngrok has been leveraged by threat actors in several campaigns including use for lateral movement and data exfiltration.(Citation: Zdnet Ngrok September 2018)(Citation: FireEye Maze May 2020)(Citation: Cyware Ngrok May 2019)(Citation: MalwareBytes LazyScripter Feb 2021)"
  - name: "PsExec"
    mitre_id: "S0029"
    url: "https://attack.mitre.org/software/S0029"
    type: "tool"
    stix_id: "tool--ff6caf67-ea1f-4895-b80e-4bb0fc31c6db"
    description: "PsExec is a free Microsoft tool that can be used to execute a program on another computer. It is used by IT administrators and attackers.(Citation: Russinovich Sysinternals)(Citation: SANS PsExec)"
  - name: "SystemBC"
    mitre_id: "S9001"
    url: "https://attack.mitre.org/software/S9001"
    type: "malware"
    stix_id: "malware--39643fb9-00c1-4a45-85e5-801a3f2665d1"
    description: "SystemBC is a malware family offered as a malware-as-a-service (MaaS) that is used to establish command and control and facilitate follow-on activity, including ransomware deployment.SystemBC executes a variety of tasks including setting up SOCKS5 proxies, maintaining persistence, ingesting malicious files, and handing C2 communication. SystemBC was first detected in 2018, and has been used by Wizard Spider since at least 2020, and by FIN7 since at least 2022.(Citation: TrumanKroll_SYSTEMBCServer"
