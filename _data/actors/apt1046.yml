description: 'Storm-1811 is a financially-motivated entity linked to Black Basta ransomware
  deployment. Storm-1811 is notable for unique phishing and social engineering mechanisms
  for initial access, such as overloading victim email inboxes with non-malicious
  spam to prompt a fake "help desk" interaction leading to the deployment of adversary
  tools and capabilities.(Citation: Microsoft Storm-1811 2024)(Citation: rapid7-email-bombing)(Citation:
  RedCanary Storm-1811 2024)(Citation: RedCanary June Insights 2024)'
