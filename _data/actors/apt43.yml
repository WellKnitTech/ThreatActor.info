  fraudulent personas for use in social engineering, as well as cover identities for
  purchasing operational tooling and infrastructure. \n• APT43 has collaborated with
  other North Korean espionage operators on multiple operations, underscoring the
  major role APT43 plays in the regime’s cyber apparatus."
