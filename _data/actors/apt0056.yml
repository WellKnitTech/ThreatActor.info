description: 'PROMETHIUM is an activity group focused on espionage that has been active
  since at least 2012. The group has conducted operations globally with a heavy emphasis
  on Turkish targets. PROMETHIUM has demonstrated similarity to another activity group
  called NEODYMIUM due to overlapping victim and campaign characteristics.(Citation:
  Microsoft NEODYMIUM Dec 2016)(Citation: Microsoft SIR Vol 21)(Citation: Talos Promethium
  June 2020)'
