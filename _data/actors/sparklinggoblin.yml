description: 'ESET researchers have discovered a new undocumented modular backdoor,
  SideWalk, being used by an APT group they’ve named SparklingGoblin; this backdoor
  was used during one of SparklingGoblin’s recent campaigns that targeted a computer
  retail company based in the USA. This backdoor shares multiple similarities with
  another backdoor used by the group: CROSSWALK.'
