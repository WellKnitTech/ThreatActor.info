description: TGR-STA-1030 is a state-aligned cyberespionage group operating out of
  Asia, known for compromising government and critical infrastructure organizations
  across 37 countries. The group frequently deploys web shells, such as Behinder,
  Neo-reGeorg, and Godzilla, on both external and internal web servers to maintain
  access and enable lateral movement. TGR-STA-1030 has conducted extensive reconnaissance
  against government infrastructure, particularly focusing on nations in the South
  China Sea and Gulf of Thailand regions, as well as European countries like Germany.
  The group primarily targets government ministries and departments for espionage
  purposes, especially those exploring specific economic partnerships.
