name: "Axiom"
aliases: ["Axiom","Group 72"]
description: "Axiom is a suspected Chinese cyber espionage group that has targeted the aerospace, defense, government, manufacturing, and media sectors since at least 2008. Some reporting suggests a degree of overlap between Axiom and Winnti Group but the two groups appear to be distinct based on differences in reporting on TTPs and targeting. [Kaspersky Winnti April 2013](https://securelist.com/winnti-more-than-just-a-game/37029/) [Kaspersky Winnti June 2015](https://securelist.com/games-are-over/70991/) [Novetta Winnti April 2015](https://web.archive.org/web/20150412223949/http://www.novetta.com/wp-content/uploads/2015/04/novetta_winntianalysis.pdf)"
