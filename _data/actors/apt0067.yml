name: "APT37"
aliases: ["APT 37","APT-C-28","APT37","ATK4","G0067","Group 123","Group123","InkySquid","Moldy Pisces","Operation Daybreak","Operation Erebus","Reaper","Reaper Group","Red Eyes","Ricochet Chollima","ScarCruft","TEMP.Reaper","Venus 121","APT37（Reaper）","ScarCruft - APT-C-28"]
description: "APT37 is a North Korean state-sponsored cyber espionage group that has been active since at least 2012. The group has targeted victims primarily in South Korea, but also in Japan, Vietnam, Russia, Nepal, China, India, Romania, Kuwait, and other parts of the Middle East. APT37 has also been linked to the following campaigns between 2016-2018: Operation Daybreak, Operation Erebus, Golden Time, Evil New Year, Are you Happy?, FreeMilk, North Korean Human Rights, and Evil New Year 2018. [FireEye APT37 Feb 2018](https://services.google.com/fh/files/misc/apt37-reaper-the-overlooked-north-korean-actor.pdf) [Securelist ScarCruft Jun 2016](https://securelist.com/operation-daybreak/75100/) [Talos Group123](https://blog.talosintelligence.com/2018/01/korea-in-crosshairs.html)\n\nNorth Korean group definitions are known to have significant overlap, and some security researchers report all North Korean state-sponsored cyber activity under the name Lazarus Group instead of tracking clusters or subgroups."
