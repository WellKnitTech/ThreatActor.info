description: VICEROY TIGER is an adversary with a nexus to India that has historically
  targeted entities throughout multiple sectors. Older activity targeted multiple
  sectors and countries; however, since 2015 this adversary appears to focus on entities
  in Pakistan with a particular focus on government and security organizations. This
  adversary consistently leverages spear phishing emails containing malicious Microsoft
  Office documents, malware designed to target the Android mobile platform, and phishing
  activity designed to harvest user credentials. In March 2017, the 360 Chasing Team
  found a sample of targeted attacks that confirmed the previously unknown sample
  of APT's attack actions, which the organization can now trace back at least in April
  2016. The chasing team named the attack organization APT-C-35. In June 2017, the
  360 Threat Intelligence Center discovered the organization’s new attack activity,
  confirmed and exposed the gang’s targeted attacks against Pakistan, and analyzed
  in detail. The unique EHDevel malicious code framework used by the organization.
