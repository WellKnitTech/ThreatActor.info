name: UNC4536
aliases:
- UNC4536
description: UNC4536 is a threat actor that distributes malware, including ICEDID,
  REDLINESTEALER, and CARBANAK, primarily through malvertising and trojanized MSIX
  installers masquerading as popular software. They utilize SEO poisoning tactics
  to direct victims to malicious sites that mimic legitimate software hosting platforms,
  facilitating the download of compromised installers. The actor employs a PowerShell
  script known as NUMOZYLOD to deliver tailored payloads, such as the CARBANAK backdoor,
  to their partners. Additionally, UNC4536 has been linked to campaigns that distribute
  NetSupport RAT, targeting IT administrators through fake sites promoted via Google
  Ads.
