description: 'HAFNIUM is a likely state-sponsored cyber espionage group operating
  out of China that has been active since at least January 2021. HAFNIUM primarily
  targets entities in the US across a number of industry sectors, including infectious
  disease researchers, law firms, higher education institutions, defense contractors,
  policy think tanks, and NGOs. HAFNIUM has targeted remote management tools and cloud
  software for intial access and has demonstrated an ability to quickly operationalize
  exploits for identified vulnerabilities in edge devices.(Citation: Microsoft HAFNIUM
  March 2020)(Citation: Volexity Exchange Marauder March 2021)(Citation: Microsoft
  Silk Typhoon MAR 2025)'
