  - name: "Tarrask"
    mitre_id: "S1011"
    url: "https://attack.mitre.org/software/S1011"
    type: "malware"
    stix_id: "malware--988976ff-beeb-4fb5-b07d-ca7437ea66e8"
    description: "Tarrask is malware that has been used by HAFNIUM since at least August 2021. Tarrask was designed to evade digital defenses and maintain persistence by generating concealed scheduled tasks.(Citation: Tarrask scheduled task)"
  - name: "ASPXSpy"
    mitre_id: "S0073"
    url: "https://attack.mitre.org/software/S0073"
    type: "malware"
    stix_id: "malware--56f46b17-8cfa-46c0-b501-dd52fef394e2"
    description: "ASPXSpy is a Web shell. It has been modified by Threat Group-3390 actors to create the ASPXTool version. (Citation: Dell TG-3390)"
  - name: "Impacket"
    mitre_id: "S0357"
    url: "https://attack.mitre.org/software/S0357"
    type: "tool"
    stix_id: "tool--26c87906-d750-42c5-946c-d4162c73fc7b"
    description: "Impacket is an open source collection of modules written in Python for programmatically constructing and manipulating network protocols. Impacket contains several tools for remote service execution, Kerberos manipulation, Windows credential dumping, packet sniffing, and relay attacks.(Citation: Impacket Tools)"
  - name: "PsExec"
    mitre_id: "S0029"
    url: "https://attack.mitre.org/software/S0029"
    type: "tool"
    stix_id: "tool--ff6caf67-ea1f-4895-b80e-4bb0fc31c6db"
    description: "PsExec is a free Microsoft tool that can be used to execute a program on another computer. It is used by IT administrators and attackers.(Citation: Russinovich Sysinternals)(Citation: SANS PsExec)"
  - name: "Covenant"
    mitre_id: "S1155"
    url: "https://attack.mitre.org/software/S1155"
    type: "tool"
    stix_id: "tool--05fb53c8-e2ac-4e17-a0c9-a0825e1198bf"
    description: "Covenant is a multi-platform command and control framework written in .NET. While designed for penetration testing and security research, the tool has also been used by threat actors such as HAFNIUM during operations. Covenant functions through a central listener managing multiple deployed \"Grunts\" that communicate back to the controller.(Citation: Github Covenant)(Citation: Microsoft HAFNIUM March 2020)"
  - name: "China Chopper"
    mitre_id: "S0020"
    url: "https://attack.mitre.org/software/S0020"
    type: "malware"
    stix_id: "malware--5a3a31fe-5a8f-48e1-bff0-a753e5b1be70"
    description: "China Chopper is a Web Shell hosted on Web servers to provide access back into an enterprise network that does not rely on an infected system calling back to a remote command and control server.(Citation: Lee 2013) It has been used by several threat groups.(Citation: Dell TG-3390)(Citation: FireEye Periscope March 2018)(Citation: CISA AA21-200A APT40 July 2021)(Citation: Rapid7 HAFNIUM Mar 2021)"
