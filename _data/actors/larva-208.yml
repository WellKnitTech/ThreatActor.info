description: LARVA-208 is a financially motivated threat actor employing sophisticated
  phishing campaigns to harvest credentials and deploy ransomware. The actor uses
  multiple tactics, including Open URL Redirection, fake login pages, and social engineering,
  to bypass MFA and gain access to corporate networks. LARVA-208 has compromised over
  618 organizations since June 2024, often deploying ransomware payloads. The threat
  actor is linked to LARVA-148, a threat actor managing domain acquisitions and attacks.
