name: Phlox Tempest
aliases:
- DEV-0796
- Phlox Tempest
description: Phlox Tempest is a threat actor responsible for a large-scale click fraud
  campaign targeting users through YouTube comments and malicious ads. They use ChromeLoader
  to infect victims' computers with malware, often delivered as ISO image files that
  victims are tricked into downloading. The attackers aim to profit from clicks generated
  by malicious browser extensions or node-WebKit installed on the victim's device.
  Microsoft and other cybersecurity organizations have issued warnings about this
  ongoing and prevalent campaign.
