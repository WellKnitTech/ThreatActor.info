description: BOSON SPIDER is a cyber criminal group, which was first identified in
  2015, recently and inexplicably went dark in the spring of 2016, appears to be a
  tightly knit group operating out of Eastern Europe. They have used a variety of
  distribution mechanisms such as the infamous (and now defunct) angler exploit kit,
  and obfuscated JavaScript to reduce the detection by antivirus solutions.
