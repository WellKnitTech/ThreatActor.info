description: Linkc is a newly emerged ransomware group that operates an onion-based
  data leak site and has claimed one victim, a U.S.-based AI and cloud service provider,
  H2O.ai, which was attacked on January 29, 2025. The group demanded a ransom of $15
  million for data decryption and removal, showcasing access to sensitive information,
  including GPT model source code and customer data. Linkc's DLS is well-constructed
  and quick to load, indicating potential for future victim listings. However, there
  is currently no public acknowledgment from the victim, and the group has not engaged
  in discussions on cybercrime forums.
