software:
  - name: "Bumblebee"
    mitre_id: "S1039"
    url: "https://attack.mitre.org/software/S1039"
    type: "malware"
    stix_id: "malware--04378e79-4387-468a-a8f7-f974b8254e44"
    description: "Bumblebee is a custom loader written in C++ that has been used by multiple threat actors, including possible initial access brokers, to download and execute additional payloads since at least March 2022. Bumblebee has been linked to ransomware operations including Conti, Quantum, and Mountlocker and derived its name from the appearance of \"bumblebee\" in the user-agent.(Citation: Google EXOTIC LILY March 2022)(Citation: Proofpoint Bumblebee April 2022)(Citation: Symantec Bumblebee June 2022)\n"
  - name: "Latrodectus"
    mitre_id: "S1160"
    url: "https://attack.mitre.org/software/S1160"
    type: "malware"
    stix_id: "malware--76fde8df-3495-47c9-82eb-125c4f7fb621"
    description: "Latrodectus is a Windows malware downloader that has been used since at least 2023 to download and execute additional payloads and modules. Latrodectus has most often been distributed through email campaigns, primarily by TA577 and TA578, and has infrastructure overlaps with historic IcedID operations.(Citation: Latrodectus APR 2024)(Citation: Bleeping Computer Latrodectus April 2024)(Citation: Bitsight Latrodectus June 2024)"
  - name: "IcedID"
    mitre_id: "S0483"
    url: "https://attack.mitre.org/software/S0483"
    type: "malware"
    stix_id: "malware--5147ef15-1cae-4707-8ea1-bee8d98b7f1d"
    description: "IcedID is a modular banking malware designed to steal financial information that has been observed in the wild since at least 2017.  IcedID  has been downloaded by Emotet in multiple campaigns.(Citation: IBM IcedID November 2017)(Citation: Juniper IcedID June 2020)"
