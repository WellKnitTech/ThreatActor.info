description: OilAlpha has almost exclusively relied on infrastructure associated with
  the Public Telecommunication Corporation (PTC), a Yemeni government-owned enterprise
  reported to be under the direct control of the Houthi authorities. OilAlpha used
  encrypted chat messengers like WhatsApp to launch social engineering attacks against
  its targets. It has also used URL link shorteners. Per victimology assessment, it
  appears a majority of the targeted entities were Arabic-language speakers and operated
  Android devices.
