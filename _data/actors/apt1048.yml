software:
  - name: "MOPSLED"
    mitre_id: "S1221"
    url: "https://attack.mitre.org/software/S1221"
    type: "malware"
    stix_id: "malware--bfcb4a75-b6f0-489b-b506-836bfba3d70e"
    description: "MOPSLED is a shellcode-based modular backdoor that has been used by China-nexus cyber espionage actors including UNC3886 and APT41.(Citation: Google Cloud Mandiant UNC3886 2024)"
  - name: "VIRTUALPIE"
    mitre_id: "S1218"
    url: "https://attack.mitre.org/software/S1218"
    type: "malware"
    stix_id: "malware--7cc63f0f-f24f-4cda-9e9f-61bde1d52297"
    description: "VIRTUALPIE is a lightweight backdoor written in Python that spawns an IPv6 listener on a VMware ESXi server and features command line execution, file transfer,  and reverse shell capabilities. VIRTUALPIE has been in use since at least 2022 including by UNC3886 who installed it via malicious vSphere Installation Bundles (VIBs).(Citation: Google Cloud Threat Intelligence ESXi VIBs 2022)"
  - name: "CASTLETAP"
    mitre_id: "S1224"
    url: "https://attack.mitre.org/software/S1224"
    type: "malware"
    stix_id: "malware--15c7bcdb-23e1-4ce3-81a7-b109b4d2a4f1"
    description: "CASTLETAP is an ICMP port knocking backdoor that has been installed on compromised FortiGate firewalls by UNC3886.(Citation: Mandiant Fortinet Zero Day)"
  - name: "THINCRUST"
    mitre_id: "S1223"
    url: "https://attack.mitre.org/software/S1223"
    type: "malware"
    stix_id: "malware--351b63d3-7b2c-4ede-b3fe-ff291527b397"
    description: "THINCRUST is a Python-based backdoor tool that has been used by UNC3886 since at least 2023.(Citation: Mandiant Fortinet Zero Day)"
  - name: "VIRTUALPITA"
    mitre_id: "S1217"
    url: "https://attack.mitre.org/software/S1217"
    type: "malware"
    stix_id: "malware--df0b59fe-0193-49ea-84e1-9207139c716c"
    description: "VIRTUALPITA is a passive backdoor with ESXi and Linux vCenter variants capable of command execution, file transfer, and starting and stopping processes. VIRTUALPITA has been in use since at least 2022 including by UNC3886 who leveraged malicious vSphere Installation Bundles (VIBs) for install on ESXi hypervisors.(Citation: Google Cloud Threat Intelligence ESXi VIBs 2022)"
  - name: "REPTILE"
    mitre_id: "S1219"
    url: "https://attack.mitre.org/software/S1219"
    type: "malware"
    stix_id: "malware--4ea492ee-36f8-4017-938f-d01ce951ef94"
    description: "REPTILE is an open-source Linux rootkit with multiple components that provides backdoor access and functionality.(Citation: Google Cloud Mandiant UNC3886 2024)"
  - name: "MEDUSA"
    mitre_id: "S1220"
    url: "https://attack.mitre.org/software/S1220"
    type: "malware"
    stix_id: "malware--0a615414-1dad-4131-802d-38f5d72ef852"
    description: "MEDUSA is an open-source rootkit that is capable of dynamic linker hijacking, command execution, and logging credentials.(Citation: Google Cloud Mandiant UNC3886 2024)"
  - name: "RIFLESPINE"
    mitre_id: "S1222"
    url: "https://attack.mitre.org/software/S1222"
    type: "malware"
    stix_id: "malware--d0270367-37fc-471e-9206-483582c5f47d"
    description: "RIFLESPINE is a cross-platform backdoor that leverages Google Drive for file transfer and command execution.(Citation: Google Cloud Mandiant UNC3886 2024)"
