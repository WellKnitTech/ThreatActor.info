description: VIKING SPIDER is the criminal group behind the development and distribution
  of Ragnar Locker ransomware. While public reporting indicates the group began threatening
  to leak victim data in February 2020, a DLS was not observed until April 2020. The
  DLS is hosted on Tor, and similar to other actors, proof of data exfiltration is
  provided before the stolen data is fully leaked. It was also noted that On Dec.
  22, 2020, a new post made to MountLocker ransomware’s Tor-hosted DLS was titled
  'Cartel News' and included details of a victim of VIKING SPIDER’s Ragnar Locker
