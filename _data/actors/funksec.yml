name: FunkSec
aliases:
- FunkSec
description: Funksec is a newly identified extortion group that has claimed 11 victims
  across various sectors, including media, IT, and education, operating a Tor-based
  DLS to centralize its ransomware activities. The group advertises a free DDoS tool
  and may develop its own ransomware binary, indicating significant technical capability.
  The DLS was likely created in late November to early December 2024, with the first
  advertisement titled “Funksec Ransomware” posted on 3 December 2024. Currently,
  there is limited publicly available information on Funksec's TTPs, and it is not
  known to be associated with any other threat groups.
