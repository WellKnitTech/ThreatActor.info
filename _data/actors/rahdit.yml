name: RaHDit
aliases:
- Russian Angry Hackers Did It
- RaHDit
description: RaHDit is a pro-Kremlin hacktivist group known for orchestrating hack-and-leak
  operations, including the publication of personal information about Ukrainian military
  intelligence personnel and their associates. The group has been linked to Russian
  intelligence and has claimed to provide actionable intelligence to the Russian army.
  RaHDit operates a website called NemeZida, where they disclose sensitive data, and
  has been involved in disinformation campaigns supporting Russian narratives. Their
  activities include collaboration with other hacktivist groups and targeting Ukrainian
  cyberdefense efforts.
