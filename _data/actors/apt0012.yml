name: "Darkhotel"
aliases: ["Darkhotel","DUBNIUM","Zigzag Hail","Tardigrade Spider","Luder","Karba","Tapaoux","Nemim","Dubnium (Microsoft)","APT-C-06","SHADOW CRANE","T-APT-02","SIG25 (NSA)","DarkHotel"]
description: "Darkhotel is a suspected South Korean threat group that has targeted victims primarily in East Asia since at least 2004. The group's name is based on cyber espionage operations conducted via hotel Internet networks against traveling executives and other select guests. Darkhotel has also conducted spearphishing campaigns and infected victims through peer-to-peer and file sharing networks. [Kaspersky Darkhotel](https://media.kasperskycontenthub.com/wp-content/uploads/sites/43/2018/03/08070903/darkhotel_kl_07.11.pdf) [Securelist Darkhotel Aug 2015](https://securelist.com/darkhotels-attacks-in-2015/71713/) [Microsoft Digital Defense FY20 Sept 2020](https://query.prod.cms.rt.microsoft.com/cms/api/am/binary/RWxPuf)"
