name: Wassonite
aliases:
- Wassonite
description: WASSONITE is a North Korea-linked APT that has targeted industrial sectors,
  including electric generation, nuclear energy, manufacturing, and research entities
  in India, South Korea, and Japan since at least 2018. The group employs DTrack RAT
  for remote access, Mimikatz for credential capture, and various system tools for
  lateral movement and file transfers. WASSONITE has been observed using nuclear energy-themed
  spear phishing lures to deploy the AppleSeed backdoor, which can take screenshots,
  log keystrokes, and execute commands from a C2 server. Their operations focus on
  initial access, reconnaissance, and data collection without demonstrating disruptive
  capabilities.
