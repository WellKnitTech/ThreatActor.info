description: Throughout 2018, CrowdStrike Intelligence tracked BOSS SPIDER as it regularly
  updated Samas ransomware and received payments to known Bitcoin (BTC) addresses.
  This consistent pace of activity came to an abrupt halt at the end of November 2018
  when the U.S. DoJ released an indictment for Iran-based individuals Faramarz Shahi
  Savandi and Mohammad Mehdi Shah Mansouri, alleged members of the group.
