name: Cyber Partisans
aliases:
- Cyber Partisans
description: The Cyber Partisans, a hacktivist group based in Belarus, has been involved
  in various cyber-attacks targeting organizations and infrastructure in Belarus and
  Ukraine. They have hacked and wiped the network of the Belarusian Telegraph Agency,
  targeted the Belarusian Red Cross, and conducted ransomware attacks on the Belarusian
  Railway and Belarusian State University. The group aims to expose alleged crimes
  committed by pro-government organizations and disrupt operations supporting the
  Russian military operation against Ukraine. They have also leaked stolen data to
  journalists and expressed support for Ukraine.
