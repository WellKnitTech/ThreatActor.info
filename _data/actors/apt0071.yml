software:
  - name: "Kwampirs"
    mitre_id: "S0236"
    url: "https://attack.mitre.org/software/S0236"
    type: "malware"
    stix_id: "malware--c2417bab-3189-4d4d-9d60-96de2cdaf0ab"
    description: "Kwampirs is a backdoor Trojan used by Orangeworm. Kwampirs has been found on machines which had software installed for the use and control of high-tech imaging devices such as X-Ray and MRI machines.(Citation: Symantec Orangeworm April 2018) Kwampirs has multiple technical overlaps with Shamoon based on reverse engineering analysis.(Citation: Cylera Kwampirs 2022)"
  - name: "netstat"
    mitre_id: "S0104"
    url: "https://attack.mitre.org/software/S0104"
    type: "tool"
    stix_id: "tool--4664b683-f578-434f-919b-1c1aad2a1111"
    description: "netstat is an operating system utility that displays active TCP connections, listening ports, and network statistics. (Citation: TechNet Netstat)"
  - name: "Net"
    mitre_id: "S0039"
    url: "https://attack.mitre.org/software/S0039"
    type: "tool"
    stix_id: "tool--03342581-f790-4f03-ba41-e82e67392e23"
    description: "The Net utility is a component of the Windows operating system. It is used in command-line operations for control of users, groups, services, and network connections. (Citation: Microsoft Net Utility)\n\nNet has a great deal of functionality, (Citation: Savill 1999) much of which is useful for an adversary, such as gathering system and network information for Discovery, moving laterally through SMB/Windows Admin Shares using <code>net use</code> commands, and interacting with services. The net1.exe"
  - name: "ipconfig"
    mitre_id: "S0100"
    url: "https://attack.mitre.org/software/S0100"
    type: "tool"
    stix_id: "tool--294e2560-bd48-44b2-9da2-833b5588ad11"
    description: "ipconfig is a Windows utility that can be used to find information about a system's TCP/IP, DNS, DHCP, and adapter configuration. (Citation: TechNet Ipconfig)"
  - name: "cmd"
    mitre_id: "S0106"
    url: "https://attack.mitre.org/software/S0106"
    type: "tool"
    stix_id: "tool--bba595da-b73a-4354-aa6c-224d4de7cb4e"
    description: "cmd is the Windows command-line interpreter that can be used to interact with systems and execute other processes and utilities. (Citation: TechNet Cmd)\n\nCmd.exe contains native functionality to perform many operations to interact with the system, including listing files in a directory (e.g., <code>dir</code> (Citation: TechNet Dir)), deleting files (e.g., <code>del</code> (Citation: TechNet Del)), and copying files (e.g., <code>copy</code> (Citation: TechNet Copy))."
  - name: "route"
    mitre_id: "S0103"
    url: "https://attack.mitre.org/software/S0103"
    type: "tool"
    stix_id: "tool--c11ac61d-50f4-444f-85d8-6f006067f0de"
    description: "route can be used to find or change information within the local system IP routing table. (Citation: TechNet Route)"
  - name: "Arp"
    mitre_id: "S0099"
    url: "https://attack.mitre.org/software/S0099"
    type: "tool"
    stix_id: "tool--30489451-5886-4c46-90c9-0dff9adc5252"
    description: "Arp displays and modifies information about a system's Address Resolution Protocol (ARP) cache. (Citation: TechNet Arp)"
  - name: "Systeminfo"
    mitre_id: "S0096"
    url: "https://attack.mitre.org/software/S0096"
    type: "tool"
    stix_id: "tool--7fcbc4e8-1989-441f-9ac5-e7b6ff5806f1"
    description: "Systeminfo is a Windows utility that can be used to gather detailed information about a computer. (Citation: TechNet Systeminfo)"
