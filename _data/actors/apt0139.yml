software:
  - name: "Peirates"
    mitre_id: "S0683"
    url: "https://attack.mitre.org/software/S0683"
    type: "tool"
    stix_id: "tool--79dd477a-8226-4b3d-ad15-28623675f221"
    description: "Peirates is a post-exploitation Kubernetes exploitation framework with a focus on gathering service account tokens for lateral movement and privilege escalation. The tool is written in GoLang and publicly available on GitHub.(Citation: Peirates GitHub)"
  - name: "MimiPenguin"
    mitre_id: "S0179"
    url: "https://attack.mitre.org/software/S0179"
    type: "tool"
    stix_id: "tool--5a33468d-844d-4b1f-98c9-0e786c556b27"
    description: "MimiPenguin is a credential dumper, similar to Mimikatz, designed specifically for Linux platforms. (Citation: MimiPenguin GitHub May 2017)"
  - name: "LaZagne"
    mitre_id: "S0349"
    url: "https://attack.mitre.org/software/S0349"
    type: "tool"
    stix_id: "tool--b76b2d94-60e4-4107-a903-4a3a7622fb3b"
    description: "LaZagne is a post-exploitation, open-source tool used to recover stored passwords on a system. It has modules for Windows, Linux, and OSX, but is mainly focused on Windows systems. LaZagne is publicly available on GitHub.(Citation: GitHub LaZagne Dec 2018)"
  - name: "Hildegard"
    mitre_id: "S0601"
    url: "https://attack.mitre.org/software/S0601"
    type: "malware"
    stix_id: "malware--40a1b8ec-7295-416c-a6b1-68181d86f120"
    description: "Hildegard is malware that targets misconfigured kubelets for initial access and runs cryptocurrency miner operations. The malware was first observed in January 2021. The TeamTNT activity group is believed to be behind Hildegard. (Citation: Unit 42 Hildegard Malware)"
