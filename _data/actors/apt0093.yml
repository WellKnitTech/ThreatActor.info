    type: "tool"
    stix_id: "tool--294e2560-bd48-44b2-9da2-833b5588ad11"
    description: "ipconfig is a Windows utility that can be used to find information about a system's TCP/IP, DNS, DHCP, and adapter configuration. (Citation: TechNet Ipconfig)"
  - name: "Ping"
    mitre_id: "S0097"
    url: "https://attack.mitre.org/software/S0097"
    type: "tool"
    stix_id: "tool--b77b563c-34bb-4fb8-86a3-3694338f7b47"
    description: "Ping is an operating system utility commonly used to troubleshoot and verify network connections. (Citation: TechNet Ping)"
  - name: "cmd"
    mitre_id: "S0106"
    url: "https://attack.mitre.org/software/S0106"
    type: "tool"
    stix_id: "tool--bba595da-b73a-4354-aa6c-224d4de7cb4e"
    description: "cmd is the Windows command-line interpreter that can be used to interact with systems and execute other processes and utilities. (Citation: TechNet Cmd)\n\nCmd.exe contains native functionality to perform many operations to interact with the system, including listing files in a directory (e.g., <code>dir</code> (Citation: TechNet Dir)), deleting files (e.g., <code>del</code> (Citation: TechNet Del)), and copying files (e.g., <code>copy</code> (Citation: TechNet Copy))."
  - name: "China Chopper"
    mitre_id: "S0020"
    url: "https://attack.mitre.org/software/S0020"
    type: "malware"
    stix_id: "malware--5a3a31fe-5a8f-48e1-bff0-a753e5b1be70"
    description: "China Chopper is a Web Shell hosted on Web servers to provide access back into an enterprise network that does not rely on an infected system calling back to a remote command and control server.(Citation: Lee 2013) It has been used by several threat groups.(Citation: Dell TG-3390)(Citation: FireEye Periscope March 2018)(Citation: CISA AA21-200A APT40 July 2021)(Citation: Rapid7 HAFNIUM Mar 2021)"
  - name: "PoisonIvy"
    mitre_id: "S0012"
    url: "https://attack.mitre.org/software/S0012"
    type: "malware"
    stix_id: "malware--b42378e0-f147-496f-992a-26a49705395b"
    description: "PoisonIvy is a popular remote access tool (RAT) that has been used by many groups.(Citation: FireEye Poison Ivy)(Citation: Symantec Elderwood Sept 2012)(Citation: Symantec Darkmoon Aug 2005)"
  - name: "at"
    mitre_id: "S0110"
    url: "https://attack.mitre.org/software/S0110"
    type: "tool"
    stix_id: "tool--0c8465c0-d0b4-4670-992e-4eee8d7ff952"
    description: "at is used to schedule tasks on a system to run at a specified date or time.(Citation: TechNet At)(Citation: Linux at)"
  - name: "PlugX"
    mitre_id: "S0013"
    url: "https://attack.mitre.org/software/S0013"
    type: "malware"
    stix_id: "malware--64fa0de0-6240-41f4-8638-f4ca7ed528fd"
    description: "PlugX is a remote access tool (RAT) with modular plugins that has been used by multiple threat groups.(Citation: Lastline PlugX Analysis)(Citation: FireEye Clandestine Fox Part 2)(Citation: New DragonOK)(Citation: Dell TG-3390)"
  - name: "PingPull"
    mitre_id: "S1031"
    url: "https://attack.mitre.org/software/S1031"
    type: "malware"
    stix_id: "malware--3a0f6128-0a01-421d-8eca-e57d8671b1f1"
    description: "PingPull is a remote access Trojan (RAT) written in Visual C++ that has been used by GALLIUM since at least June 2022. PingPull has been used to target telecommunications companies, financial institutions, and government entities in Afghanistan, Australia, Belgium, Cambodia, Malaysia, Mozambique, the Philippines, Russia, and Vietnam.(Citation: Unit 42 PingPull Jun 2022)"
  - name: "BlackMould"
    mitre_id: "S0564"
    url: "https://attack.mitre.org/software/S0564"
    type: "malware"
    stix_id: "malware--63c4511b-2d6e-4bb2-b582-e2e99a8a467d"
    description: "BlackMould is a web shell based on China Chopper for servers running Microsoft IIS. First reported in December 2019, it has been used in malicious campaigns by GALLIUM against telecommunication providers.(Citation: Microsoft GALLIUM December 2019)"
  - name: "Mimikatz"
    mitre_id: "S0002"
    url: "https://attack.mitre.org/software/S0002"
    type: "tool"
    stix_id: "tool--afc079f3-c0ea-4096-b75d-3f05338b7f60"
    description: "Mimikatz is a credential dumper capable of obtaining plaintext Windows account logins and passwords, along with many other features that make it useful for testing the security of networks. (Citation: Deply Mimikatz) (Citation: Adsecurity Mimikatz Guide)"
  - name: "Net"
    mitre_id: "S0039"
    url: "https://attack.mitre.org/software/S0039"
    type: "tool"
    stix_id: "tool--03342581-f790-4f03-ba41-e82e67392e23"
    description: "The Net utility is a component of the Windows operating system. It is used in command-line operations for control of users, groups, services, and network connections. (Citation: Microsoft Net Utility)\n\nNet has a great deal of functionality, (Citation: Savill 1999) much of which is useful for an adversary, such as gathering system and network information for Discovery, moving laterally through SMB/Windows Admin Shares using <code>net use</code> commands, and interacting with services. The net1.exe"
  - name: "Reg"
    mitre_id: "S0075"
    url: "https://attack.mitre.org/software/S0075"
    type: "tool"
    stix_id: "tool--cde2d700-9ed1-46cf-9bce-07364fe8b24f"
    description: "Reg is a Windows utility used to interact with the Windows Registry. It can be used at the command-line interface to query, add, modify, and remove information. (Citation: Microsoft Reg)\n\nUtilities such as Reg are known to be used by persistent threats. (Citation: Windows Commands JPCERT)"
  - name: "PsExec"
    mitre_id: "S0029"
    url: "https://attack.mitre.org/software/S0029"
    type: "tool"
    stix_id: "tool--ff6caf67-ea1f-4895-b80e-4bb0fc31c6db"
    description: "PsExec is a free Microsoft tool that can be used to execute a program on another computer. It is used by IT administrators and attackers.(Citation: Russinovich Sysinternals)(Citation: SANS PsExec)"
  - name: "HTRAN"
    mitre_id: "S0040"
    url: "https://attack.mitre.org/software/S0040"
    type: "tool"
    stix_id: "tool--d5e96a35-7b0b-4c6a-9533-d63ecbda563e"
    description: "HTRAN is a tool that proxies connections through intermediate hops and aids users in disguising their true geographical location. It can be used by adversaries to hide their location when interacting with the victim networks. (Citation: Operation Quantum Entanglement)(Citation: NCSC Joint Report Public Tools)"
  - name: "NBTscan"
    mitre_id: "S0590"
    url: "https://attack.mitre.org/software/S0590"
    type: "tool"
    stix_id: "tool--b63970b7-ddfb-4aee-97b1-80d335e033a8"
    description: "NBTscan is an open source tool that has been used by state groups to conduct internal reconnaissance within a compromised network.(Citation: Debian nbtscan Nov 2019)(Citation: SecTools nbtscan June 2003)(Citation: Symantec Waterbug Jun 2019)(Citation: FireEye APT39 Jan 2019)"
  - name: "Windows Credential Editor"
    mitre_id: "S0005"
    url: "https://attack.mitre.org/software/S0005"
    type: "tool"
    stix_id: "tool--242f3da3-4425-4d11-8f5c-b842886da966"
    description: "Windows Credential Editor is a password dumping tool. (Citation: Amplia WCE)"
