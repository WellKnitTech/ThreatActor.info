description: KAX17 is a sophisticated threat actor that has been active since at least
  2017. They have operated hundreds of malicious servers within the Tor network, primarily
  as entry and middle points. Their main objective appears to be collecting information
  on Tor users and mapping their routes within the network. Despite efforts to remove
  their servers, KAX17 has shown resilience and continues to operate.
