description: Storm-1679 is a Russian disinformation group believed to be a spinoff
  of the Internet Research Agency, actively engaged in influence operations targeting
  the International Olympic Committee and the 2024 Olympic Games. The group has employed
  AI-generated content, including deepfake videos and fabricated narratives about
  violence, to discredit the IOC and instill fear among potential attendees. Their
  campaigns have been identified across multiple languages and platforms, utilizing
  techniques such as impersonation of media outlets and the creation of disinformation
  websites. Microsoft attributes significant disinformation activities related to
  the Olympics to Storm-1679, highlighting their focus on spreading falsehoods and
  promoting anti-Olympics messaging.
