description: Luna Moth conducts high-tempo callback phishing campaigns targeting legal
  and financial organizations in the U.S., using social engineering to lure victims
  into calling fake helpdesk numbers. Attackers impersonate IT staff to install legitimate
  RMM tools, enabling direct access to victim systems for data exfiltration. The group
  demands ransoms between $1 million and $8 million, threatening to leak stolen data
  if payments are not made. Their operations reflect a shift from traditional ransomware
  tactics to data breach extortion, leveraging trusted systems to evade detection.
