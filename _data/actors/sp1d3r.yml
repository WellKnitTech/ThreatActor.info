description: Sp1d3r, a threat actor, has been involved in multiple data breaches targeting
  companies like Truist Bank, Cylance, and Advance Auto Parts. They have stolen and
  attempted to sell sensitive information, including customer and employee emails,
  account numbers, and source code. Sp1d3r has also claimed to have obtained data
  from a third-party platform and a cloud storage vendor. They have utilized hacking
  forums to sell the stolen data for significant sums of money.
