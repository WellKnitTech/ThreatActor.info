description: GoldFactory is a threat actor group attributed to developing sophisticated
  mobile banking malware targeting victims primarily in the Asia-Pacific region, specifically
  Vietnam and Thailand. They utilize social engineering to deliver malware to victims'
  devices and have close connections to the Gigabud malware family. GoldFactory's
  Trojans, such as GoldPickaxe and GoldDigger, employ tactics like smishing, phishing,
  and fake login screens to compromise victims' phones and steal sensitive information.
  Their evolving malware suite demonstrates a high level of operational maturity and
  ingenuity, requiring a proactive and multi-faceted cybersecurity approach to detect
  and mitigate their threats.
