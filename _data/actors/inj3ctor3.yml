  for data exfiltration and persistence. The group utilizes tools for SIP server exploitation,
  including brute-force scripts and authentication bypass techniques. Observations
  indicate a resurgence of their attack patterns, reflecting historical behaviors
  while adapting to current vulnerabilities.
