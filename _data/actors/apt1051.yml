  - name: "Rclone"
    mitre_id: "S1040"
    url: "https://attack.mitre.org/software/S1040"
    type: "tool"
    stix_id: "tool--59096109-a1dd-463b-87e7-a8d110fe3a79"
    description: "Rclone is a command line program for syncing files with cloud storage services such as Dropbox, Google Drive, Amazon S3, and MEGA. Rclone has been used in a number of ransomware campaigns, including those associated with the Conti and DarkSide Ransomware-as-a-Service operations.(Citation: Rclone)(Citation: Rclone Wars)(Citation: Detecting Rclone)(Citation: DarkSide Ransomware Gang)(Citation: DFIR Conti Bazar Nov 2021)"
  - name: "Medusa Ransomware"
    mitre_id: "S1244"
    url: "https://attack.mitre.org/software/S1244"
    type: "malware"
    stix_id: "malware--28d93902-30e7-4436-8885-6d312c51c9a3"
    description: "Medusa Ransomware has been utilized in attacks since at least 2021. Medusa Ransomware has been known to be utilized in conjunction with living off the land techniques and remote management software. Medusa Ransomware has been used in campaigns associated with “double extortion” ransomware activity, where data is exfiltrated from victim environments prior to encryption, with threats to publish files if a ransom is not paid. Medusa Ransomware software was initially a closed ransomware variant which"
  - name: "Mimikatz"
    mitre_id: "S0002"
    url: "https://attack.mitre.org/software/S0002"
    type: "tool"
    stix_id: "tool--afc079f3-c0ea-4096-b75d-3f05338b7f60"
    description: "Mimikatz is a credential dumper capable of obtaining plaintext Windows account logins and passwords, along with many other features that make it useful for testing the security of networks. (Citation: Deply Mimikatz) (Citation: Adsecurity Mimikatz Guide)"
  - name: "PsExec"
    mitre_id: "S0029"
