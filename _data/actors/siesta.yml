description: 'FireEye recently looked deeper into the activity discussed in TrendMicro’s
  blog and dubbed the “Siesta” campaign. The tools, modus operandi, and infrastructure
  used in the campaign present two possibilities: either the Chinese cyber-espionage
  unit APT1 is perpetrating this activity, or another group is using the same tactics
  and tools as the legacy APT1.

  The Siesta campaign reinforces the fact that analysts and network defenders should
  remain on the lookout for known, public indicators and for shared attributes that
  allow security experts to detect multiple actors with one signature.'
