description: Wildcard is a threat actor that initially targeted Israel's educational
  sector with the SysJoker malware. They have since expanded their operations and
  developed additional malware variants, disguised as legitimate software, including
  one written in the Rust programming language called RustDown. Their precise identity
  remains unknown, but they have shown advanced capabilities and a focus on critical
  sectors within Israel.
