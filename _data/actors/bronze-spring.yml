description: "BRONZE SPRING is a threat group that CTU researchers assess with high
  confidence operates on behalf of China in the theft of intellectual property from
  defense, engineering, pharmaceutical and technology companies. The threat group
  typically uses scan-and-exploit for initial access, deploys the China Chopper webshell
  for remote execution and persistence, and creates RAR archives with a '.jpg' file
  extension for data exfiltration. \nIn July 2020 the U.S. Department of Justice indicted
  two Chinese hackers CTU researchers assess are members of the BRONZE SPRING threat
  group. The Department of Justice allege these hackers were responsible for compromising
  networks of hundreds of organisations and individuals in the U.S. and abroad since
  2009, and that exfiltrated data would be passed to the Chinese Ministry of State
  Security or sold for financial gain."
