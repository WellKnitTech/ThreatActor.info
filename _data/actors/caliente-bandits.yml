name: Caliente Bandits
aliases:
- TA2721
- Caliente Bandits
description: Caliente Bandits is a highly active threat group that targets multiple
  industries, including finance and entertainment. They distribute the Bandook remote
  access trojan using Spanish-language lures through low-volume email campaigns. The
  group primarily impacts individuals with Spanish surnames and conducts reconnaissance
  to obtain employee data. They masquerade as companies in South America and use Hotmail
  or Gmail email addresses.
