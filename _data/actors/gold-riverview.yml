name: GOLD RIVERVIEW
aliases:
- GOLD RIVERVIEW
description: GOLD RIVERVIEW was a financially motivated cybercriminal group that facilitated
  the distribution of malware- and scam-laden spam email on behalf of its customers.
  This threat group authored and sold the Necurs rootkit beginning in early 2014,
  including to GOLD EVERGREEN who integrated it into Gameover Zeus. GOLD RIVERVIEW
  also operated a global botnet that was colloquially known as Necurs (CraP2P) and
  was a major source of spam email from 2016 through 2018. Necurs distributed malware
  such as GOLD DRAKE's Dridex (Bugat v5), GOLD BLACKBURN's TrickBot, and other families
  like Locky and FlawedAmmy. Necurs also distributed a large volume of email pushing
  securities 'pump and dump' scams, rogue pharmacies, and fraudulent dating sites.
  On March 4, 2019 all three active segments of the Necurs botnet ceased operation
  and have not since resumed. On March 10, 2020 Microsoft took civil action against
  GOLD RIVERVIEW and made technical steps that would complicate the threat actors'
  ability to reconstitute the botnet.
