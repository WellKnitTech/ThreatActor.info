description: The Syrian Electronic Army (SEA) is a group of computer hackers which
  first surfaced online in 2011 to support the government of Syrian President Bashar
  al-Assad. Using spamming, website defacement, malware, phishing, and denial of service
  attacks, it has targeted political opposition groups, western news organizations,
  human rights groups and websites that are seemingly neutral to the Syrian conflict.
  It has also hacked government websites in the Middle East and Europe, as well as
  US defense contractors. As of 2011 the SEA has been *the first Arab country to have
  a public Internet Army hosted on its national networks to openly launch cyber attacks
  on its enemies*. The precise nature of SEA's relationship with the Syrian government
  has changed over time and is unclear
