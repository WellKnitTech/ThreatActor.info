    type: "malware"
    stix_id: "malware--b45747dc-87ca-4597-a245-7e16a61bc491"
    description: "Seasalt is malware that has been linked to APT1's 2010 operations. It shares some code similarities with OceanSalt.(Citation: Mandiant APT1 Appendix)(Citation: McAfee Oceansalt Oct 2018)"
  - name: "ipconfig"
    mitre_id: "S0100"
    url: "https://attack.mitre.org/software/S0100"
    type: "tool"
    stix_id: "tool--294e2560-bd48-44b2-9da2-833b5588ad11"
    description: "ipconfig is a Windows utility that can be used to find information about a system's TCP/IP, DNS, DHCP, and adapter configuration. (Citation: TechNet Ipconfig)"
  - name: "BISCUIT"
    mitre_id: "S0017"
    url: "https://attack.mitre.org/software/S0017"
    type: "malware"
    stix_id: "malware--b8eb28e4-48a6-40ae-951a-328714f75eda"
    description: "BISCUIT is a backdoor that has been used by APT1 since as early as 2007. (Citation: Mandiant APT1)"
  - name: "Cachedump"
    mitre_id: "S0119"
    url: "https://attack.mitre.org/software/S0119"
    type: "tool"
    stix_id: "tool--c9cd7ec9-40b7-49db-80be-1399eddd9c52"
    description: "Cachedump is a publicly-available tool that program extracts cached password hashes from a system’s registry. (Citation: Mandiant APT1)"
  - name: "PsExec"
    mitre_id: "S0029"
    url: "https://attack.mitre.org/software/S0029"
    type: "tool"
    stix_id: "tool--ff6caf67-ea1f-4895-b80e-4bb0fc31c6db"
    description: "PsExec is a free Microsoft tool that can be used to execute a program on another computer. It is used by IT administrators and attackers.(Citation: Russinovich Sysinternals)(Citation: SANS PsExec)"
  - name: "GLOOXMAIL"
    mitre_id: "S0026"
    url: "https://attack.mitre.org/software/S0026"
    type: "malware"
    stix_id: "malware--f2e8c7a1-cae1-45c4-baf0-6f21bdcbb2c2"
    description: "GLOOXMAIL is malware used by APT1 that mimics legitimate Jabber/XMPP traffic. (Citation: Mandiant APT1)"
  - name: "Lslsass"
    mitre_id: "S0121"
    url: "https://attack.mitre.org/software/S0121"
    type: "tool"
    stix_id: "tool--2fab555f-7664-4623-b4e0-1675ae38190b"
    description: "Lslsass is a publicly-available tool that can dump active logon session password hashes from the lsass process. (Citation: Mandiant APT1)"
  - name: "PoisonIvy"
    mitre_id: "S0012"
    url: "https://attack.mitre.org/software/S0012"
    type: "malware"
    stix_id: "malware--b42378e0-f147-496f-992a-26a49705395b"
    description: "PoisonIvy is a popular remote access tool (RAT) that has been used by many groups.(Citation: FireEye Poison Ivy)(Citation: Symantec Elderwood Sept 2012)(Citation: Symantec Darkmoon Aug 2005)"
  - name: "WEBC2"
    mitre_id: "S0109"
    url: "https://attack.mitre.org/software/S0109"
    type: "malware"
    stix_id: "malware--1d808f62-cf63-4063-9727-ff6132514c22"
    description: "WEBC2 is a family of backdoor malware used by APT1 as early as July 2006. WEBC2 backdoors are designed to retrieve a webpage, with commands hidden in HTML comments or special tags, from a predetermined C2 server. (Citation: Mandiant APT1 Appendix)(Citation: Mandiant APT1)"
  - name: "Mimikatz"
    mitre_id: "S0002"
    url: "https://attack.mitre.org/software/S0002"
    type: "tool"
    stix_id: "tool--afc079f3-c0ea-4096-b75d-3f05338b7f60"
    description: "Mimikatz is a credential dumper capable of obtaining plaintext Windows account logins and passwords, along with many other features that make it useful for testing the security of networks. (Citation: Deply Mimikatz) (Citation: Adsecurity Mimikatz Guide)"
  - name: "gsecdump"
    mitre_id: "S0008"
    url: "https://attack.mitre.org/software/S0008"
    type: "tool"
    stix_id: "tool--b07c2c47-fefb-4d7c-a69e-6a3296171f54"
    description: "gsecdump is a publicly-available credential dumper used to obtain password hashes and LSA secrets from Windows operating systems. (Citation: TrueSec Gsecdump)"
  - name: "Pass-The-Hash Toolkit"
    mitre_id: "S0122"
    url: "https://attack.mitre.org/software/S0122"
    type: "tool"
    stix_id: "tool--a52edc76-328d-4596-85e7-d56ef5a9eb69"
    description: "Pass-The-Hash Toolkit is a toolkit that allows an adversary to \"pass\" a password hash (without knowing the original password) to log in to systems. (Citation: Mandiant APT1)"
  - name: "CALENDAR"
    mitre_id: "S0025"
    url: "https://attack.mitre.org/software/S0025"
    type: "malware"
    stix_id: "malware--5a84dc36-df0d-4053-9b7c-f0c388a57283"
    description: "CALENDAR is malware used by APT1 that mimics legitimate Gmail Calendar traffic. (Citation: Mandiant APT1)"
  - name: "Tasklist"
    mitre_id: "S0057"
    url: "https://attack.mitre.org/software/S0057"
    type: "tool"
    stix_id: "tool--2e45723a-31da-4a7e-aaa6-e01998a6788f"
    description: "The Tasklist utility displays a list of applications and services with their Process IDs (PID) for all tasks running on either a local or a remote computer. It is packaged with Windows operating systems and can be executed from the command-line interface. (Citation: Microsoft Tasklist)"
  - name: "Net"
    mitre_id: "S0039"
    url: "https://attack.mitre.org/software/S0039"
    type: "tool"
    stix_id: "tool--03342581-f790-4f03-ba41-e82e67392e23"
    description: "The Net utility is a component of the Windows operating system. It is used in command-line operations for control of users, groups, services, and network connections. (Citation: Microsoft Net Utility)\n\nNet has a great deal of functionality, (Citation: Savill 1999) much of which is useful for an adversary, such as gathering system and network information for Discovery, moving laterally through SMB/Windows Admin Shares using <code>net use</code> commands, and interacting with services. The net1.exe"
  - name: "xCmd"
    mitre_id: "S0123"
    url: "https://attack.mitre.org/software/S0123"
    type: "tool"
    stix_id: "tool--4fa49fc0-9162-4bdb-a37e-7aa3dcb6d38b"
    description: "xCmd is an open source tool that is similar to PsExec and allows the user to execute applications on remote systems. (Citation: xCmd)"
  - name: "pwdump"
    mitre_id: "S0006"
    url: "https://attack.mitre.org/software/S0006"
    type: "tool"
    stix_id: "tool--9de2308e-7bed-43a3-8e58-f194b3586700"
    description: "pwdump is a credential dumper. (Citation: Wikipedia pwdump)"
