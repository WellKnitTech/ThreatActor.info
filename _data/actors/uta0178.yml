description: While Volexity largely observed the attacker essentially living off the
  land, they still deployed a handful of malware files and tools during the course
  of the incident which primarily consisted of webshells, proxy utilities, and file
  modifications to allow credential harvesting. Once UTA0178 had access into the network
  via the ICS VPN appliance, their general approach was to pivot from system to system
  using compromised credentials. They would then further compromise credentials of
  users on any new system that was breached, and use these credentials to log into
  additional systems via RDP. Volexity observed the attacker obtaining credentials
  in a variety of ways.
