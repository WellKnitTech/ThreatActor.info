software:
  - name: "Pikabot"
    mitre_id: "S1145"
    url: "https://attack.mitre.org/software/S1145"
    type: "malware"
    stix_id: "malware--02739f57-7585-4319-acd3-794ae8ff3a70"
    description: "Pikabot is a backdoor used for initial access and follow-on tool deployment active since early 2023. Pikabot is notable for extensive use of multiple encoding, encryption, and defense evasion mechanisms to evade defenses and avoid analysis. Pikabot has some overlaps with QakBot, but insufficient evidence exists to definitively link these two malware families. Pikabot is frequently used to deploy follow on tools such as Cobalt Strike or ransomware variants.(Citation: Zscaler Pikabot 2023)(Citation"
  - name: "QakBot"
    mitre_id: "S0650"
    url: "https://attack.mitre.org/software/S0650"
    type: "malware"
    stix_id: "malware--edc5e045-5401-42bb-ad92-52b5b2ee0de9"
    description: "QakBot is a modular banking trojan that has been used primarily by financially-motivated actors since at least 2007. QakBot is continuously maintained and developed and has evolved from an information stealer into a delivery agent for ransomware, most notably ProLock and Egregor.(Citation: Trend Micro Qakbot December 2020)(Citation: Red Canary Qbot)(Citation: Kaspersky QakBot September 2021)(Citation: ATT QakBot April 2021)"
  - name: "Latrodectus"
    mitre_id: "S1160"
    url: "https://attack.mitre.org/software/S1160"
    type: "malware"
    stix_id: "malware--76fde8df-3495-47c9-82eb-125c4f7fb621"
    description: "Latrodectus is a Windows malware downloader that has been used since at least 2023 to download and execute additional payloads and modules. Latrodectus has most often been distributed through email campaigns, primarily by TA577 and TA578, and has infrastructure overlaps with historic IcedID operations.(Citation: Latrodectus APR 2024)(Citation: Bleeping Computer Latrodectus April 2024)(Citation: Bitsight Latrodectus June 2024)"
