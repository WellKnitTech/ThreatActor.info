software:
  - name: "PLEAD"
    mitre_id: "S0435"
    url: "https://attack.mitre.org/software/S0435"
    type: "malware"
    stix_id: "malware--b57f419e-8b12-49d3-886b-145383725dcd"
    description: "PLEAD is a remote access tool (RAT) and downloader used by BlackTech in targeted attacks in East Asia including Taiwan, Japan, and Hong Kong.(Citation: TrendMicro BlackTech June 2017)(Citation: JPCert PLEAD Downloader June 2018) PLEAD has also been referred to as TSCookie, though more recent reporting indicates likely separation between the two. PLEAD was observed in use as early as March 2017.(Citation: JPCert TSCookie March 2018)(Citation: JPCert PLEAD Downloader June 2018)"
  - name: "Kivars"
    mitre_id: "S0437"
    url: "https://attack.mitre.org/software/S0437"
    type: "malware"
    stix_id: "malware--b2d134a1-7bd5-4293-94d4-8fc978cb1cd7"
    description: "Kivars is a modular remote access tool (RAT), derived from the Bifrost RAT, that was used by BlackTech in a 2010 campaign.(Citation: TrendMicro BlackTech June 2017)"
  - name: "PsExec"
    mitre_id: "S0029"
    url: "https://attack.mitre.org/software/S0029"
    type: "tool"
    stix_id: "tool--ff6caf67-ea1f-4895-b80e-4bb0fc31c6db"
    description: "PsExec is a free Microsoft tool that can be used to execute a program on another computer. It is used by IT administrators and attackers.(Citation: Russinovich Sysinternals)(Citation: SANS PsExec)"
  - name: "TSCookie"
    mitre_id: "S0436"
    url: "https://attack.mitre.org/software/S0436"
    type: "malware"
    stix_id: "malware--76ac7989-c5cc-42e2-93e3-d6c476f01ace"
    description: "TSCookie is a remote access tool (RAT) that has been used by BlackTech in campaigns against Japanese targets.(Citation: JPCert TSCookie March 2018)(Citation: JPCert BlackTech Malware September 2019). TSCookie has been referred to as PLEAD though more recent reporting indicates a separation between the two.(Citation: JPCert PLEAD Downloader June 2018)(Citation: JPCert BlackTech Malware September 2019)"
  - name: "Flagpro"
    mitre_id: "S0696"
    url: "https://attack.mitre.org/software/S0696"
    type: "malware"
    stix_id: "malware--592260fb-dd5c-4a30-8d99-106a0485be0d"
    description: "Flagpro is a Windows-based, first-stage downloader that has been used by BlackTech since at least October 2020. It has primarily been used against defense, media, and communications companies in Japan.(Citation: NTT Security Flagpro new December 2021) "
  - name: "Waterbear"
    mitre_id: "S0579"
    url: "https://attack.mitre.org/software/S0579"
    type: "malware"
    stix_id: "malware--f3f1fbed-7e29-49cb-8579-4a378f858deb"
    description: "Waterbear is modular malware attributed to BlackTech that has been used primarily for lateral movement, decrypting, and triggering payloads and is capable of hiding network behaviors.(Citation: Trend Micro Waterbear December 2019)"
