description: TwoSail Junk directs visitors to its exploit site by posting links within
  the threads of forum discussions, or creating new topic threads of their own. To
  date, dozens of visits were recorded from within Hong Kong, with a couple from Macau.
  The technical details around the functionality of the iOS implant, called LightSpy,
  and related infrastructure, reveal a low-to-mid capable actor. However, the iOS
  implant is a modular and exhaustively functional iOS surveillance framework.
