description: 'In late March 2020, Proofpoint researchers began tracking a new actor
  with a penchant for using NanoCore and later AsyncRAT, popular commodity remote
  access trojans (RATs). Dubbed TA2719 by Proofpoint, the actor uses localized lures
  with colorful images that impersonate local banks, law enforcement, and shipping
  services. Proofpoint has observed this actor send low volume campaigns to recipients
  in Austria, Chile, Greece, Hungary, Italy, North Macedonia, Netherlands, Spain,
  Sweden, Taiwan, United States, and Uruguay. '
