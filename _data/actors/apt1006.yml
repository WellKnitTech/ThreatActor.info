software:
  - name: "Mimikatz"
    mitre_id: "S0002"
    url: "https://attack.mitre.org/software/S0002"
    type: "tool"
    stix_id: "tool--afc079f3-c0ea-4096-b75d-3f05338b7f60"
    description: "Mimikatz is a credential dumper capable of obtaining plaintext Windows account logins and passwords, along with many other features that make it useful for testing the security of networks. (Citation: Deply Mimikatz) (Citation: Adsecurity Mimikatz Guide)"
  - name: "PowerSploit"
    mitre_id: "S0194"
    url: "https://attack.mitre.org/software/S0194"
    type: "tool"
    stix_id: "tool--13cd9151-83b7-410d-9f98-25d0f0d1d80d"
    description: "PowerSploit is an open source, offensive security framework comprised of PowerShell modules and scripts that perform a wide range of tasks related to penetration testing such as code execution, persistence, bypassing anti-virus, recon, and exfiltration. (Citation: GitHub PowerSploit May 2012) (Citation: PowerShellMagazine PowerSploit July 2014) (Citation: PowerSploit Documentation)"
  - name: "Tasklist"
    mitre_id: "S0057"
    url: "https://attack.mitre.org/software/S0057"
    type: "tool"
    stix_id: "tool--2e45723a-31da-4a7e-aaa6-e01998a6788f"
    description: "The Tasklist utility displays a list of applications and services with their Process IDs (PID) for all tasks running on either a local or a remote computer. It is packaged with Windows operating systems and can be executed from the command-line interface. (Citation: Microsoft Tasklist)"
  - name: "certutil"
    mitre_id: "S0160"
    url: "https://attack.mitre.org/software/S0160"
    type: "tool"
    stix_id: "tool--0a68f1f1-da74-4d28-8d9a-696c082706cc"
    description: "certutil is a command-line utility that can be used to obtain certificate authority information and configure Certificate Services. (Citation: TechNet Certutil)"
  - name: "Cobalt Strike"
    mitre_id: "S0154"
    url: "https://attack.mitre.org/software/S0154"
    type: "malware"
    stix_id: "malware--a7881f21-e978-4fe4-af56-92c9416a2616"
    description: "Cobalt Strike is a commercial, full-featured, remote access tool that bills itself as “adversary simulation software designed to execute targeted attacks and emulate the post-exploitation actions of advanced threat actors”. Cobalt Strike’s interactive post-exploit capabilities cover the full range of ATT&CK tactics, all executed within a single, integrated system.(Citation: cobaltstrike manual)\n\nIn addition to its own capabilities, Cobalt Strike leverages the capabilities of other well-known tool"
  - name: "Winnti for Linux"
    mitre_id: "S0430"
    url: "https://attack.mitre.org/software/S0430"
    type: "malware"
    stix_id: "malware--8787e86d-8475-4f13-acea-d33eb83b6105"
    description: "Winnti for Linux is a trojan, seen since at least 2015, designed specifically for targeting Linux systems. Reporting indicates the winnti malware family is shared across a number of actors including Winnti Group. The Windows variant is tracked separately under Winnti for Windows.(Citation: Chronicle Winnti for Linux May 2019)"
  - name: "Nltest"
    mitre_id: "S0359"
    url: "https://attack.mitre.org/software/S0359"
    type: "tool"
    stix_id: "tool--981acc4c-2ede-4b56-be6e-fa1a75f37acf"
    description: "Nltest is a Windows command-line utility used to list domain controllers and enumerate domain trusts.(Citation: Nltest Manual)"
  - name: "NBTscan"
    mitre_id: "S0590"
    url: "https://attack.mitre.org/software/S0590"
    type: "tool"
    stix_id: "tool--b63970b7-ddfb-4aee-97b1-80d335e033a8"
    description: "NBTscan is an open source tool that has been used by state groups to conduct internal reconnaissance within a compromised network.(Citation: Debian nbtscan Nov 2019)(Citation: SecTools nbtscan June 2003)(Citation: Symantec Waterbug Jun 2019)(Citation: FireEye APT39 Jan 2019)"
  - name: "ShadowPad"
    mitre_id: "S0596"
    url: "https://attack.mitre.org/software/S0596"
    type: "malware"
    stix_id: "malware--ec9e00dd-0313-4d5b-8105-c20aa47abffc"
    description: "ShadowPad is a modular backdoor that was first identified in a supply chain compromise of the NetSarang software in mid-July 2017. The malware was originally thought to be exclusively used by APT41, but has since been observed to be used by various Chinese threat activity groups. (Citation: Recorded Future RedEcho Feb 2021)(Citation: Securelist ShadowPad Aug 2017)(Citation: Kaspersky ShadowPad Aug 2017) "
