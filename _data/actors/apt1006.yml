description: 'Earth Lusca is a suspected China-based cyber espionage group that has
  been active since at least April 2019. Earth Lusca has targeted organizations in
  Australia, China, Hong Kong, Mongolia, Nepal, the Philippines, Taiwan, Thailand,
  Vietnam, the United Arab Emirates, Nigeria, Germany, France, and the United States.
  Targets included government institutions, news media outlets, gambling companies,
  educational institutions, COVID-19 research organizations, telecommunications companies,
  religious movements banned in China, and cryptocurrency trading platforms; security
  researchers assess some Earth Lusca operations may be financially motivated.(Citation:
  TrendMicro EarthLusca 2022)


  Earth Lusca has used malware commonly used by other Chinese threat groups, including
  APT41 and the Winnti Group cluster, however security researchers assess Earth Lusca''s
  techniques and infrastructure are separate.(Citation: TrendMicro EarthLusca 2022)'
