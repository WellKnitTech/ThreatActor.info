description: CryptoChameleon is a cybercriminal group known for targeting cryptocurrency
  exchanges and users to steal digital assets, employing tactics such as VIP spear
  phishing, SIM swapping, and email hacks. They have leveraged phishing kits, including
  a notable one associated with LastPass, and utilize infrastructure from bulletproof
  host NICENIC. The group primarily targets platforms like Coinbase and Ledger, and
  their attacks are characterized by rapid cash-out efforts following successful breaches.
  Their operational methods include manually guiding victims through phishing pages
  to evade detection by automated scanners.
