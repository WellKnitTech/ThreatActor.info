description: Velvet Tempest is a threat actor associated with the BlackCat ransomware
  group. They have been observed deploying multiple ransomware payloads, including
  BlackCat, and have targeted various industries such as energy, fashion, tobacco,
  IT, and manufacturing. Velvet Tempest relies on access brokers to gain network access
  and utilizes tools like Cobalt Strike Beacons and PsExec for lateral movement and
  payload staging. They exfiltrate stolen data using a tool called StealBit and frequently
  disable unprotected antivirus products.
