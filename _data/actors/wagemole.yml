description: WageMole is a North Korean state-sponsored APT that employs social engineering
  and technology to secure remote job opportunities in Western countries, leveraging
  stolen personal data from the Contagious Interview campaign. Threat actors create
  fake identities, including passports and driver's licenses, and prepare study guides
  for interviews, often utilizing generative AI for well-structured responses. They
  target small to mid-sized businesses and utilize job platforms like Upwork and Indeed,
  while employing automation scripts for account creation. WageMole's activities include
  sharing code within their group and requesting payments through platforms like PayPal
  to conceal their identity.
