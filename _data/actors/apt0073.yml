  - name: "Cobalt Strike"
    mitre_id: "S0154"
    url: "https://attack.mitre.org/software/S0154"
    type: "malware"
    stix_id: "malware--a7881f21-e978-4fe4-af56-92c9416a2616"
    description: "Cobalt Strike is a commercial, full-featured, remote access tool that bills itself as “adversary simulation software designed to execute targeted attacks and emulate the post-exploitation actions of advanced threat actors”. Cobalt Strike’s interactive post-exploit capabilities cover the full range of ATT&CK tactics, all executed within a single, integrated system.(Citation: cobaltstrike manual)\n\nIn addition to its own capabilities, Cobalt Strike leverages the capabilities of other well-known tool"
  - name: "Empire"
    mitre_id: "S0363"
    url: "https://attack.mitre.org/software/S0363"
    type: "tool"
    stix_id: "tool--3433a9e8-1c47-4320-b9bf-ed449061d1c3"
    description: "Empire is an open-source, cross-platform remote administration and post-exploitation framework that is publicly available on GitHub. While the tool itself is primarily written in Python, the post-exploitation agents are written in pure PowerShell for Windows and Python for Linux/macOS. Empire was one of five tools singled out by a joint report on public hacking tools being widely used by adversaries.(Citation: NCSC Joint Report Public Tools)(Citation: Github PowerShell Empire)(Citation: GitHub AT"
