name: "APT19"
aliases: ["APT19","Black Vine","BRONZE FIRESTONE","C0d0so","C0d0so0","Checkered Typhoon","Codoso","Codoso Team","DEEP PANDA","G0009","G0073","Group 13","KungFu Kittens","PinkPanther","Pupa","Shell Crew","Sunshop Group","TEMP.Avengers","WebMasters","CHLORINE","ATG50","TG-3551","Red Gargoyle"]
description: "APT19 is a Chinese-based threat group that has targeted a variety of industries, including defense, finance, energy, pharmaceutical, telecommunications, high tech, education, manufacturing, and legal services. In 2017, a phishing campaign was used to target seven law and investment firms. [FireEye APT19](https://www.fireeye.com/blog/threat-research/2017/06/phished-at-the-request-of-counsel.html) Some analysts track APT19 and Deep Panda as the same group, but it is unclear from open source information if the groups are the same. [ICIT China's Espionage Jul 2016](https://web.archive.org/web/20171017072306/https://icitech.org/icit-brief-chinas-espionage-dynasty-economic-death-by-a-thousand-cuts/) [FireEye APT Groups](https://www.fireeye.com/current-threats/apt-groups.html#apt19) [Unit 42 C0d0so0 Jan 2016](https://researchcenter.paloaltonetworks.com/2016/01/new-attacks-linked-to-c0d0s0-group/)"
