description: TA499, also known as Vovan and Lexus, is a Russia-aligned threat actor
  that has aggressively engaged in email campaigns since at least 2021.  The threat
  actor’s campaigns attempt to convince high-profile North American and European government
  officials as well as CEOs of prominent companies and celebrities into participating
  in recorded phone calls or video chats.
