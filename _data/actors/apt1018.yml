software:
  - name: "Snip3"
    mitre_id: "S1086"
    url: "https://attack.mitre.org/software/S1086"
    type: "malware"
    stix_id: "malware--4327aff5-f194-440c-b499-4d9730cc1eab"
    description: "Snip3 is a sophisticated crypter-as-a-service that has been used since at least 2021 to obfuscate and load numerous strains of malware including AsyncRAT, Revenge RAT, Agent Tesla, and NETWIRE.(Citation: Morphisec Snip3 May 2021)(Citation: Telefonica Snip3 December 2021)"
  - name: "Revenge RAT"
    mitre_id: "S0379"
    url: "https://attack.mitre.org/software/S0379"
    type: "malware"
    stix_id: "malware--bdb27a1d-1844-42f1-a0c0-826027ae0326"
    description: "Revenge RAT is a freely available remote access tool written in .NET (C#).(Citation: Cylance Shaheen Nov 2018)(Citation: Cofense RevengeRAT Feb 2019)"
  - name: "jRAT"
    mitre_id: "S0283"
    url: "https://attack.mitre.org/software/S0283"
    type: "malware"
    stix_id: "malware--efece7e8-e40b-49c2-9f84-c55c5c93d05c"
    description: "jRAT is a cross-platform, Java-based backdoor originally available for purchase in 2012. Variants of jRAT have been distributed via a software-as-a-service platform, similar to an online subscription model.(Citation: Kaspersky Adwind Feb 2016) (Citation: jRAT Symantec Aug 2018)"
  - name: "WarzoneRAT"
    mitre_id: "S0670"
    url: "https://attack.mitre.org/software/S0670"
    type: "malware"
    stix_id: "malware--fde19a18-e502-467f-be14-58c71b4e7f4b"
    description: "WarzoneRAT is a malware-as-a-service remote access tool (RAT) written in C++ that has been publicly available for purchase since at least late 2018.(Citation: Check Point Warzone Feb 2020)(Citation: Uptycs Warzone UAC Bypass November 2020)"
  - name: "Imminent Monitor"
    mitre_id: "S0434"
    url: "https://attack.mitre.org/software/S0434"
    type: "tool"
    stix_id: "tool--8f8cd191-902c-4e83-bf20-b57c8c4640e9"
    description: "Imminent Monitor was a commodity remote access tool (RAT) offered for sale from 2012 until 2019, when an operation was conducted to take down the Imminent Monitor infrastructure. Various cracked versions and variations of this RAT are still in circulation.(Citation: Imminent Unit42 Dec2019)"
  - name: "AsyncRAT"
    mitre_id: "S1087"
    url: "https://attack.mitre.org/software/S1087"
    type: "tool"
    stix_id: "tool--6a5947f3-1a36-4653-8734-526df3e1d28d"
    description: "AsyncRAT is an open-source remote access tool originally available through the NYANxCAT Github repository that has been used in malicious campaigns.(Citation: Morphisec Snip3 May 2021)(Citation: Cisco Operation Layover September 2021)(Citation: Telefonica Snip3 December 2021)"
  - name: "NETWIRE"
    mitre_id: "S0198"
    url: "https://attack.mitre.org/software/S0198"
    type: "malware"
    stix_id: "malware--2a70812b-f1ef-44db-8578-a496a227aef2"
    description: "NETWIRE is a publicly available, multiplatform remote administration tool (RAT) that has been used by criminal and APT groups since at least 2012.(Citation: FireEye APT33 Sept 2017)(Citation: McAfee Netwire Mar 2015)(Citation: FireEye APT33 Webinar Sept 2017)"
  - name: "Agent Tesla"
    mitre_id: "S0331"
    url: "https://attack.mitre.org/software/S0331"
    type: "malware"
    stix_id: "malware--e7a5229f-05eb-440e-b982-9a6d2b2b87c8"
    description: "Agent Tesla is a spyware Trojan written for the .NET framework that has been observed since at least 2014.(Citation: Fortinet Agent Tesla April 2018)(Citation: Bitdefender Agent Tesla April 2020)(Citation: Malwarebytes Agent Tesla April 2020)"
  - name: "njRAT"
    mitre_id: "S0385"
    url: "https://attack.mitre.org/software/S0385"
    type: "malware"
    stix_id: "malware--d906e6f7-434c-44c0-b51a-ed50af8f7945"
    description: "njRAT is a remote access tool (RAT) that was first observed in 2012. It has been used by threat actors in the Middle East.(Citation: Fidelis njRAT June 2013)"
