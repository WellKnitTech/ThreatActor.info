description: Dragos has identified a new activity group targeting access operations
  in the electric utility sector. We call this activity group RASPITE.  Analysis of
  RASPITE tactics, techniques, and procedures (TTPs) indicate the group has been active
  in some form since early- to mid-2017. RASPITE targeting includes entities in the
  US, Middle East, Europe, and East Asia. Operations against electric utility organizations
  appear limited to the US at this time.  RASPITE leverages strategic website compromise
  to gain initial access to target networks. RASPITE uses the same methodology as
  DYMALLOY and ALLANITE in embedding a link to a resource to prompt an SMB connection,
  from which it harvests Windows credentials. The group then deploys install scripts
  for a malicious service to beacon back to RASPITE-controlled infrastructure, allowing
  the adversary to remotely access the victim machine.
