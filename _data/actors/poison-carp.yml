description: Between November 2018 and May 2019, senior members of Tibetan groups
  received malicious links in individually tailored WhatsApp text exchanges with operators
  posing as NGO workers, journalists, and other fake personas. The links led to code
  designed to exploit web browser vulnerabilities to install spyware on iOS and Android
  devices, and in some cases to OAuth phishing pages. This campaign was carried out
  by what appears to be a single operator that we call POISON CARP.
