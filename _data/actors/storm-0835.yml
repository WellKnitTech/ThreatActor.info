description: Cybercriminals have launched a phishing campaign targeting senior executives
  in U.S. firms, using the EvilProxy phishing toolkit for credential harvesting and
  account takeover attacks. This campaign, initiated in July 2023, primarily targets
  sectors such as banking, financial services, insurance, property management, real
  estate, and manufacturing. The attackers exploit an open redirection vulnerability
  on the job search platform "indeed.com," redirecting victims to malicious phishing
  pages impersonating Microsoft. EvilProxy functions as a reverse proxy, intercepting
  credentials, two-factor authentication codes, and session cookies to hijack accounts.
  The threat actors, known as Storm-0835 by Microsoft, have hundreds of customers
  who pay monthly fees for their services, making attribution difficult. The attacks
  involve sending phishing emails with deceptive links to Indeed, redirecting victims
  to EvilProxy pages for credential harvesting.
