name: "Ajax Security Team"
aliases: ["Ajax Security Team","AjaxTM","Flying Kitten","Operation Saffron Rose","Operation Woolen-Goldfish","Rocket Kitten"]
description: "Ajax Security Team is a group that has been active since at least 2010 and believed to be operating out of Iran. By 2014 Ajax Security Team transitioned from website defacement operations to malware-based cyber espionage campaigns targeting the US defense industrial base and Iranian users of anti-censorship technologies.[FireEye Operation Saffron Rose 2013](https://www.mandiant.com/sites/default/files/2021-09/rpt-operation-saffron-rose.pdf)"
