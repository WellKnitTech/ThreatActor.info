description: 'BRONZE BUTLER is a cyber espionage group with likely Chinese origins
  that has been active since at least 2008. The group primarily targets Japanese organizations,
  particularly those in government, biotechnology, electronics manufacturing, and
  industrial chemistry.(Citation: Trend Micro Daserf Nov 2017)(Citation: Secureworks
  BRONZE BUTLER Oct 2017)(Citation: Trend Micro Tick November 2019)'
