description: DiceyF is an advanced persistent threat group that has been targeting
  online casinos and other victims in Southeast Asia for an extended period. They
  have exhibited overlapping activity with LuckyStar PlugX and Earth Berberoka/GamblingPuppet,
  as reported by various cybersecurity vendors. While their motivations remain unclear,
  previous incidents suggest a combination of espionage and intellectual property
  theft rather than immediate financial gain. DiceyF continuously evolves their codebase
  and adds encryption capabilities to enhance their stealthy cyberespionage activities.
