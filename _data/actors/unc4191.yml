description: UNC4191 is a China-linked threat actor that has been involved in cyber
  espionage campaigns targeting public and private sectors primarily in Southeast
  Asia. They have been known to use USB devices as an initial infection vector and
  have been observed deploying various malware families on infected systems. UNC4191's
  operations have also extended to the US, Europe, and the Asia Pacific Japan region,
  with a particular focus on the Philippines.
