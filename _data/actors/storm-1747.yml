description: Storm-1747 is an intrusion set that develops and operates the Tycoon
  2FA phishing kit, which has been active since at least mid-2023 and is known for
  its sophisticated obfuscation and exfiltration techniques. The kit has been sold
  and distributed under the PhaaS model, making it one of the most widespread phishing
  kits by early 2025.
