description: H0lyGh0st is a North Korean threat actor that has been active since June
  2021. They are responsible for developing and deploying the H0lyGh0st ransomware,
  which targets small-to-medium businesses in various sectors. The group employs "double
  extortion" tactics, encrypting data and threatening to publish it if the ransom
  is not paid. There are connections between H0lyGh0st and the PLUTONIUM APT group,
  indicating a possible affiliation.
