description: Anonymous 64 is a group accused by China's national security ministry
  of attempting to gain control of web portals, outdoor electronic screens, and network
  television. The Ministry of State Security claims that Anonymous 64 is linked to
  a cyber unit within Taiwan's defense ministry and identifies three active-duty military
  personnel as its members. The MSS alleges that the group is involved in an influence
  operation within China, using hacktivism as a cover. The accusations suggest that
  Anonymous 64 engages in sabotage activities, prompting authorities to call for public
  reporting of such actions.
