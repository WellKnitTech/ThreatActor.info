software:
  - name: "RawDisk"
    mitre_id: "S0364"
    url: "https://attack.mitre.org/software/S0364"
    type: "tool"
    stix_id: "tool--3ffbdc1f-d2bf-41ab-91a2-c7b857e98079"
    description: "RawDisk is a legitimate commercial driver from the EldoS Corporation that is used for interacting with files, disks, and partitions. The driver allows for direct modification of data on a local computer's hard drive. In some cases, the tool can enact these raw disk modifications from user-mode processes, circumventing Windows operating system security features.(Citation: EldoS RawDisk ITpro)(Citation: Novetta Blockbuster Destructive Malware)"
  - name: "Proxysvc"
    mitre_id: "S0238"
    url: "https://attack.mitre.org/software/S0238"
    type: "malware"
    stix_id: "malware--069af411-9b24-4e85-b26c-623d035bbe84"
    description: "Proxysvc is a malicious DLL used by Lazarus Group in a campaign known as Operation GhostSecret. It has appeared to be operating undetected since 2017 and was mostly observed in higher education organizations. The goal of Proxysvc is to deliver additional payloads to the target and to maintain control for the attacker. It is in the form of a DLL that can also be executed as a standalone process. (Citation: McAfee GhostSecret)"
  - name: "BADCALL"
    mitre_id: "S0245"
    url: "https://attack.mitre.org/software/S0245"
    type: "malware"
    stix_id: "malware--9dbdadb6-fdbf-490f-a35f-38762d06a0d2"
    description: "BADCALL is a Trojan malware variant used by the group Lazarus Group. (Citation: US-CERT BADCALL)"
  - name: "FALLCHILL"
    mitre_id: "S0181"
    url: "https://attack.mitre.org/software/S0181"
    type: "malware"
    stix_id: "malware--fece06b7-d4b1-42cf-b81a-5323c917546e"
    description: "FALLCHILL is a RAT that has been used by Lazarus Group since at least 2016 to target the aerospace, telecommunications, and finance industries. It is usually dropped by other Lazarus Group malware or delivered when a victim unknowingly visits a compromised website. (Citation: US-CERT FALLCHILL Nov 2017)"
  - name: "WannaCry"
    mitre_id: "S0366"
    url: "https://attack.mitre.org/software/S0366"
    type: "malware"
    stix_id: "malware--75ecdbf1-c2bb-4afc-a3f9-c8da4de8c661"
    description: "WannaCry is ransomware that was first seen in a global attack during May 2017, which affected more than 150 countries. It contains worm-like features to spread itself across a computer network using the SMBv1 exploit EternalBlue.(Citation: LogRhythm WannaCry)(Citation: US-CERT WannaCry 2017)(Citation: Washington Post WannaCry 2017)(Citation: FireEye WannaCry 2017)"
  - name: "MagicRAT"
    mitre_id: "S1182"
    url: "https://attack.mitre.org/software/S1182"
    type: "malware"
    stix_id: "malware--858b0f9d-3a2a-437e-a058-afe72154f6da"
    description: "MagicRAT is a remote access tool developed in C++ and exclusively used by the Lazarus Group threat actor in operations. MagicRAT allows for arbitrary command execution on victim machines and provides basic remote access functionality.(Citation: Cisco MagicRAT 2022)"
  - name: "HOPLIGHT"
    mitre_id: "S0376"
    url: "https://attack.mitre.org/software/S0376"
    type: "malware"
    stix_id: "malware--454fe82d-6fd2-4ac6-91ab-28a33fe01369"
    description: "HOPLIGHT is a backdoor Trojan that has reportedly been used by the North Korean government.(Citation: US-CERT HOPLIGHT Apr 2019)"
  - name: "TYPEFRAME"
    mitre_id: "S0263"
    url: "https://attack.mitre.org/software/S0263"
    type: "malware"
    stix_id: "malware--7ba0fc46-197d-466d-8b9f-f1c64d5d81e5"
    description: "TYPEFRAME is a remote access tool that has been used by Lazarus Group. (Citation: US-CERT TYPEFRAME June 2018)"
  - name: "Dtrack"
    mitre_id: "S0567"
    url: "https://attack.mitre.org/software/S0567"
    type: "malware"
    stix_id: "malware--f8774023-8021-4ece-9aca-383ac89d2759"
    description: "Dtrack is spyware that was discovered in 2019 and has been used against Indian financial institutions, research facilities, and the Kudankulam Nuclear Power Plant. Dtrack shares similarities with the DarkSeoul campaign, which was attributed to Lazarus Group. (Citation: Kaspersky Dtrack)(Citation: Securelist Dtrack)(Citation: Dragos WASSONITE)(Citation: CyberBit Dtrack)(Citation: ZDNet Dtrack)"
  - name: "HotCroissant"
    mitre_id: "S0431"
    url: "https://attack.mitre.org/software/S0431"
    type: "malware"
    stix_id: "malware--aad11e34-02ca-4220-91cd-2ed420af4db3"
    description: "HotCroissant is a remote access trojan (RAT) attributed by U.S. government entities to malicious North Korean government cyber activity, tracked collectively as HIDDEN COBRA.(Citation: US-CERT HOTCROISSANT February 2020) HotCroissant shares numerous code similarities with Rifdoor.(Citation: Carbon Black HotCroissant April 2020)"
  - name: "HARDRAIN"
    mitre_id: "S0246"
    url: "https://attack.mitre.org/software/S0246"
    type: "malware"
    stix_id: "malware--bd0536d7-b081-43ae-a773-cfb057c5b988"
    description: "HARDRAIN is a Trojan malware variant reportedly used by the North Korean government. (Citation: US-CERT HARDRAIN March 2018)"
  - name: "Dacls"
    mitre_id: "S0497"
    url: "https://attack.mitre.org/software/S0497"
    type: "malware"
    stix_id: "malware--3aa169f8-bbf6-44bb-b57d-7f6ada5c2128"
    description: "Dacls is a multi-platform remote access tool used by Lazarus Group since at least December 2019.(Citation: TrendMicro macOS Dacls May 2020)(Citation: SentinelOne Lazarus macOS July 2020)"
  - name: "KEYMARBLE"
    mitre_id: "S0271"
    url: "https://attack.mitre.org/software/S0271"
    type: "malware"
    stix_id: "malware--11e36d5b-6a92-4bf9-8eb7-85eb24f59e22"
    description: "KEYMARBLE is a Trojan that has reportedly been used by the North Korean government. (Citation: US-CERT KEYMARBLE Aug 2018)"
  - name: "TAINTEDSCRIBE"
    mitre_id: "S0586"
    url: "https://attack.mitre.org/software/S0586"
    type: "malware"
    stix_id: "malware--7f4bbe05-1674-4087-8a16-8f1ad61b6152"
    description: "TAINTEDSCRIBE is a fully-featured beaconing implant integrated with command modules used by Lazarus Group. It was first reported in May 2020.(Citation: CISA MAR-10288834-2.v1  TAINTEDSCRIBE MAY 2020)"
  - name: "AuditCred"
    mitre_id: "S0347"
    url: "https://attack.mitre.org/software/S0347"
    type: "malware"
    stix_id: "malware--24b4ce59-eaac-4c8b-8634-9b093b7ccd92"
    description: "AuditCred is a malicious DLL that has been used by Lazarus Group during their 2018 attacks.(Citation: TrendMicro Lazarus Nov 2018)"
  - name: "netsh"
    mitre_id: "S0108"
    url: "https://attack.mitre.org/software/S0108"
    type: "tool"
    stix_id: "tool--5a63f900-5e7e-4928-a746-dd4558e1df71"
    description: "netsh is a scripting utility used to interact with networking components on local or remote systems. (Citation: TechNet Netsh)"
  - name: "ECCENTRICBANDWAGON"
    mitre_id: "S0593"
    url: "https://attack.mitre.org/software/S0593"
    type: "malware"
    stix_id: "malware--e928333f-f3df-4039-9b8b-556c2add0e42"
    description: "ECCENTRICBANDWAGON is a remote access Trojan (RAT) used by North Korean cyber actors that was first identified in August 2020. It is a reconnaissance tool--with keylogging and screen capture functionality--used for information gathering on compromised systems.(Citation: CISA EB Aug 2020)"
  - name: "AppleJeus"
    mitre_id: "S0584"
    url: "https://attack.mitre.org/software/S0584"
    type: "malware"
    stix_id: "malware--e2d34c63-6f5a-41f5-86a2-e2380f27f858"
    description: "AppleJeus is a family of downloaders initially discovered in 2018 embedded within trojanized cryptocurrency applications. AppleJeus has been used by Lazarus Group, targeting companies in the energy, finance, government, industry, technology, and telecommunications sectors, and several countries including the United States, United Kingdom, South Korea, Australia, Brazil, New Zealand, and Russia. AppleJeus has been used to distribute the FALLCHILL RAT.(Citation: CISA AppleJeus Feb 2021)"
  - name: "route"
    mitre_id: "S0103"
    url: "https://attack.mitre.org/software/S0103"
    type: "tool"
    stix_id: "tool--c11ac61d-50f4-444f-85d8-6f006067f0de"
    description: "route can be used to find or change information within the local system IP routing table. (Citation: TechNet Route)"
  - name: "BLINDINGCAN"
    mitre_id: "S0520"
    url: "https://attack.mitre.org/software/S0520"
    type: "malware"
    stix_id: "malware--01dbc71d-0ee8-420d-abb4-3dfb6a4bf725"
    description: "BLINDINGCAN is a remote access Trojan that has been used by the North Korean government since at least early 2020 in cyber operations against defense, engineering, and government organizations in Western Europe and the US.(Citation: US-CERT BLINDINGCAN Aug 2020)(Citation: NHS UK BLINDINGCAN Aug 2020)"
  - name: "ThreatNeedle"
    mitre_id: "S0665"
    url: "https://attack.mitre.org/software/S0665"
    type: "malware"
    stix_id: "malware--16040b1c-ed28-4850-9d8f-bb8b81c42092"
    description: "ThreatNeedle is a backdoor that has been used by Lazarus Group since at least 2019 to target cryptocurrency, defense, and mobile gaming organizations.  It is considered to be an advanced cluster of Lazarus Group's Manuscrypt (a.k.a. NukeSped) malware family.(Citation: Kaspersky ThreatNeedle Feb 2021)"
  - name: "Volgmer"
    mitre_id: "S0180"
    url: "https://attack.mitre.org/software/S0180"
    type: "malware"
    stix_id: "malware--495b6cdb-7b5a-4fbc-8d33-e7ef68806d08"
    description: "Volgmer is a backdoor Trojan designed to provide covert access to a compromised system. It has been used since at least 2013 to target the government, financial, automotive, and media industries. Its primary delivery mechanism is suspected to be spearphishing. (Citation: US-CERT Volgmer Nov 2017)"
  - name: "Cryptoistic"
    mitre_id: "S0498"
    url: "https://attack.mitre.org/software/S0498"
    type: "malware"
    stix_id: "malware--a04d9a4c-bb52-40bf-98ec-e350c2d6a862"
    description: "Cryptoistic is a backdoor, written in Swift, that has been used by Lazarus Group.(Citation: SentinelOne Lazarus macOS July 2020)"
  - name: "Responder"
    mitre_id: "S0174"
    url: "https://attack.mitre.org/software/S0174"
    type: "tool"
    stix_id: "tool--a1dd2dbd-1550-44bf-abcc-1a4c52e97719"
    description: "Responder is an open source tool used for LLMNR, NBT-NS and MDNS poisoning, with built-in HTTP/SMB/MSSQL/FTP/LDAP rogue authentication server supporting NTLMv1/NTLMv2/LMv2, Extended Security NTLMSSP and Basic HTTP authentication. (Citation: GitHub Responder)"
  - name: "RATANKBA"
    mitre_id: "S0241"
    url: "https://attack.mitre.org/software/S0241"
    type: "malware"
    stix_id: "malware--9b325b06-35a1-457d-be46-a4ecc0b7ff0c"
    description: "RATANKBA is a remote controller tool used by Lazarus Group. RATANKBA has been used in attacks targeting financial institutions in Poland, Mexico, Uruguay, the United Kingdom, and Chile. It was also seen used against organizations related to telecommunications, management consulting, information technology, insurance, aviation, and education. RATANKBA has a graphical user interface to allow the attacker to issue jobs to perform on the infected machines. (Citation: Lazarus RATANKBA) (Citation: RATA"
  - name: "Bankshot"
    mitre_id: "S0239"
    url: "https://attack.mitre.org/software/S0239"
    type: "malware"
    stix_id: "malware--1f6e3702-7ca1-4582-b2e7-4591297d05a8"
    description: "Bankshot is a remote access tool (RAT) that was first reported by the Department of Homeland Security in December of 2017. In 2018, Lazarus Group used the Bankshot implant in attacks against the Turkish financial sector. (Citation: McAfee Bankshot)"
