description: SiegedSec, a hacktivist collective, emerged coincidentally just days
  before Russia’s invasion of Ukraine. Under the leadership of the hacktivist known
  as “YourAnonWolf,” the group swiftly gained strength, announcing an increasing number
  of victims after its inception. The group humorously self-identifies as “gay furry
  hackers” and is renowned for its comical slogans and the use of vulgar language.
  SiegedSec has affiliations with other hacker groups like GhostSec and typically
  consists of members aged between 18 and 26.
