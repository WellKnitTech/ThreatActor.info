software:
  - name: "LitePower"
    mitre_id: "S0680"
    url: "https://attack.mitre.org/software/S0680"
    type: "malware"
    stix_id: "malware--9020f5c7-efde-4125-a4f1-1b70f1274ddd"
    description: "LitePower is a downloader and second stage malware that has been used by WIRTE since at least 2021.(Citation: Kaspersky WIRTE November 2021)"
  - name: "SameCoin"
    mitre_id: "S9030"
    url: "https://attack.mitre.org/software/S9030"
    type: "malware"
    stix_id: "malware--4e164a21-3fbe-4aaa-be69-2513fdba90f7"
    description: "SameCoin is a multi-platform wiper with Windows and Android versions that has been used by WIRTE to target entities in the Middle East including in Israel.(Citation: Check Point Wirte NOV 2024)"
  - name: "Ferocious"
    mitre_id: "S0679"
    url: "https://attack.mitre.org/software/S0679"
    type: "malware"
    stix_id: "malware--73d08401-005f-4e1f-90b9-8f45d120879f"
    description: "Ferocious is a first stage implant composed of VBS and PowerShell scripts that has been used by WIRTE since at least 2021.(Citation: Kaspersky WIRTE November 2021)"
  - name: "Empire"
    mitre_id: "S0363"
    url: "https://attack.mitre.org/software/S0363"
    type: "tool"
    stix_id: "tool--3433a9e8-1c47-4320-b9bf-ed449061d1c3"
    description: "Empire is an open-source, cross-platform remote administration and post-exploitation framework that is publicly available on GitHub. While the tool itself is primarily written in Python, the post-exploitation agents are written in pure PowerShell for Windows and Python for Linux/macOS. Empire was one of five tools singled out by a joint report on public hacking tools being widely used by adversaries.(Citation: NCSC Joint Report Public Tools)(Citation: Github PowerShell Empire)(Citation: GitHub AT"
  - name: "IronWind"
    mitre_id: "S9029"
    url: "https://attack.mitre.org/software/S9029"
    type: "malware"
    stix_id: "malware--089aa00a-99ac-46b4-9cf8-4224d463566d"
    description: "IronWind is a custom loader malware that has been in use since at least 2023 by actors including WIRTE to target entities in the Middle East.(Citation: Check Point Wirte NOV 2024)"
  - name: "Rclone"
    mitre_id: "S1040"
    url: "https://attack.mitre.org/software/S1040"
    type: "tool"
    stix_id: "tool--59096109-a1dd-463b-87e7-a8d110fe3a79"
    description: "Rclone is a command line program for syncing files with cloud storage services such as Dropbox, Google Drive, Amazon S3, and MEGA. Rclone has been used in a number of ransomware campaigns, including those associated with the Conti and DarkSide Ransomware-as-a-Service operations.(Citation: Rclone)(Citation: Rclone Wars)(Citation: Detecting Rclone)(Citation: DarkSide Ransomware Gang)(Citation: DFIR Conti Bazar Nov 2021)"
  - name: "Havoc"
    mitre_id: "S1229"
    url: "https://attack.mitre.org/software/S1229"
    type: "malware"
    stix_id: "malware--1996aed9-6234-4c1d-a145-e8a4913679dd"
    description: "Havoc is an open-source post-exploitation command and control (C2) framework first released on GitHub in October 2022 by C5pider (Paul Ungur), who continues to maintain and develop it with community contributors. Havoc provides a wide range of offensive security capabilities and has been adopted by multiple threat actors to establish and maintain control over compromised systems."
  - name: "AshTag"
    mitre_id: "S9031"
    url: "https://attack.mitre.org/software/S9031"
    type: "malware"
    stix_id: "malware--bb6f2a5c-dbc9-45b0-bd3f-a0b7849959c2"
    description: "AshTag is a modular .NET backdoor with multiple features that has been used by WIRTE since at least 2025. AshTag is designed for persistence and remote command execution and can masquerade as a legitimate VisualServer utility.(Citation: Palo Alto Ashen Lepus DEC 2025)"
