description: The group Microsoft tracks as Storm-2603 is assessed with medium confidence
  to be a China-based threat actor. Microsoft has not identified links between Storm-2603
  and other known Chinese threat actors. Microsoft tracks this threat actor in association
  with attempts to steal MachineKeys via the on-premises SharePoint vulnerabilities.
  Although Microsoft has observed this threat actor deploying Warlock and Lockbit
  ransomware in the past, Microsoft is currently unable to confidently assess the
  threat actor’s objectives.  Additional actors may use these exploits to target unpatched
  on-premises SharePoint systems, further emphasizing the need for organizations to
  implement mitigations and security updates immediately.
