description: Lyceum is an Iranian APT group that has been active since at least 2014.
  They primarily target Middle Eastern governments and organizations in the energy
  and telecommunications sectors. Lyceum is known for using cyber espionage techniques
  and has been linked to other Iranian threat groups such as APT34. They have developed
  and deployed malware families like Shark and Milan, and have been observed using
  DNS tunneling and HTTPfor command and control communication.
