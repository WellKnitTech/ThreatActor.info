  - name: "FinFisher"
    mitre_id: "S0182"
    url: "https://attack.mitre.org/software/S0182"
    type: "malware"
    stix_id: "malware--a5528622-3a8a-4633-86ce-8cdaf8423858"
    description: "FinFisher is a government-grade commercial surveillance spyware reportedly sold exclusively to government agencies for use in targeted and lawful criminal investigations. It is heavily obfuscated and uses multiple anti-analysis techniques. It has other variants including Wingbird. (Citation: FinFisher Citation) (Citation: Microsoft SIR Vol 21) (Citation: FireEye FinSpy Sept 2017) (Citation: Securelist BlackOasis Oct 2017) (Citation: Microsoft FinFisher March 2018)"
