  - name: "Bandook"
    mitre_id: "S0234"
    url: "https://attack.mitre.org/software/S0234"
    type: "malware"
    stix_id: "malware--835a79f1-842d-472d-b8f4-d54b545c341b"
    description: "Bandook is a commercially available RAT, written in Delphi and C++, that has been available since at least 2007. It has been used against government, financial, energy, healthcare, education, IT, and legal organizations in the US, South America, Europe, and Southeast Asia. Bandook has been used by Dark Caracal, as well as in a separate campaign referred to as \"Operation Manul\".(Citation: EFF Manul Aug 2016)(Citation: Lookout Dark Caracal Jan 2018)(Citation: CheckPoint Bandook Nov 2020)"
  - name: "Pallas"
