name: "LAPSUS$"
aliases: ["DEV-0537","Lapsus","LAPSUS","LAPSUS$","Lapsus$","SLIPPY SPIDER","Strawberry Tempest","UNC3661"]
description: "LAPSUS$ is cyber criminal threat group that has been active since at least mid-2021. LAPSUS$ specializes in large-scale social engineering and extortion operations, including destructive attacks without the use of ransomware. The group has targeted organizations globally, including in the government, manufacturing, higher education, energy, healthcare, technology, telecommunications, and media sectors. [BBC LAPSUS Apr 2022](https://www.bbc.com/news/technology-60953527) [MSTIC DEV-0537 Mar 2022](https://www.microsoft.com/security/blog/2022/03/22/dev-0537-criminal-actor-targeting-organizations-for-data-exfiltration-and-destruction/) [UNIT 42 LAPSUS Mar 2022](https://unit42.paloaltonetworks.com/lapsus-group/)"
