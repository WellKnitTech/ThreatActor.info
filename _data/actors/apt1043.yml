software:
  - name: "AdFind"
    mitre_id: "S0552"
    url: "https://attack.mitre.org/software/S0552"
    type: "tool"
    stix_id: "tool--f59508a6-3615-47c3-b493-6676e1a39a87"
    description: "AdFind is a free command-line query tool that can be used for gathering information from Active Directory.(Citation: Red Canary Hospital Thwarted Ryuk October 2020)(Citation: FireEye FIN6 Apr 2019)(Citation: FireEye Ryuk and Trickbot January 2019)"
  - name: "BlackByte Ransomware"
    mitre_id: "S1180"
    url: "https://attack.mitre.org/software/S1180"
    type: "malware"
    stix_id: "malware--9454bb5d-3bdb-40f9-a878-b5fb446ded3d"
    description: "BlackByte Ransomware is uniquely associated with BlackByte operations. BlackByte Ransomware used a common key for infections, allowing for the creation of a universal decryptor.(Citation: Trustwave BlackByte 2021)(Citation: FBI BlackByte 2022) BlackByte Ransomware was replaced in BlackByte operations by BlackByte 2.0 Ransomware by 2023.(Citation: Microsoft BlackByte 2023)(Citation: Cisco BlackByte 2024)"
  - name: "Exbyte"
    mitre_id: "S1179"
    url: "https://attack.mitre.org/software/S1179"
    type: "malware"
    stix_id: "malware--6207dd22-bf18-4c96-aada-c573a9bbf5ec"
    description: "Exbyte is an exfiltration tool written in Go that is uniquely associated with BlackByte operations. Observed since 2022, Exbyte transfers collected files to online file sharing and hosting services.(Citation: Symantec BlackByte 2022)"
  - name: "Arp"
    mitre_id: "S0099"
    url: "https://attack.mitre.org/software/S0099"
    type: "tool"
    stix_id: "tool--30489451-5886-4c46-90c9-0dff9adc5252"
    description: "Arp displays and modifies information about a system's Address Resolution Protocol (ARP) cache. (Citation: TechNet Arp)"
  - name: "BlackByte 2.0 Ransomware"
    mitre_id: "S1181"
    url: "https://attack.mitre.org/software/S1181"
    type: "malware"
    stix_id: "malware--42fdf9db-6005-4bb3-96f6-496b94ce519d"
    description: "BlackByte 2.0 Ransomware is a replacement for BlackByte Ransomware. Unlike BlackByte Ransomware, BlackByte 2.0 Ransomware does not have a common key for victim decryption. BlackByte 2.0 Ransomware remains uniquely associated with BlackByte operations.(Citation: Microsoft BlackByte 2023)"
  - name: "PsExec"
    mitre_id: "S0029"
    url: "https://attack.mitre.org/software/S0029"
    type: "tool"
    stix_id: "tool--ff6caf67-ea1f-4895-b80e-4bb0fc31c6db"
    description: "PsExec is a free Microsoft tool that can be used to execute a program on another computer. It is used by IT administrators and attackers.(Citation: Russinovich Sysinternals)(Citation: SANS PsExec)"
  - name: "Cobalt Strike"
    mitre_id: "S0154"
    url: "https://attack.mitre.org/software/S0154"
    type: "malware"
    stix_id: "malware--a7881f21-e978-4fe4-af56-92c9416a2616"
    description: "Cobalt Strike is a commercial, full-featured, remote access tool that bills itself as “adversary simulation software designed to execute targeted attacks and emulate the post-exploitation actions of advanced threat actors”. Cobalt Strike’s interactive post-exploit capabilities cover the full range of ATT&CK tactics, all executed within a single, integrated system.(Citation: cobaltstrike manual)\n\nIn addition to its own capabilities, Cobalt Strike leverages the capabilities of other well-known tool"
  - name: "Mimikatz"
    mitre_id: "S0002"
    url: "https://attack.mitre.org/software/S0002"
    type: "tool"
    stix_id: "tool--afc079f3-c0ea-4096-b75d-3f05338b7f60"
    description: "Mimikatz is a credential dumper capable of obtaining plaintext Windows account logins and passwords, along with many other features that make it useful for testing the security of networks. (Citation: Deply Mimikatz) (Citation: Adsecurity Mimikatz Guide)"
