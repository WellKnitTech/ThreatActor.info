software:
  - name: "Net"
    mitre_id: "S0039"
    url: "https://attack.mitre.org/software/S0039"
    type: "tool"
    stix_id: "tool--03342581-f790-4f03-ba41-e82e67392e23"
    description: "The Net utility is a component of the Windows operating system. It is used in command-line operations for control of users, groups, services, and network connections. (Citation: Microsoft Net Utility)\n\nNet has a great deal of functionality, (Citation: Savill 1999) much of which is useful for an adversary, such as gathering system and network information for Discovery, moving laterally through SMB/Windows Admin Shares using <code>net use</code> commands, and interacting with services. The net1.exe"
  - name: "Cobalt Strike"
    mitre_id: "S0154"
    url: "https://attack.mitre.org/software/S0154"
    type: "malware"
    stix_id: "malware--a7881f21-e978-4fe4-af56-92c9416a2616"
    description: "Cobalt Strike is a commercial, full-featured, remote access tool that bills itself as “adversary simulation software designed to execute targeted attacks and emulate the post-exploitation actions of advanced threat actors”. Cobalt Strike’s interactive post-exploit capabilities cover the full range of ATT&CK tactics, all executed within a single, integrated system.(Citation: cobaltstrike manual)\n\nIn addition to its own capabilities, Cobalt Strike leverages the capabilities of other well-known tool"
  - name: "MirrorStealer"
    mitre_id: "S9022"
    url: "https://attack.mitre.org/software/S9022"
    type: "malware"
    stix_id: "malware--2f851d4a-18cc-4d7f-9408-b10ef02ee936"
    description: "MirrorStealer is a credential stealer that has been used by MirrorFace since at least 2022 to steal credentials from various applications, including browsers and email clients. MirrorStealer has been delivered directly into system memory via commands issued by LODEINFO.(Citation: ESET MirrorFace DEC 2022)"
  - name: "UPPERCUT"
    mitre_id: "S0275"
    url: "https://attack.mitre.org/software/S0275"
    type: "malware"
    stix_id: "malware--fb4e3792-e915-4fdd-a9cd-92dfa2ace7aa"
    description: "UPPERCUT is a 32-bit HTTP-based backdoor that has been used by menuPass since at least 2017.(Citation: FireEye APT10 Sept 2018) Once thought to be exclusive to menuPass, UPPERCUT was also observed being used by menuPass-associated MirrorFace during Operation AkaiRyū.(Citation: Trend Micro Earth Kasha Anel NOV 2024)"
  - name: "Nltest"
    mitre_id: "S0359"
    url: "https://attack.mitre.org/software/S0359"
    type: "tool"
    stix_id: "tool--981acc4c-2ede-4b56-be6e-fa1a75f37acf"
    description: "Nltest is a Windows command-line utility used to list domain controllers and enumerate domain trusts.(Citation: Nltest Manual)"
  - name: "BITSAdmin"
    mitre_id: "S0190"
    url: "https://attack.mitre.org/software/S0190"
    type: "tool"
    stix_id: "tool--64764dc6-a032-495f-8250-1e4c06bdc163"
    description: "BITSAdmin is a command line tool used to create and manage BITS Jobs. (Citation: Microsoft BITSAdmin)"
  - name: "Tasklist"
    mitre_id: "S0057"
    url: "https://attack.mitre.org/software/S0057"
    type: "tool"
    stix_id: "tool--2e45723a-31da-4a7e-aaa6-e01998a6788f"
    description: "The Tasklist utility displays a list of applications and services with their Process IDs (PID) for all tasks running on either a local or a remote computer. It is packaged with Windows operating systems and can be executed from the command-line interface. (Citation: Microsoft Tasklist)"
  - name: "ipconfig"
    mitre_id: "S0100"
    url: "https://attack.mitre.org/software/S0100"
    type: "tool"
    stix_id: "tool--294e2560-bd48-44b2-9da2-833b5588ad11"
    description: "ipconfig is a Windows utility that can be used to find information about a system's TCP/IP, DNS, DHCP, and adapter configuration. (Citation: TechNet Ipconfig)"
  - name: "LODEINFO"
    mitre_id: "S9020"
    url: "https://attack.mitre.org/software/S9020"
    type: "malware"
    stix_id: "malware--7908f855-5b5b-4d6a-acbc-af6b45ec27ad"
    description: "LODEINFO is a fileless backdoor malware first identified in 2020 that has been used by actors including MirrorFace, primarily against media, diplomatic, governmental, and public sector organizations in Japan.(Citation: Kaspersky LODEINFO OCT 2022)(Citation: ITOCHU LODEINFO JAN 2024)(Citation: ESET MirrorFace DEC 2022)"
  - name: "ROAMINGHOUSE"
    mitre_id: "S9026"
    url: "https://attack.mitre.org/software/S9026"
    type: "malware"
    stix_id: "malware--251f1715-fc97-4487-b939-5c8823ef7a39"
    description: "ROAMINGHOUSE is a dropper malware used by MirrorFace to extract and execute embedded payloads including UPPERCUT components.(Citation: Trend Micro Earth Kasha Updates APR 2025)"
  - name: "DOWNIISSA"
    mitre_id: "S9021"
    url: "https://attack.mitre.org/software/S9021"
    type: "malware"
    stix_id: "malware--eddb863e-fc77-41c1-86e9-5210d6d58b88"
    description: "DOWNIISSA is a shellcode downloader that has been used by MirrorFace since at least 2022 to deploy payloads, including the LODEINFO backdoor.(Citation: Kaspersky LODEINFO OCT 2022)"
  - name: "nbtstat"
    mitre_id: "S0102"
    url: "https://attack.mitre.org/software/S0102"
    type: "tool"
    stix_id: "tool--b35068ec-107a-4266-bda8-eb7036267aea"
    description: "nbtstat is a utility used to troubleshoot NetBIOS name resolution. (Citation: TechNet Nbtstat)"
  - name: "HiddenFace"
    mitre_id: "S9023"
    url: "https://attack.mitre.org/software/S9023"
    type: "malware"
    stix_id: "malware--9edc41d1-a13d-4acf-b400-d47fb2f6809d"
    description: "HiddenFace is a modular backdoor developed and used exclusively by MirrorFace since at least 2021. HiddenFace can communicate both actively and passively and has been used against political and academic targets.(Citation: JPCERT MirrorFace JUL 2024)(Citation: Trend Micro Earth Kasha NOV 2024)(Citation: Trend Micro Earth Kasha Updates APR 2025)"
  - name: "Ping"
    mitre_id: "S0097"
    url: "https://attack.mitre.org/software/S0097"
    type: "tool"
    stix_id: "tool--b77b563c-34bb-4fb8-86a3-3694338f7b47"
    description: "Ping is an operating system utility commonly used to troubleshoot and verify network connections. (Citation: TechNet Ping)"
  - name: "Wevtutil"
    mitre_id: "S0645"
    url: "https://attack.mitre.org/software/S0645"
    type: "tool"
    stix_id: "tool--f91162cc-1686-4ff8-8115-bf3f61a4cc7a"
    description: "Wevtutil is a Windows command-line utility that enables administrators to retrieve information about event logs and publishers.(Citation: Wevtutil Microsoft Documentation)"
  - name: "NOOPLDR"
    mitre_id: "S9025"
    url: "https://attack.mitre.org/software/S9025"
    type: "malware"
    stix_id: "malware--66637cd6-ae68-4bcd-af82-32f70a854175"
    description: "NOOPLDR is a shellcode loader with XML/C# and DLL versions that has been used by MirrorFace to load HiddenFace.(Citation: Trend Micro Earth Kasha NOV 2024)\n"
