name: OldGremlin
aliases:
- OldGremlin
description: OldGremlin is a Russian-speaking ransomware group that has been active
  for several years. They primarily target organizations in Russia, including banks,
  logistics, industrial, insurance, retail, and IT companies. OldGremlin is known
  for using phishing emails as an initial infection vector and has developed custom
  malware for both Windows and Linux systems. They have conducted multiple malicious
  email campaigns and demand large ransoms from their victims, with some reaching
  millions of dollars.
