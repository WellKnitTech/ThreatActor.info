name: Krybit
aliases:
- Krybit
description: Krybit is a ransomware group that operates as a ransomware-as-a-service
  provider, offering affiliates 80% of ransom proceeds in exchange for technical support
  and a malware suite. The group has claimed attacks on various organizations across
  multiple countries, including asesoriauriel.com in Spain and fraper.com in Spain,
  without disclosing the volume of data exfiltrated. Krybit is currently engaged in
  a turf war with another group, 0APT, and has been accused of fabricating victim
  claims. Their leak site has been used to publish compromised data and to issue threats
  to rivals and victims alike.
