description: Since 2018, security researchers tracked a financially-motivated cybercrime
  actor, TA558, targeting hospitality, travel, and related industries located in Latin
  America and sometimes North America, and western Europe. The actor sends malicious
  emails written in Portuguese, Spanish, and sometimes English. The emails use reservation-themed
  lures with business-relevant themes such as hotel room bookings. The emails may
  contain malicious attachments or URLs aiming to distribute one of at least 15 different
  malware payloads.
