description: TA571 is a spam distributor actor known for delivering a variety of malware,
  including DarkGate, NetSupport RAT, and information stealers. They use phishing
  emails with macro-enabled attachments to spread malicious PDFs containing rogue
  OneDrive links. TA571 has been observed using unique filtering techniques with intermediary
  "gates" to target specific users and bypass automated sandboxing. Proofpoint assesses
  with high confidence that TA571 infections can lead to ransomware.
