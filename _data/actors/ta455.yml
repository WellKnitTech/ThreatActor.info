description: TA455 is an Iranian APT group targeting the aerospace industry through
  a campaign known as the “Iranian Dream Job Campaign,” utilizing deceptive job offers
  to lure victims. They employ spearphishing tactics with malicious ZIP files containing
  the executable “secur32[.]dll” and disguise their C2 communications within the traffic
  of reputable services like Cloudflare and GitHub. The group intentionally mimics
  the TTPs of the North Korean Lazarus group to mislead investigators and complicate
  attribution. Their multi-stage infection strategy enhances the likelihood of success
  while evading detection.
