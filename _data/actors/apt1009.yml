    type: "malware"
    stix_id: "malware--5633ffd3-81ef-4f98-8f93-4896b03998f0"
    description: "DCSrv is destructive malware that has been used by Moses Staff since at least  September 2021. Though DCSrv has ransomware-like capabilities, Moses Staff does not demand ransom or offer a decryption key.(Citation: Checkpoint MosesStaff Nov 2021)"
