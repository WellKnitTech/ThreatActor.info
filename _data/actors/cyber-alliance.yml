name: Cyber Alliance
aliases:
- Cyber Alliance
description: The Ukrainian Cyber Alliance is a pro-Ukraine hacktivist group formed
  in 2016, primarily targeting Russian entities since the invasion of Ukraine in 2022.
  They have claimed responsibility for significant cyberattacks, including the destruction
  of infrastructure at Russian internet provider Nodex and a breach of the microfinance
  company CarMoney, linked to Vladimir Putin's ex-wife. Their operations involve data
  destruction and disruption of IT infrastructure, utilizing techniques such as malware
  attacks and social engineering tactics. The group has positioned itself as a pro-military
  force, leveraging social media to communicate its activities and objectives.
