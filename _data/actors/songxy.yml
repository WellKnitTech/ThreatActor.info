name: SongXY
aliases:
- SongXY
description: SongXY is a Chinese APT group that employs phishing tactics to initiate
  cyberespionage campaigns. They utilize the Royal Road RTF builder, exploiting the
  CVE-2018-0798 vulnerability in Microsoft Equation Editor. In one instance, they
  sent a document containing a link to an attacker-controlled server, which automatically
  triggered upon opening, allowing them to gather information about the target's system
  configuration.
