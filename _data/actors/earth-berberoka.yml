description: According to TrendMicro, Earth Berberoka is a threat group originating
  from China that mainly focuses on targeting gambling websites. This group's campaign
  uses multiple malware families that target the Windows, Linux, and macOS platforms
  that have been attributed to Chinese-speaking actors. Aside from using tried-and-tested
  malware families that have been upgraded, such as PlugX and Gh0st RAT, Earth Berberoka
  has also developed a brand-new complex, multistage malware family, which has been
  dubbed PuppetLoader.
