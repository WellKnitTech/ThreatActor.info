description: UTA0388 is a China-aligned APT known for spear-phishing campaigns targeting
  organizations in North America, Asia, and Europe, primarily to deliver a Go-based
  implant called GOVERSHELL. The group employs "rapport-building phishing" tactics,
  engaging targets in benign conversations before sending malicious links, and has
  been linked to the use of Large Language Models for crafting phishing emails in
  multiple languages. Technical analysis indicates that UTA0388 operates in the interests
  of the Chinese state, with a focus on Asian geopolitical issues, as evidenced by
  the use of Simplified Chinese in its development environment. Volexity assesses
  that UTA0388's operations reflect a sophisticated blend of traditional phishing
  techniques and modern automation.
