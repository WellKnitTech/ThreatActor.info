software:
  - name: "ShimRatReporter"
    mitre_id: "S0445"
    url: "https://attack.mitre.org/software/S0445"
    type: "tool"
    stix_id: "tool--115f88dd-0618-4389-83cb-98d33ae81848"
    description: "ShimRatReporter is a tool used by suspected Chinese adversary Mofang to automatically conduct initial discovery. The details from this discovery are used to customize follow-on payloads (such as ShimRat) as well as set up faux infrastructure which mimics the adversary's targets. ShimRatReporter has been used in campaigns targeting multiple countries and sectors including government, military, critical infrastructure, automobile, and weapons development.(Citation: FOX-IT May 2016 Mofang)"
  - name: "ShimRat"
    mitre_id: "S0444"
    url: "https://attack.mitre.org/software/S0444"
    type: "malware"
    stix_id: "malware--5763217a-05b6-4edd-9bca-057e47b5e403"
    description: "ShimRat has been used by the suspected China-based adversary Mofang in campaigns targeting multiple countries and sectors including government, military, critical infrastructure, automobile, and weapons development. The name \"ShimRat\" comes from the malware's extensive use of Windows Application Shimming to maintain persistence. (Citation: FOX-IT May 2016 Mofang)"
