software:
  - name: "Mimikatz"
    mitre_id: "S0002"
    url: "https://attack.mitre.org/software/S0002"
    type: "tool"
    stix_id: "tool--afc079f3-c0ea-4096-b75d-3f05338b7f60"
    description: "Mimikatz is a credential dumper capable of obtaining plaintext Windows account logins and passwords, along with many other features that make it useful for testing the security of networks. (Citation: Deply Mimikatz) (Citation: Adsecurity Mimikatz Guide)"
  - name: "ipconfig"
    mitre_id: "S0100"
    url: "https://attack.mitre.org/software/S0100"
    type: "tool"
    stix_id: "tool--294e2560-bd48-44b2-9da2-833b5588ad11"
    description: "ipconfig is a Windows utility that can be used to find information about a system's TCP/IP, DNS, DHCP, and adapter configuration. (Citation: TechNet Ipconfig)"
  - name: "Kerrdown"
    mitre_id: "S0585"
    url: "https://attack.mitre.org/software/S0585"
    type: "malware"
    stix_id: "malware--8c1d01ff-fdc0-4586-99bd-c248e0761af5"
    description: "Kerrdown is a custom downloader that has been used by APT32 since at least 2018 to install spyware from a server on the victim's network.(Citation: Amnesty Intl. Ocean Lotus February 2021)(Citation: Unit 42 KerrDown February 2019)"
  - name: "Cobalt Strike"
    mitre_id: "S0154"
    url: "https://attack.mitre.org/software/S0154"
    type: "malware"
    stix_id: "malware--a7881f21-e978-4fe4-af56-92c9416a2616"
    description: "Cobalt Strike is a commercial, full-featured, remote access tool that bills itself as “adversary simulation software designed to execute targeted attacks and emulate the post-exploitation actions of advanced threat actors”. Cobalt Strike’s interactive post-exploit capabilities cover the full range of ATT&CK tactics, all executed within a single, integrated system.(Citation: cobaltstrike manual)\n\nIn addition to its own capabilities, Cobalt Strike leverages the capabilities of other well-known tool"
  - name: "SOUNDBITE"
    mitre_id: "S0157"
    url: "https://attack.mitre.org/software/S0157"
    type: "malware"
    stix_id: "malware--9ca488bd-9587-48ef-b923-1743523e63b2"
    description: "SOUNDBITE is a signature backdoor used by APT32. (Citation: FireEye APT32 May 2017)"
  - name: "OSX_OCEANLOTUS.D"
    mitre_id: "S0352"
    url: "https://attack.mitre.org/software/S0352"
    type: "malware"
    stix_id: "malware--b00f90b6-c75c-4bfd-b813-ca9e6c9ebf29"
    description: "OSX_OCEANLOTUS.D is a macOS backdoor used by APT32. First discovered in 2015, APT32 has continued to make improvements using a plugin architecture to extend capabilities, specifically using `.dylib` files. OSX_OCEANLOTUS.D can also determine it's permission level and execute according to access type (`root` or `user`).(Citation: Unit42 OceanLotus 2017)(Citation: TrendMicro MacOS April 2018)(Citation: Trend Micro MacOS Backdoor November 2020)"
  - name: "KOMPROGO"
    mitre_id: "S0156"
    url: "https://attack.mitre.org/software/S0156"
    type: "malware"
    stix_id: "malware--7dbb67c7-270a-40ad-836e-c45f8948aa5a"
    description: "KOMPROGO is a signature backdoor used by APT32 that is capable of process, file, and registry management. (Citation: FireEye APT32 May 2017)"
  - name: "netsh"
    mitre_id: "S0108"
    url: "https://attack.mitre.org/software/S0108"
    type: "tool"
    stix_id: "tool--5a63f900-5e7e-4928-a746-dd4558e1df71"
    description: "netsh is a scripting utility used to interact with networking components on local or remote systems. (Citation: TechNet Netsh)"
  - name: "RotaJakiro"
    mitre_id: "S1078"
    url: "https://attack.mitre.org/software/S1078"
    type: "malware"
    stix_id: "malware--08e844a8-371f-4fe3-9d1f-e056e64a7fde"
    description: "RotaJakiro is a 64-bit Linux backdoor used by APT32. First seen in 2018, it uses a plugin architecture to extend capabilities. RotaJakiro can determine it's permission level and execute according to access type (`root` or `user`).(Citation: RotaJakiro 2021 netlab360 analysis)(Citation: netlab360 rotajakiro vs oceanlotus)"
  - name: "PHOREAL"
    mitre_id: "S0158"
    url: "https://attack.mitre.org/software/S0158"
    type: "malware"
    stix_id: "malware--f6ae7a52-f3b6-4525-9daf-640c083f006e"
    description: "PHOREAL is a signature backdoor used by APT32. (Citation: FireEye APT32 May 2017)"
  - name: "Arp"
    mitre_id: "S0099"
    url: "https://attack.mitre.org/software/S0099"
    type: "tool"
    stix_id: "tool--30489451-5886-4c46-90c9-0dff9adc5252"
    description: "Arp displays and modifies information about a system's Address Resolution Protocol (ARP) cache. (Citation: TechNet Arp)"
  - name: "WINDSHIELD"
    mitre_id: "S0155"
    url: "https://attack.mitre.org/software/S0155"
    type: "malware"
    stix_id: "malware--98e8a977-3416-43aa-87fa-33e287e9c14c"
    description: "WINDSHIELD is a signature backdoor used by APT32. (Citation: FireEye APT32 May 2017)"
  - name: "Denis"
    mitre_id: "S0354"
    url: "https://attack.mitre.org/software/S0354"
    type: "malware"
    stix_id: "malware--f25aab1a-0cef-4910-a85d-bb38b32ea41a"
    description: "Denis is a Windows backdoor and Trojan used by APT32. Denis shares several similarities to the SOUNDBITE backdoor and has been used in conjunction with the Goopy backdoor.(Citation: Cybereason Oceanlotus May 2017)"
  - name: "Net"
    mitre_id: "S0039"
    url: "https://attack.mitre.org/software/S0039"
    type: "tool"
    stix_id: "tool--03342581-f790-4f03-ba41-e82e67392e23"
    description: "The Net utility is a component of the Windows operating system. It is used in command-line operations for control of users, groups, services, and network connections. (Citation: Microsoft Net Utility)\n\nNet has a great deal of functionality, (Citation: Savill 1999) much of which is useful for an adversary, such as gathering system and network information for Discovery, moving laterally through SMB/Windows Admin Shares using <code>net use</code> commands, and interacting with services. The net1.exe"
  - name: "Goopy"
    mitre_id: "S0477"
    url: "https://attack.mitre.org/software/S0477"
    type: "malware"
    stix_id: "malware--eac3d77f-2b7b-4599-ba74-948dc16633ad"
    description: "Goopy is a Windows backdoor and Trojan used by APT32 and shares several similarities to another backdoor used by the group (Denis). Goopy is named for its impersonation of the legitimate Google Updater executable.(Citation: Cybereason Cobalt Kitty 2017)"
