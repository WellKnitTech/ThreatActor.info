name: "APT32"
aliases: ["APT 32","APT-32","APT-C-00","APT32","ATK17","BISMUTH","Canvas Cyclone","Cobalt Kitty","G0050","Ocean Buffalo","Ocean Lotus","OceanLotus","OceanLotus Group","POND LOACH","Sea Lotus","SeaLotus","TIN WOODLAWN","海莲花 - APT-C-00","OCEAN BUFFALO"]
description: "APT32 is a suspected Vietnam-based threat group that has been active since at least 2014. The group has targeted multiple private sector industries as well as foreign governments, dissidents, and journalists with a strong focus on Southeast Asian countries like Vietnam, the Philippines, Laos, and Cambodia. They have extensively used strategic web compromises to compromise victims. [FireEye APT32 May 2017](https://www.fireeye.com/blog/threat-research/2017/05/cyber-espionage-apt32.html) [Volexity OceanLotus Nov 2017](https://www.volexity.com/blog/2017/11/06/oceanlotus-blossoms-mass-digital-surveillance-and-exploitation-of-asean-nations-the-media-human-rights-and-civil-society/) [ESET OceanLotus](https://www.welivesecurity.com/2018/03/13/oceanlotus-ships-new-backdoor/)"
url: "/apt32"
country: "Vietnam"
sector_focus: ["Government","Media","Technology","Dissidents","Government, Administration","Journalist","Private sector","Civil society"]
targeted_victims: ["China","Germany","United States","Vietnam","Philippines","Association of Southeast Asian Nations"]
