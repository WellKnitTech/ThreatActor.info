description: RedJuliett is a likely Chinese state-sponsored threat actor targeting
  government, academic, technology, and diplomatic organizations in Taiwan. They exploit
  vulnerabilities in network edge devices for initial access and use SQL injection
  and directory traversal exploits against web and SQL applications. The group operates
  from Fuzhou, China, and aims to support Beijing's intelligence collection on Taiwan's
  economic and diplomatic relations. RedJuliett has also expanded its operations to
  compromise organizations in other countries such as Hong Kong, Malaysia, and the
  United States.
