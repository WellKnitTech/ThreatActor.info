description: "Threat Group-3390 is a Chinese threat group that has extensively used strategic Web compromises to target victims. [Dell TG-3390](https://www.secureworks.com/research/threat-group-3390-targets-organizations-for-cyberespionage) The group has been active since at least 2010 and has targeted organizations in the aerospace, government, defense, technology, energy, manufacturing and gambling/betting sectors. [SecureWorks BRONZE UNION June 2017](https://www.secureworks.com/research/bronze-union) [Securelist LuckyMouse June 2018](https://securelist.com/luckymouse-hits-national-data-center/86083/) [Trend Micro DRBControl February 2020](https://documents.trendmicro.com/assets/white_papers/wp-uncovering-DRBcontrol.pdf)"
