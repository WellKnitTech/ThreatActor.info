software:
  - name: "Mimikatz"
    mitre_id: "S0002"
    url: "https://attack.mitre.org/software/S0002"
    type: "tool"
    stix_id: "tool--afc079f3-c0ea-4096-b75d-3f05338b7f60"
    description: "Mimikatz is a credential dumper capable of obtaining plaintext Windows account logins and passwords, along with many other features that make it useful for testing the security of networks. (Citation: Deply Mimikatz) (Citation: Adsecurity Mimikatz Guide)"
  - name: "Bisonal"
    mitre_id: "S0268"
    url: "https://attack.mitre.org/software/S0268"
    type: "malware"
    stix_id: "malware--65ffc206-d7c1-45b3-b543-f6b726e7840d"
    description: "Bisonal is a remote access tool (RAT) that has been used by Tonto Team against public and private sector organizations in Russia, South Korea, and Japan since at least December 2010.(Citation: Unit 42 Bisonal July 2018)(Citation: Talos Bisonal Mar 2020)"
  - name: "ShadowPad"
    mitre_id: "S0596"
    url: "https://attack.mitre.org/software/S0596"
    type: "malware"
    stix_id: "malware--ec9e00dd-0313-4d5b-8105-c20aa47abffc"
    description: "ShadowPad is a modular backdoor that was first identified in a supply chain compromise of the NetSarang software in mid-July 2017. The malware was originally thought to be exclusively used by APT41, but has since been observed to be used by various Chinese threat activity groups. (Citation: Recorded Future RedEcho Feb 2021)(Citation: Securelist ShadowPad Aug 2017)(Citation: Kaspersky ShadowPad Aug 2017) "
  - name: "LaZagne"
    mitre_id: "S0349"
    url: "https://attack.mitre.org/software/S0349"
    type: "tool"
    stix_id: "tool--b76b2d94-60e4-4107-a903-4a3a7622fb3b"
    description: "LaZagne is a post-exploitation, open-source tool used to recover stored passwords on a system. It has modules for Windows, Linux, and OSX, but is mainly focused on Windows systems. LaZagne is publicly available on GitHub.(Citation: GitHub LaZagne Dec 2018)"
  - name: "NBTscan"
    mitre_id: "S0590"
    url: "https://attack.mitre.org/software/S0590"
    type: "tool"
    stix_id: "tool--b63970b7-ddfb-4aee-97b1-80d335e033a8"
    description: "NBTscan is an open source tool that has been used by state groups to conduct internal reconnaissance within a compromised network.(Citation: Debian nbtscan Nov 2019)(Citation: SecTools nbtscan June 2003)(Citation: Symantec Waterbug Jun 2019)(Citation: FireEye APT39 Jan 2019)"
  - name: "gsecdump"
    mitre_id: "S0008"
    url: "https://attack.mitre.org/software/S0008"
    type: "tool"
    stix_id: "tool--b07c2c47-fefb-4d7c-a69e-6a3296171f54"
    description: "gsecdump is a publicly-available credential dumper used to obtain password hashes and LSA secrets from Windows operating systems. (Citation: TrueSec Gsecdump)"
