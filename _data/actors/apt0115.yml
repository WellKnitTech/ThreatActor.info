name: "GOLD SOUTHFIELD"
aliases: ["GOLD SOUTHFIELD","Pinchy Spider","PINCHY SPIDER"]
description: "GOLD SOUTHFIELD is a financially motivated threat group active since at least 2018 that operates the REvil Ransomware-as-a Service (RaaS). GOLD SOUTHFIELD provides backend infrastructure for affiliates recruited on underground forums to perpetrate high value deployments. By early 2020, GOLD SOUTHFIELD started capitalizing on the new trend of stealing data and further extorting the victim to pay for their data to not get publicly leaked. [Secureworks REvil September 2019](https://www.secureworks.com/research/revil-sodinokibi-ransomware) [Secureworks GandCrab and REvil September 2019](https://www.secureworks.com/blog/revil-the-gandcrab-connection) [Secureworks GOLD SOUTHFIELD](https://www.secureworks.com/research/threat-profiles/gold-southfield) [CrowdStrike Evolution of Pinchy Spider July 2021](https://www.crowdstrike.com/blog/the-evolution-of-revil-ransomware-and-pinchy-spider/)"
