description: As reported by ZDNet, Chinese cyber-security vendor Qihoo 360 published
  a report on 2019-11-29 exposing an extensive hacking operation targeting the country
  of Kazakhstan. Targets included individuals and organizations involving all walks
  of life, such as government agencies, military personnel, foreign diplomats, researchers,
  journalists, private companies, the educational sector, religious figures, government
  dissidents, and foreign diplomats alike. The campaign, Qihoo 360 said, was broad,
  and appears to have been carried by a threat actor with considerable resources,
  and one who had the ability to develop their private hacking tools, buy expensive
  spyware off the surveillance market, and even invest in radio communications interception
  hardware.
