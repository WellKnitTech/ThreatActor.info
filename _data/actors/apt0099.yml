name: "APT-C-36"
aliases: ["AguilaCiega","APT-C-36","APT-Q-98","Blind Eagle","TAG-144","盲眼鹰 - APT-C-36"]
description: "APT-C-36 is a suspected South America espionage group that has been active since at least 2018. The group mainly targets Colombian government institutions as well as important corporations in the financial sector, petroleum industry, and professional manufacturing. [QiAnXin APT-C-36 Feb2019](https://web.archive.org/web/20190625182633if_/https://ti.360.net/blog/articles/apt-c-36-continuous-attacks-targeting-colombian-government-institutions-and-corporations-en/)"
url: "/apt0099"
sector_focus: ["Petroleum","Manufacturing","Financial","Private sector","Government"]
targeted_victims: ["Ecuador","Colombia","Spain","Panama","Chile"]
incident_type: "Espionage"
