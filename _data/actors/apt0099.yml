malware:
  - name: "Imminent RAT"
software:
  - name: "njRAT"
    mitre_id: "S0385"
    url: "https://attack.mitre.org/software/S0385"
    type: "malware"
    stix_id: "malware--d906e6f7-434c-44c0-b51a-ed50af8f7945"
    description: "njRAT is a remote access tool (RAT) that was first observed in 2012. It has been used by threat actors in the Middle East.(Citation: Fidelis njRAT June 2013)"
  - name: "Imminent Monitor"
    mitre_id: "S0434"
    url: "https://attack.mitre.org/software/S0434"
    type: "tool"
    stix_id: "tool--8f8cd191-902c-4e83-bf20-b57c8c4640e9"
    description: "Imminent Monitor was a commodity remote access tool (RAT) offered for sale from 2012 until 2019, when an operation was conducted to take down the Imminent Monitor infrastructure. Various cracked versions and variations of this RAT are still in circulation.(Citation: Imminent Unit42 Dec2019)"
  - name: "DCRAT"
    mitre_id: "S9017"
    url: "https://attack.mitre.org/software/S9017"
    type: "tool"
    stix_id: "tool--2f481072-e9f8-4452-be00-d1d7e43c2edc"
    description: "DCRAT is a variant of the open-source AsyncRAT developed in C# with additional capabilities such as patching Microsoft’s Antimalware Scan Interface (AMSI).(Citation: Zscaler BlindEagle DEC 2025)"
  - name: "PureCrypter"
    mitre_id: "S9019"
    url: "https://attack.mitre.org/software/S9019"
    type: "malware"
    stix_id: "malware--6f22487c-dbbf-4a5b-85ca-a8c85e8f2f80"
    description: "PureCrypter is a fully-featured malware loader, developed by a threat actor called “PureCoder,\" that has been in use since at least 2021 to distribute a variety of remote access trojans and information stealers.(Citation: Zscaler PureCrypter JUN 2022)"
  - name: "Caminho"
    mitre_id: "S9016"
    url: "https://attack.mitre.org/software/S9016"
    type: "malware"
    stix_id: "malware--97da6467-c9c5-4eb0-84d4-1234e937e534"
    description: "Caminho is a downloader that has been used by threat actors since at least 2025 to deliver various strains of malware such as XWorm.(Citation: Zscaler BlindEagle DEC 2025)"
  - name: "Remcos"
    mitre_id: "S0332"
    url: "https://attack.mitre.org/software/S0332"
    type: "tool"
    stix_id: "tool--7cd0bc75-055b-4098-a00e-83dc8beaff14"
    description: "Remcos is a closed-source tool that is marketed as a remote control and surveillance software by a company called Breaking Security. Remcos has been observed being used in malware campaigns.(Citation: Riskiq Remcos Jan 2018)(Citation: Talos Remcos Aug 2018)"
  - name: "AsyncRAT"
    mitre_id: "S1087"
    url: "https://attack.mitre.org/software/S1087"
    type: "tool"
    stix_id: "tool--6a5947f3-1a36-4653-8734-526df3e1d28d"
    description: "AsyncRAT is an open-source remote access tool originally available through the NYANxCAT Github repository that has been used in malicious campaigns.(Citation: Morphisec Snip3 May 2021)(Citation: Cisco Operation Layover September 2021)(Citation: Telefonica Snip3 December 2021)"
  - name: "QuasarRAT"
    mitre_id: "S0262"
    url: "https://attack.mitre.org/software/S0262"
    type: "tool"
    stix_id: "tool--da04ac30-27da-4959-a67d-450ce47d9470"
    description: "QuasarRAT is an open-source, remote access tool that has been publicly available on GitHub since at least 2014. QuasarRAT is developed in the C# language.(Citation: GitHub QuasarRAT)(Citation: Volexity Patchwork June 2018)"
  - name: "HeartCrypt"
    mitre_id: "S9018"
    url: "https://attack.mitre.org/software/S9018"
    type: "malware"
    stix_id: "malware--148f947c-aabd-4ba8-b6a3-22b296855119"
    description: "HeartCrypt is a packer-as-a-service (PaaS) used to protect malware that has been available since at least 2024. HeartCrypt has been used to pack a variety of malware including Lumma Stealer, Remcos, and Rhadamanthys. In the HeartCrypt PaaS model, customers submit malware via private messaging services and it is then packed and returned by the operator as a new binary.(Citation: Palo Alto HeartCrypt DEC 2024)"
