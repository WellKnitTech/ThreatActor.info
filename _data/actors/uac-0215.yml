description: UAC-0215 is an APT group that has orchestrated a phishing campaign targeting
  public institutions, major industries, and military units in Ukraine, utilizing
  rogue RDP files to gain unauthorized access. The malicious emails are designed to
  appear legitimate, enticing recipients to open attachments that connect their systems
  to the attacker's server, allowing extensive access to local resources. CERT-UA
  has identified this activity as high-risk and has advised organizations to block
  RDP files at mail gateways and restrict RDP connection capabilities. The campaign's
  geographical footprint suggests a potential for broader cyberattacks beyond Ukraine.
