name: "Naikon"
aliases: ["BRONZE GENEVA","BRONZE STERLING","Camerashy","G0013","G0019","Naikon","OVERRIDE PANDA","PLA Unit 78020"]
description: "Naikon is assessed to be a state-sponsored cyber espionage group attributed to the Chinese People’s Liberation Army’s (PLA) Chengdu Military Region Second Technical Reconnaissance Bureau (Military Unit Cover Designator 78020). [CameraShy](http://cdn2.hubspot.net/hubfs/454298/Project_CAMERASHY_ThreatConnect_Copyright_2015.pdf) Active since at least 2010, Naikon has primarily conducted operations against government, military, and civil organizations in Southeast Asia, as well as against international bodies such as the United Nations Development Programme (UNDP) and the Association of Southeast Asian Nations (ASEAN). [CameraShy](http://cdn2.hubspot.net/hubfs/454298/Project_CAMERASHY_ThreatConnect_Copyright_2015.pdf) [Baumgartner Naikon 2015](https://media.kasperskycontenthub.com/wp-content/uploads/sites/43/2018/03/07205555/TheNaikonAPT-MsnMM1.pdf) \n\nWhile Naikon shares some characteristics with APT30, the two groups do not appear to be exact matches. [Baumgartner Golovkin Naikon 2015](https://securelist.com/the-naikon-apt/69953/)"
