name: "CURIUM"
aliases: ["Crimson Sandstorm","CURIUM","TA456","Tortoise Shell","Yellow Liderc","IMPERIAL KITTEN","Imperial Kitten","DUSTYCAVE","Cuboid Sandstorm","Smoke Sandstorm","Tortoiseshell","DEV-0228"]
description: "CURIUM is an Iranian threat group, first reported in September 2019 and active since at least July 2018, targeting IT service providers in the Middle East. [Symantec Tortoiseshell 2019](https://symantec-enterprise-blogs.security.com/blogs/threat-intelligence/tortoiseshell-apt-supply-chain) CURIUM has since invested in building relationships with potential targets via social media over a period of months to establish trust and confidence before sending malware. Security researchers note CURIUM has demonstrated great patience and persistence by chatting with potential targets daily and sending benign files to help lower their security consciousness. [Microsoft Iranian Threat Actor Trends November 2021](https://www.microsoft.com/en-us/security/blog/2021/11/16/evolving-trends-in-iranian-threat-actor-activity-mstic-presentation-at-cyberwarcon-2021)"
