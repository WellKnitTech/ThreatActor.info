software:
  - name: "WarzoneRAT"
    mitre_id: "S0670"
    url: "https://attack.mitre.org/software/S0670"
    type: "malware"
    stix_id: "malware--fde19a18-e502-467f-be14-58c71b4e7f4b"
    description: "WarzoneRAT is a malware-as-a-service remote access tool (RAT) written in C++ that has been publicly available for purchase since at least late 2018.(Citation: Check Point Warzone Feb 2020)(Citation: Uptycs Warzone UAC Bypass November 2020)"
  - name: "Rclone"
    mitre_id: "S1040"
    url: "https://attack.mitre.org/software/S1040"
    type: "tool"
    stix_id: "tool--59096109-a1dd-463b-87e7-a8d110fe3a79"
    description: "Rclone is a command line program for syncing files with cloud storage services such as Dropbox, Google Drive, Amazon S3, and MEGA. Rclone has been used in a number of ransomware campaigns, including those associated with the Conti and DarkSide Ransomware-as-a-Service operations.(Citation: Rclone)(Citation: Rclone Wars)(Citation: Detecting Rclone)(Citation: DarkSide Ransomware Gang)(Citation: DFIR Conti Bazar Nov 2021)"
  - name: "LaZagne"
    mitre_id: "S0349"
    url: "https://attack.mitre.org/software/S0349"
    type: "tool"
    stix_id: "tool--b76b2d94-60e4-4107-a903-4a3a7622fb3b"
    description: "LaZagne is a post-exploitation, open-source tool used to recover stored passwords on a system. It has modules for Windows, Linux, and OSX, but is mainly focused on Windows systems. LaZagne is publicly available on GitHub.(Citation: GitHub LaZagne Dec 2018)"
  - name: "Tor"
    mitre_id: "S0183"
    url: "https://attack.mitre.org/software/S0183"
    type: "tool"
    stix_id: "tool--ed7d0cb1-87a6-43b4-9f46-ef1bc56d6c68"
    description: "Tor is a software suite and network that provides increased anonymity on the Internet. It creates a multi-hop proxy network and utilizes multilayer encryption to protect both the message and routing information. Tor utilizes \"Onion Routing,\" in which messages are encrypted with multiple layers of encryption; at each step in the proxy network, the topmost layer is decrypted and the contents forwarded on to the next node until it reaches its destination. (Citation: Dingledine Tor The Second-Generat"
  - name: "Mimikatz"
    mitre_id: "S0002"
    url: "https://attack.mitre.org/software/S0002"
    type: "tool"
    stix_id: "tool--afc079f3-c0ea-4096-b75d-3f05338b7f60"
    description: "Mimikatz is a credential dumper capable of obtaining plaintext Windows account logins and passwords, along with many other features that make it useful for testing the security of networks. (Citation: Deply Mimikatz) (Citation: Adsecurity Mimikatz Guide)"
  - name: "Raccoon Stealer"
    mitre_id: "S1148"
    url: "https://attack.mitre.org/software/S1148"
    type: "malware"
    stix_id: "malware--b5a8fb8b-4ff1-43e5-a1ad-75ae565f5175"
    description: "Raccoon Stealer is an information stealer malware family active since at least 2019 as a malware-as-a-service offering sold in underground forums. Raccoon Stealer has experienced two periods of activity across two variants, from 2019 to March 2022, then resurfacing in a revised version in June 2022.(Citation: S2W Racoon 2022)(Citation: Sekoia Raccoon1 2022)"
  - name: "ngrok"
    mitre_id: "S0508"
    url: "https://attack.mitre.org/software/S0508"
    type: "tool"
    stix_id: "tool--2f7f03bb-f367-4a5a-ad9b-310a12a48906"
    description: "ngrok is a legitimate reverse proxy tool that can create a secure tunnel to servers located behind firewalls or on local machines that do not have a public IP. ngrok has been leveraged by threat actors in several campaigns including use for lateral movement and data exfiltration.(Citation: Zdnet Ngrok September 2018)(Citation: FireEye Maze May 2020)(Citation: Cyware Ngrok May 2019)(Citation: MalwareBytes LazyScripter Feb 2021)"
  - name: "BlackCat"
    mitre_id: "S1068"
    url: "https://attack.mitre.org/software/S1068"
    type: "malware"
    stix_id: "malware--50c44c34-3abb-48ae-9433-a2337de5b0bc"
    description: "BlackCat is ransomware written in Rust that has been offered via the Ransomware-as-a-Service (RaaS) model. First observed November 2021, BlackCat has been used to target multiple sectors and organizations in various countries and regions in Africa, the Americas, Asia, Australia, and Europe.(Citation: Microsoft BlackCat Jun 2022)(Citation: Sophos BlackCat Jul 2022)(Citation: ACSC BlackCat Apr 2022)"
  - name: "ConnectWise"
    mitre_id: "S0591"
    url: "https://attack.mitre.org/software/S0591"
    type: "tool"
    stix_id: "tool--842976c7-f9c8-41b2-8371-41dc64fbe261"
    description: "ConnectWise is a legitimate remote administration tool that has been used since at least 2016 by threat actors including MuddyWater and GOLD SOUTHFIELD to connect to and conduct lateral movement in target environments.(Citation: Anomali Static Kitten February 2021)(Citation: Trend Micro Muddy Water March 2021)"
