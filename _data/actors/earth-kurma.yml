name: Earth Kurma
aliases:
- Earth Kurma
description: Earth Kurma is an APT group targeting government and telecommunications
  sectors in Southeast Asia, with a primary focus on data exfiltration. They employ
  advanced custom malware, including rootkits like KRNRAT and MORIYA, and utilize
  cloud storage services for exfiltration. Their toolsets include TESDAT and SIMPOBOXSPY,
  and they demonstrate adaptive TTPs and complex evasion techniques. Attribution overlaps
  with other APT groups, but distinct attack patterns warrant their separate designation.
