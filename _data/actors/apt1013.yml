    type: "malware"
    stix_id: "malware--df350889-4de9-44e5-8cb3-888b8343e97c"
    description: "metaMain is a backdoor used by Metador to maintain long-term access to compromised machines; it has also been used to decrypt Mafalda into memory.(Citation: SentinelLabs Metador Sept 2022)(Citation: SentinelLabs Metador Technical Appendix Sept 2022)"
  - name: "Mafalda"
    mitre_id: "S1060"
    url: "https://attack.mitre.org/software/S1060"
    type: "malware"
    stix_id: "malware--3be1fb7a-0f7e-415e-8e3a-74a80d596e68"
    description: "Mafalda is a flexible interactive implant that has been used by Metador. Security researchers assess the Mafalda name may be inspired by an Argentinian cartoon character that has been popular as a means of political commentary since the 1960s. (Citation: SentinelLabs Metador Sept 2022)"
