description: 'POLONIUM is a Lebanon-based group that has primarily targeted Israeli
  organizations, including critical manufacturing, information technology, and defense
  industry companies, since at least February 2022. Security researchers assess POLONIUM
  has coordinated their operations with multiple actors affiliated with Iran’s Ministry
  of Intelligence and Security (MOIS), based on victim overlap as well as common techniques
  and tooling.(Citation: Microsoft POLONIUM June 2022)'
