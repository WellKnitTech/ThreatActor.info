name: Water Curupira
aliases:
- Water Curupira
description: With its emergence in 2022, Water Curupira has established itself as
  a persistent threat actor targeting organizations primarily in South America and
  Europe. Their modus operandi involves a combination of social engineering tactics
  and a diversified malware arsenal, including ransomware variants like Black Basta
  and credential stealers like Cobalt Strike. This multifaceted approach enables them
  to gain unauthorized access to victim systems, steal sensitive data, and ultimately
  extort victims through ransomware demands. It has been actively using Pikabot, a
  loader malware with similarities to Qakbot, in spam campaigns throughout 2023.
