description: In April 2020, Crowstrike Falcon OverWatch discovered Iran-based adversary
  TRACER KITTEN conducting malicious interactive activity against multiple hosts at
  a telecommunications company in the Europe, Middle East and Africa (EMEA) region.
  The actor was found operating under valid user accounts, using custom backdoors
  in combination with SSH tunnels for C2. The adversary leveraged their foothold to
  conduct a variety of reconnaissance activities, undertake credential harvesting
  and prepare for data exfiltration.
