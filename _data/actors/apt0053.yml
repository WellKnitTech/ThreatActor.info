    type: "tool"
    stix_id: "tool--d8d19e33-94fd-4aa3-b94a-08ee801a2153"
    description: "SDelete is an application that securely deletes data in a way that makes it unrecoverable. It is part of the Microsoft Sysinternals suite of tools. (Citation: Microsoft SDelete July 2016)"
  - name: "RawPOS"
    mitre_id: "S0169"
    url: "https://attack.mitre.org/software/S0169"
    type: "malware"
    stix_id: "malware--9752aef4-a1f3-4328-929f-b64eb0536090"
    description: "RawPOS is a point-of-sale (POS) malware family that searches for cardholder data on victims. It has been in use since at least 2008. (Citation: Kroll RawPOS Jan 2017) (Citation: TrendMicro RawPOS April 2015) (Citation: Visa RawPOS March 2015) FireEye divides RawPOS into three components: FIENDCRY, DUEBREW, and DRIFTWOOD. (Citation: Mandiant FIN5 GrrCON Oct 2016) (Citation: DarkReading FireEye FIN5 Oct 2015)"
