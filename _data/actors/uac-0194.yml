description: UAC-0194 is a Russian threat actor linked to the exploitation of the
  Windows zero-day CVE-2024-43451, which was used in attacks against Ukrainian organizations.
  The group delivered phishing emails containing .url files that, when interacted
  with, exploited the vulnerability to facilitate the installation of additional payloads,
  including the SparkRAT trojan. They also exploited the Server Message Block protocol
  for NTLM hash exfiltration. CERT-UA has associated UAC-0194's activities with social
  engineering tactics to convince victims to execute malicious files.
