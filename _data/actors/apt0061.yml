    stix_id: "tool--b77b563c-34bb-4fb8-86a3-3694338f7b47"
    description: "Ping is an operating system utility commonly used to troubleshoot and verify network connections. (Citation: TechNet Ping)"
  - name: "BADHATCH"
    mitre_id: "S1081"
    url: "https://attack.mitre.org/software/S1081"
    type: "malware"
    stix_id: "malware--3553b49d-d4ae-4fb6-ab17-0adbc520c888"
    description: "BADHATCH is a backdoor that has been utilized by FIN8 since at least 2019. BADHATCH has been used to target the insurance, retail, technology, and chemical industries in the United States, Canada, South Africa, Panama, and Italy.(Citation: Gigamon BADHATCH Jul 2019)(Citation: BitDefender BADHATCH Mar 2021)"
  - name: "PUNCHBUGGY"
    mitre_id: "S0196"
    url: "https://attack.mitre.org/software/S0196"
    type: "malware"
    stix_id: "malware--5c6ed2dc-37f4-40ea-b2e1-4c76140a388c"
    description: "PUNCHBUGGY is a backdoor malware used by FIN8 that has been observed targeting POS networks in the hospitality industry. (Citation: Morphisec ShellTea June 2019)(Citation: FireEye Fin8 May 2016) (Citation: FireEye Know Your Enemy FIN8 Aug 2016)"
  - name: "Ragnar Locker"
    mitre_id: "S0481"
    url: "https://attack.mitre.org/software/S0481"
    type: "malware"
    stix_id: "malware--54895630-efd2-4608-9c24-319de972a9eb"
    description: "Ragnar Locker is a ransomware that has been in use since at least December 2019.(Citation: Sophos Ragnar May 2020)(Citation: Cynet Ragnar Apr 2020)"
  - name: "PUNCHTRACK"
    mitre_id: "S0197"
    url: "https://attack.mitre.org/software/S0197"
    type: "malware"
    stix_id: "malware--c4de7d83-e875-4c88-8b5d-06c41e5b7e79"
    description: "PUNCHTRACK is non-persistent point of sale (POS) system malware utilized by FIN8 to scrape payment card data. (Citation: FireEye Fin8 May 2016) (Citation: FireEye Know Your Enemy FIN8 Aug 2016)"
  - name: "dsquery"
    mitre_id: "S0105"
    url: "https://attack.mitre.org/software/S0105"
    type: "tool"
    stix_id: "tool--38952eac-cb1b-4a71-bad2-ee8223a1c8fe"
    description: "dsquery is a command-line utility that can be used to query Active Directory for information from a system within a domain. (Citation: TechNet Dsquery) It is typically installed only on Windows Server versions but can be installed on non-server variants through the Microsoft-provided Remote Server Administration Tools bundle."
  - name: "Net"
    mitre_id: "S0039"
    url: "https://attack.mitre.org/software/S0039"
    type: "tool"
    stix_id: "tool--03342581-f790-4f03-ba41-e82e67392e23"
    description: "The Net utility is a component of the Windows operating system. It is used in command-line operations for control of users, groups, services, and network connections. (Citation: Microsoft Net Utility)\n\nNet has a great deal of functionality, (Citation: Savill 1999) much of which is useful for an adversary, such as gathering system and network information for Discovery, moving laterally through SMB/Windows Admin Shares using <code>net use</code> commands, and interacting with services. The net1.exe"
  - name: "Nltest"
    mitre_id: "S0359"
    url: "https://attack.mitre.org/software/S0359"
    type: "tool"
    stix_id: "tool--981acc4c-2ede-4b56-be6e-fa1a75f37acf"
    description: "Nltest is a Windows command-line utility used to list domain controllers and enumerate domain trusts.(Citation: Nltest Manual)"
  - name: "Sardonic"
    mitre_id: "S1085"
    url: "https://attack.mitre.org/software/S1085"
    type: "malware"
    stix_id: "malware--0c52f5bc-557d-4083-bd27-66d7cdb794bb"
    description: "Sardonic is a backdoor written in C and C++ that is known to be used by FIN8, as early as August 2021 to target a financial institution in the United States. Sardonic has a plugin system that can load specially made DLLs and execute their functions.(Citation: Bitdefender Sardonic Aug 2021)(Citation: Symantec FIN8 Jul 2023)"
  - name: "PsExec"
    mitre_id: "S0029"
    url: "https://attack.mitre.org/software/S0029"
    type: "tool"
    stix_id: "tool--ff6caf67-ea1f-4895-b80e-4bb0fc31c6db"
    description: "PsExec is a free Microsoft tool that can be used to execute a program on another computer. It is used by IT administrators and attackers.(Citation: Russinovich Sysinternals)(Citation: SANS PsExec)"
  - name: "Impacket"
    mitre_id: "S0357"
    url: "https://attack.mitre.org/software/S0357"
    type: "tool"
    stix_id: "tool--26c87906-d750-42c5-946c-d4162c73fc7b"
    description: "Impacket is an open source collection of modules written in Python for programmatically constructing and manipulating network protocols. Impacket contains several tools for remote service execution, Kerberos manipulation, Windows credential dumping, packet sniffing, and relay attacks.(Citation: Impacket Tools)"
