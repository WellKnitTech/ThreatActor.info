description: UAC-0050 is a threat actor that has been active since 2020, targeting
  government agencies in Ukraine. They have been distributing the Remcos RAT malware
  through phishing campaigns, using tactics such as impersonating the Security Service
  of Ukraine and sending emails with malicious attachments. The group has also been
  linked to other hacking collectives, such as UAC-0096, and has previously used remote
  administration tools like Remote Utilities. The motive behind their attacks is likely
  espionage.
