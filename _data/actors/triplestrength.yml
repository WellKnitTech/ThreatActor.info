name: TRIPLESTRENGTH
aliases:
- TRIPLESTRENGTH
description: TRIPLESTRENGTH is a financially motivated threat actor targeting cloud
  environments and on-premises infrastructures for cryptojacking, ransomware, and
  extortion. They exploit stolen credentials, cookies, and information stealer logs
  to gain unauthorized access to platforms like Google Cloud, AWS, and Microsoft Azure,
  deploying the unMiner application for cryptocurrency mining. Their ransomware operations
  utilize lockers such as Phobos, LokiLocker, and RCRU64, involving lateral movement
  and mass encryption. TRIPLESTRENGTH also engages in account hijacking and collaborates
  with partners for ransomware and blackmail operations, advertising their services
  in hacking-focused Telegram channels.
