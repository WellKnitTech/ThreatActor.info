description: Proofpoint researchers detected campaigns from a relatively new actor,
  tracked internally as TA2101, targeting German companies and organizations to deliver
  and install backdoor malware. The actor initiated their campaigns impersonating
  the Bundeszentralamt fur Steuern, the German Federal Ministry of Finance, with lookalike
  domains, verbiage, and stolen branding in the emails. For their campaigns in Germany,
  the actor chose Cobalt Strike, a commercially licensed software tool that is generally
  used for penetration testing and emulates the type of backdoor framework used by
  Metasploit, a similar penetration testing tool. Proofpoint researchers have also
  observed this actor distributing Maze ransomware, employing similar social engineering
  techniques to those it uses for Cobalt Strike, while also targeting organizations
  in Italy and impersonating the Agenzia Delle Entrate, the Italian Revenue Agency.
  We have also recently observed the actor targeting organizations in the United States
  using the IcedID banking Trojan while impersonating the United States Postal Service
  (USPS).
