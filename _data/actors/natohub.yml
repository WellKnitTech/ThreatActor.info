name: Natohub
aliases:
- Natohub
description: Natohub is a hacker who claimed to have stolen 42,000 documents from
  the UN’s International Civil Aviation Organization and is offering the data for
  sale on underground forums. The compromised documents allegedly contain personal
  records of ICAO staff and others associated with the agency. While ICAO is investigating
  the potential breach, Natohub has also made unverified claims about accessing personal
  data on thousands of UN delegates. The actor's track record of leaks is limited,
  raising questions about the credibility of their assertions.
