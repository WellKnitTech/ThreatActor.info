description: LIMINAL PANDA is a China-nexus APT that targets telecommunications entities,
  employing custom malware and publicly available tools for covert access, C2, and
  data exfiltration. The adversary demonstrates extensive knowledge of telecom networks,
  utilizing GSM protocols to retrieve mobile subscriber information and call metadata.
  LIMINAL PANDA exploits trust relationships and security gaps between providers to
  access core infrastructure, indicating a focus on SIGINT collection rather than
  financial gain. Their intrusion activity has primarily affected telecom providers
  in southern Asia and Africa, with potential for broader targeting based on network
  configurations.
