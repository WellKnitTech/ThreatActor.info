malware:
  - name: "FrameworkPoS"
  - name: "Vawtrak/Neverquest"
  - name: "Ransomware"
software:
  - name: "FlawedAmmyy"
    mitre_id: "S0381"
    url: "https://attack.mitre.org/software/S0381"
    type: "malware"
    stix_id: "malware--432555de-63bf-4f2a-a3fa-f720a4561078"
    description: "FlawedAmmyy is a remote access tool (RAT) that was first seen in early 2016. The code for FlawedAmmyy was based on leaked source code for a version of Ammyy Admin, a remote access software.(Citation: Proofpoint TA505 Mar 2018)"
  - name: "GrimAgent"
    mitre_id: "S0632"
    url: "https://attack.mitre.org/software/S0632"
    type: "malware"
    stix_id: "malware--c9b99d03-ff11-4a48-95f0-82660d582c25"
    description: "GrimAgent is a backdoor that has been used before the deployment of Ryuk ransomware since at least 2020; it is likely used by FIN6 and Wizard Spider.(Citation: Group IB GrimAgent July 2021)"
  - name: "FrameworkPOS"
    mitre_id: "S0503"
    url: "https://attack.mitre.org/software/S0503"
    type: "malware"
    stix_id: "malware--1cdbbcab-903a-414d-8eb0-439a97343737"
    description: "FrameworkPOS is a point of sale (POS) malware used by FIN6 to steal payment card data from sytems that run physical POS devices.(Citation: SentinelOne FrameworkPOS September 2019)"
  - name: "More_eggs"
    mitre_id: "S0284"
    url: "https://attack.mitre.org/software/S0284"
    type: "malware"
    stix_id: "malware--bfd2738c-8b43-43c3-bc9f-d523c8e88bf4"
    description: "More_eggs is a JScript backdoor used by Cobalt Group and FIN6. Its name was given based on the variable \"More_eggs\" being present in its code. There are at least two different versions of the backdoor being used, version 2.0 and version 4.4. (Citation: Talos Cobalt Group July 2018)(Citation: Security Intelligence More Eggs Aug 2019)"
  - name: "Cobalt Strike"
    mitre_id: "S0154"
    url: "https://attack.mitre.org/software/S0154"
    type: "malware"
    stix_id: "malware--a7881f21-e978-4fe4-af56-92c9416a2616"
    description: "Cobalt Strike is a commercial, full-featured, remote access tool that bills itself as “adversary simulation software designed to execute targeted attacks and emulate the post-exploitation actions of advanced threat actors”. Cobalt Strike’s interactive post-exploit capabilities cover the full range of ATT&CK tactics, all executed within a single, integrated system.(Citation: cobaltstrike manual)\n\nIn addition to its own capabilities, Cobalt Strike leverages the capabilities of other well-known tool"
  - name: "Windows Credential Editor"
    mitre_id: "S0005"
    url: "https://attack.mitre.org/software/S0005"
    type: "tool"
    stix_id: "tool--242f3da3-4425-4d11-8f5c-b842886da966"
    description: "Windows Credential Editor is a password dumping tool. (Citation: Amplia WCE)"
  - name: "AdFind"
    mitre_id: "S0552"
    url: "https://attack.mitre.org/software/S0552"
    type: "tool"
    stix_id: "tool--f59508a6-3615-47c3-b493-6676e1a39a87"
    description: "AdFind is a free command-line query tool that can be used for gathering information from Active Directory.(Citation: Red Canary Hospital Thwarted Ryuk October 2020)(Citation: FireEye FIN6 Apr 2019)(Citation: FireEye Ryuk and Trickbot January 2019)"
  - name: "PsExec"
    mitre_id: "S0029"
    url: "https://attack.mitre.org/software/S0029"
    type: "tool"
    stix_id: "tool--ff6caf67-ea1f-4895-b80e-4bb0fc31c6db"
    description: "PsExec is a free Microsoft tool that can be used to execute a program on another computer. It is used by IT administrators and attackers.(Citation: Russinovich Sysinternals)(Citation: SANS PsExec)"
  - name: "Maze"
    mitre_id: "S0449"
    url: "https://attack.mitre.org/software/S0449"
    type: "malware"
    stix_id: "malware--d9f7383c-95ec-4080-bbce-121c9384457b"
    description: "Maze ransomware, previously known as \"ChaCha\", was discovered in May 2019. In addition to encrypting files on victim machines for impact, Maze operators conduct information stealing campaigns prior to encryption and post the information online to extort affected companies.(Citation: FireEye Maze May 2020)(Citation: McAfee Maze March 2020)(Citation: Sophos Maze VM September 2020)"
  - name: "LockerGoga"
    mitre_id: "S0372"
    url: "https://attack.mitre.org/software/S0372"
    type: "malware"
    stix_id: "malware--5af7a825-2d9f-400d-931a-e00eb9e27f48"
    description: "LockerGoga is ransomware that was first reported in January 2019, and has been tied to various attacks on European companies, including industrial and manufacturing firms.(Citation: Unit42 LockerGoga 2019)(Citation: CarbonBlack LockerGoga 2019)"
  - name: "Ryuk"
    mitre_id: "S0446"
    url: "https://attack.mitre.org/software/S0446"
    type: "malware"
    stix_id: "malware--a020a61c-423f-4195-8c46-ba1d21abba37"
    description: "Ryuk is a ransomware designed to target enterprise environments that has been used in attacks since at least 2018. Ryuk shares code similarities with Hermes ransomware.(Citation: CrowdStrike Ryuk January 2019)(Citation: FireEye Ryuk and Trickbot January 2019)(Citation: FireEye FIN6 Apr 2019)"
  - name: "Mimikatz"
    mitre_id: "S0002"
    url: "https://attack.mitre.org/software/S0002"
    type: "tool"
    stix_id: "tool--afc079f3-c0ea-4096-b75d-3f05338b7f60"
    description: "Mimikatz is a credential dumper capable of obtaining plaintext Windows account logins and passwords, along with many other features that make it useful for testing the security of networks. (Citation: Deply Mimikatz) (Citation: Adsecurity Mimikatz Guide)"
