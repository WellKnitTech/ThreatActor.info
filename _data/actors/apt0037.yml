name: "FIN6"
aliases: ["ATK88","Camouflage Tempest","FIN6","G0037","GOLD FRANKLIN","Gold Franklin","ITG08","Magecart Group 6","MageCart Group 6","Skeleton Spider","SKELETON SPIDER","Storm-0538","TA4557","TAAL","Trinity","White Giant"]
description: "FIN6 is a cyber crime group that has stolen payment card data and sold it for profit on underground marketplaces. This group has aggressively targeted and compromised point of sale (PoS) systems in the hospitality and retail sectors. [FireEye FIN6 April 2016](https://web.archive.org/web/20190807112824/https://www2.fireeye.com/rs/848-DID-242/images/rpt-fin6.pdf) [FireEye FIN6 Apr 2019](https://www.fireeye.com/blog/threat-research/2019/04/pick-six-intercepting-a-fin6-intrusion.html)"
