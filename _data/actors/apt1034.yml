description: 'Daggerfly is a People''s Republic of China-linked APT entity active
  since at least 2012. Daggerfly has targeted individuals, government and NGO entities,
  and telecommunication companies in Asia and Africa. Daggerfly is associated with
  exclusive use of MgBot malware and is noted for several potential supply chain infection
  campaigns.(Citation: Symantec Daggerfly 2023)(Citation: ESET EvasivePanda 2023)(Citation:
  Symantec Daggerfly 2024)(Citation: ESET EvasivePanda 2024)'
