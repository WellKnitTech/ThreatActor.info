description: 'EvilWeb is a pro-Russian hacktivist group created in March 2024 that
  targets American and European entities using a hack-and-leak method alongside DDoS
  attacks. The group claims to have obtained data from various high-profile American
  organizations. EvilWeb announced its participation in the #FreeDurov operation on
  August 25, 2024, and began executing DDoS and hacking attacks. As of September 3,
  2024, their Telegram channel has 1,146 members.'
