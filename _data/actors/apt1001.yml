description: 'HEXANE is a cyber espionage threat group that has targeted oil & gas,
  telecommunications, aviation, and internet service provider organizations since
  at least 2017. Targeted companies have been located in the Middle East and Africa,
  including Israel, Saudi Arabia, Kuwait, Morocco, and Tunisia. HEXANE''s TTPs appear
  similar to APT33 and OilRig but due to differences in victims and tools it is tracked
  as a separate entity.(Citation: Dragos Hexane)(Citation: Kaspersky Lyceum October
  2021)(Citation: ClearSky Siamesekitten August 2021)(Citation: Accenture Lyceum Targets
  November 2021)'
