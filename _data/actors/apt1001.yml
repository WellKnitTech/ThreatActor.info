name: "HEXANE"
aliases: ["HEXANE","Lyceum","Siamesekitten","Spirlin"]
description: "HEXANE is a cyber espionage threat group that has targeted oil & gas, telecommunications, aviation, and internet service provider organizations since at least 2017. Targeted companies have been located in the Middle East and Africa, including Israel, Saudi Arabia, Kuwait, Morocco, and Tunisia. HEXANE's TTPs appear similar to APT33 and OilRig but due to differences in victims and tools it is tracked as a separate entity. [Dragos Hexane](https://dragos.com/resource/hexane/) [Kaspersky Lyceum October 2021](https://vblocalhost.com/uploads/VB2021-Kayal-etal.pdf) [ClearSky Siamesekitten August 2021](https://www.clearskysec.com/siamesekitten/) [Accenture Lyceum Targets November 2021](https://www.accenture.com/us-en/blogs/cyber-defense/iran-based-lyceum-campaigns)"
