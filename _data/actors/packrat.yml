description: A threat group that has been active for at least seven years has used
  malware, phishing and disinformation tactics to target activists, journalists, politicians
  and public figures in various Latin American countries.  The threat actor, dubbed
  Packrat based on its preference for remote access Trojans (RATs) and because it
  has used the same infrastructure for several years, has been analyzed by Citizen
  Lab researchers John Scott-Railton, Morgan Marquis-Boire, and Claudio Guarnieri,
  and Cyphort researcher Marion Marschalek, best known for her extensive analysis
  of state-sponsored threats.
