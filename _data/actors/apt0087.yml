name: "APT39"
aliases: ["APT39","Burgundy Sandstorm","Cadelle","Chafer","COBALT HICKMAN","G0087","ITG07","Radio Serpens","Remix Kitten","REMIX KITTEN","TA454"]
description: "APT39 is one of several names for cyber espionage activity conducted by the Iranian Ministry of Intelligence and Security (MOIS) through the front company Rana Intelligence Computing since at least 2014. APT39 has primarily targeted the travel, hospitality, academic, and telecommunications industries in Iran and across Asia, Africa, Europe, and North America to track individuals and entities considered to be a threat by the MOIS. [FireEye APT39 Jan 2019](https://www.fireeye.com/blog/threat-research/2019/01/apt39-iranian-cyber-espionage-group-focused-on-personal-information.html) [Symantec Chafer Dec 2015](https://www.symantec.com/connect/blogs/iran-based-attackers-use-back-door-threats-spy-middle-eastern-targets) [FBI FLASH APT39 September 2020](https://www.iranwatch.org/sites/default/files/public-intelligence-alert.pdf) [Dept. of Treasury Iran Sanctions September 2020](https://home.treasury.gov/news/press-releases/sm1127) [DOJ Iran Indictments September 2020](https://www.justice.gov/opa/pr/department-justice-and-partner-departments-and-agencies-conduct-coordinated-actions-disrupt)"
