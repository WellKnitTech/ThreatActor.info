software:
  - name: "MuddyViper"
    mitre_id: "S9032"
    url: "https://attack.mitre.org/software/S9032"
    type: "malware"
    stix_id: "malware--7b92e996-b535-4159-be16-3c3aee4edf54"
    description: "MuddyViper is custom backdoor written in C and C++ used by MuddyWater for command and control (C2) communications and persistence. MuddyViper is loaded by Fooder and sends frequent messages to the C2 server.(Citation: ESET_MuddyWater_Dec2025)"
  - name: "STARWHALE"
    mitre_id: "S1037"
    url: "https://attack.mitre.org/software/S1037"
    type: "malware"
    stix_id: "malware--e355fc84-6f3c-4888-8e0a-d7fa9c378532"
    description: "STARWHALE is Windows Script File (WSF) backdoor that has been used by MuddyWater, possibly since at least November 2021; there is also a STARWHALE variant written in Golang with similar capabilities. Security researchers have also noted the use of STARWHALE by UNC3313, which may be associated with MuddyWater.(Citation: Mandiant UNC3313 Feb 2022)(Citation: DHS CISA AA22-055A MuddyWater February 2022)"
  - name: "LP-Notes"
    mitre_id: "S9036"
    url: "https://attack.mitre.org/software/S9036"
    type: "malware"
    stix_id: "malware--7fbf1f1e-cbd8-4060-8e3b-7ca0e56ce3fe"
    description: "LP-Notes is a C/C++ Windows credential stealer used by MuddyWater. LP-Notes was named after the `lp-notes.txt` file that is used to store stolen credentials.(Citation: ESET_MuddyWater_Dec2025)  "
  - name: "POWERSTATS"
    mitre_id: "S0223"
    url: "https://attack.mitre.org/software/S0223"
    type: "malware"
    stix_id: "malware--e8545794-b98c-492b-a5b3-4b5a02682e37"
    description: "POWERSTATS is a PowerShell-based first stage backdoor used by MuddyWater. (Citation: Unit 42 MuddyWater Nov 2017)"
  - name: "Rclone"
    mitre_id: "S1040"
    url: "https://attack.mitre.org/software/S1040"
    type: "tool"
    stix_id: "tool--59096109-a1dd-463b-87e7-a8d110fe3a79"
    description: "Rclone is a command line program for syncing files with cloud storage services such as Dropbox, Google Drive, Amazon S3, and MEGA. Rclone has been used in a number of ransomware campaigns, including those associated with the Conti and DarkSide Ransomware-as-a-Service operations.(Citation: Rclone)(Citation: Rclone Wars)(Citation: Detecting Rclone)(Citation: DarkSide Ransomware Gang)(Citation: DFIR Conti Bazar Nov 2021)"
  - name: "Out1"
    mitre_id: "S0594"
    url: "https://attack.mitre.org/software/S0594"
    type: "tool"
    stix_id: "tool--80c815bb-b24a-4b9c-9d73-ff4c075a278d"
    description: "Out1 is a remote access tool written in python and used by MuddyWater since at least 2021.(Citation: Trend Micro Muddy Water March 2021)"
  - name: "Tsundere Botnet"
    mitre_id: "S9034"
    url: "https://attack.mitre.org/software/S9034"
    type: "malware"
    stix_id: "malware--18f5f8c6-bba5-4aba-93e7-3539fe565883"
    description: "Tsundere Botnet is a botnet first reported in mid-2025 that is delivered via MSI installer or PowerShell script. It leverages Node.js and JavaScript for payload delivery and execution, and uses smart contracts on the blockchain to host command and control (C2) addresses. Tsundere Botnet is attributed to a likely Russian-speaking threat actor.\n\nA variant named DinDoor has been linked to MuddyWater operations and uses the Deno runtime for execution rather than Node.js. (Citation: Checkpoint_MOISCyb"
  - name: "PowerSploit"
    mitre_id: "S0194"
    url: "https://attack.mitre.org/software/S0194"
    type: "tool"
    stix_id: "tool--13cd9151-83b7-410d-9f98-25d0f0d1d80d"
    description: "PowerSploit is an open source, offensive security framework comprised of PowerShell modules and scripts that perform a wide range of tasks related to penetration testing such as code execution, persistence, bypassing anti-virus, recon, and exfiltration. (Citation: GitHub PowerSploit May 2012) (Citation: PowerShellMagazine PowerSploit July 2014) (Citation: PowerSploit Documentation)"
  - name: "Small Sieve"
    mitre_id: "S1035"
    url: "https://attack.mitre.org/software/S1035"
    type: "malware"
    stix_id: "malware--ff41b9b6-4c1d-407b-a7e2-835109c8dbc5"
    description: "Small Sieve is a Telegram Bot API-based Python backdoor that has been distributed using a Nullsoft Scriptable Install System (NSIS) Installer; it has been used by MuddyWater since at least January 2022.(Citation: DHS CISA AA22-055A MuddyWater February 2022)(Citation: NCSC GCHQ Small Sieve Jan 2022)\n\nSecurity researchers have also noted Small Sieve's use by UNC3313, which may be associated with MuddyWater.(Citation: Mandiant UNC3313 Feb 2022)"
  - name: "Fooder"
    mitre_id: "S9033"
    url: "https://attack.mitre.org/software/S9033"
    type: "malware"
    stix_id: "malware--7c8865dc-1bf9-49ce-b5f2-f15abde0909a"
    description: "Fooder is a custom 64-bit C/C++ loader used by MuddyWater that can decrypt and reflectively load embedded payloads such as a go-socks5 proxy utility, the open-source HackBrowserData infostealer, or the MuddyViper backdoor. Fooder has frequently masqueraded as an entertainment executable, such as the Snake game (e.g., `Snake_Game.exe`).(Citation: ESET_MuddyWater_Dec2025)"
  - name: "Mori"
    mitre_id: "S1047"
    url: "https://attack.mitre.org/software/S1047"
    type: "malware"
    stix_id: "malware--7e100ca4-e639-48d9-9a9d-8ad84aa7b448"
    description: "Mori is a backdoor that has been used by MuddyWater since at least January 2022.(Citation: DHS CISA AA22-055A MuddyWater February 2022)(Citation: CYBERCOM Iranian Intel Cyber January 2022)"
  - name: "Mimikatz"
    mitre_id: "S0002"
    url: "https://attack.mitre.org/software/S0002"
    type: "tool"
    stix_id: "tool--afc079f3-c0ea-4096-b75d-3f05338b7f60"
    description: "Mimikatz is a credential dumper capable of obtaining plaintext Windows account logins and passwords, along with many other features that make it useful for testing the security of networks. (Citation: Deply Mimikatz) (Citation: Adsecurity Mimikatz Guide)"
  - name: "LaZagne"
    mitre_id: "S0349"
    url: "https://attack.mitre.org/software/S0349"
    type: "tool"
    stix_id: "tool--b76b2d94-60e4-4107-a903-4a3a7622fb3b"
    description: "LaZagne is a post-exploitation, open-source tool used to recover stored passwords on a system. It has modules for Windows, Linux, and OSX, but is mainly focused on Windows systems. LaZagne is publicly available on GitHub.(Citation: GitHub LaZagne Dec 2018)"
  - name: "PowGoop"
    mitre_id: "S1046"
    url: "https://attack.mitre.org/software/S1046"
    type: "malware"
    stix_id: "malware--c19d19ae-dd58-4584-8469-966bbeaa80e3"
    description: "PowGoop is a loader that consists of a DLL loader and a PowerShell-based downloader; it has been used by MuddyWater as their main loader.(Citation: DHS CISA AA22-055A MuddyWater February 2022)(Citation: CYBERCOM Iranian Intel Cyber January 2022)"
  - name: "CrackMapExec"
    mitre_id: "S0488"
    url: "https://attack.mitre.org/software/S0488"
    type: "tool"
    stix_id: "tool--c4810609-7da6-48ec-8057-1b70a7814db0"
    description: "CrackMapExec, or CME, is a post-exploitation tool developed in Python and designed for penetration testing against networks. CrackMapExec collects Active Directory information to conduct lateral movement through targeted networks.(Citation: CME Github September 2018)"
  - name: "ConnectWise"
    mitre_id: "S0591"
    url: "https://attack.mitre.org/software/S0591"
    type: "tool"
    stix_id: "tool--842976c7-f9c8-41b2-8371-41dc64fbe261"
    description: "ConnectWise is a legitimate remote administration tool that has been used since at least 2016 by threat actors including MuddyWater and GOLD SOUTHFIELD to connect to and conduct lateral movement in target environments.(Citation: Anomali Static Kitten February 2021)(Citation: Trend Micro Muddy Water March 2021)"
  - name: "SHARPSTATS"
    mitre_id: "S0450"
    url: "https://attack.mitre.org/software/S0450"
    type: "malware"
    stix_id: "malware--73c4711b-407a-449d-b269-e3b1531fe7a9"
    description: "SHARPSTATS is a .NET backdoor used by MuddyWater since at least 2019.(Citation: TrendMicro POWERSTATS V3 June 2019)"
  - name: "Empire"
    mitre_id: "S0363"
    url: "https://attack.mitre.org/software/S0363"
    type: "tool"
    stix_id: "tool--3433a9e8-1c47-4320-b9bf-ed449061d1c3"
    description: "Empire is an open-source, cross-platform remote administration and post-exploitation framework that is publicly available on GitHub. While the tool itself is primarily written in Python, the post-exploitation agents are written in pure PowerShell for Windows and Python for Linux/macOS. Empire was one of five tools singled out by a joint report on public hacking tools being widely used by adversaries.(Citation: NCSC Joint Report Public Tools)(Citation: Github PowerShell Empire)(Citation: GitHub AT"
  - name: "RemoteUtilities"
    mitre_id: "S0592"
    url: "https://attack.mitre.org/software/S0592"
    type: "tool"
    stix_id: "tool--03c6e0ea-96d3-4b23-9afb-05055663cf4b"
    description: "RemoteUtilities is a legitimate remote administration tool that has been used by MuddyWater since at least 2021 for execution on target machines.(Citation: Trend Micro Muddy Water March 2021)"
  - name: "Koadic"
    mitre_id: "S0250"
    url: "https://attack.mitre.org/software/S0250"
    type: "tool"
    stix_id: "tool--c8655260-9f4b-44e3-85e1-6538a5f6e4f4"
    description: "Koadic is a Windows post-exploitation framework and penetration testing tool that is publicly available on GitHub. Koadic has several options for staging payloads and creating implants, and performs most of its operations using Windows Script Host.(Citation: Github Koadic)(Citation: Palo Alto Sofacy 06-2018)(Citation: MalwareBytes LazyScripter Feb 2021)"
  - name: "DCHSpy"
    mitre_id: "S1243"
    url: "https://attack.mitre.org/software/S1243"
    type: "malware"
    stix_id: "malware--6d5c257d-e6de-4c95-a7e8-09ac9386007d"
    description: "DCHSpy is an Android spyware likely used by MuddyWater. DCHSpy uses political decoys and masquerades as legitimate applications, such as VPNs and banking applications, to trick victims into downloading the malware. Once downloaded, DCHSpy collects information from the device and exfiltrates the data to the command and control (C2) server.(Citation: Lookout_DCHSpy_July2025) "
