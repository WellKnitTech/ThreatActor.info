- LUNAR SPIDER
description: 'According to CrowdStrike, this actor is using BokBok/IcedID, potentially
  buying distribution through Emotet infections.

  On March 17, 2019, CrowdStrike Intelligence observed the use of a new BokBot (developed
  and operated by LUNAR SPIDER) proxy module in conjunction with TrickBot (developed
  and operated by WIZARD SPIDER), which may provide WIZARD SPIDER with additional
  tools to steal sensitive information and conduct fraudulent wire transfers. This
  activity also provides further evidence to support the existence of a flourishing
  relationship between these two actors.

  Lunar Spider is reportedly associated withGrim Spider and Wizard Spider.'
