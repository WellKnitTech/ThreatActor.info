description: Zarya is a pro-Russian hacktivist group that emerged in March 2022. Initially
  operating as a special forces unit under the command of Killnet, Zarya has since
  become an independent entity. The group is primarily known for engaging in Denial-of-Service
  attacks, website defacement campaigns, and data leaks. Zarya targets government
  agencies, service providers, critical infrastructure, and civil service employees,
  both domestically and internationally.
