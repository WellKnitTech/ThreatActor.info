  - name: "Qilin"
    mitre_id: "S1242"
    url: "https://attack.mitre.org/software/S1242"
    type: "malware"
    stix_id: "malware--e23d2777-b85d-44fc-861e-9149d399fbb9"
    description: "Qilin is a ransomware family operated as a ransomware-as-a-service (RaaS) that has been active since at least 2022. It includes variants written in Go and Rust capable of targeting Windows, Linux, and VMware ESXi environments. Qilin shares functionality overlaps with Black Basta, REvil, and BlackCat ransomware. Qilin affiliates have targeted multiple entities worldwide with the majority of victims in the US, France, Canada, and the UK, primarily in the manufacturing, technology, financial service"
  - name: "Tor"
    mitre_id: "S0183"
    url: "https://attack.mitre.org/software/S0183"
    type: "tool"
    stix_id: "tool--ed7d0cb1-87a6-43b4-9f46-ef1bc56d6c68"
    description: "Tor is a software suite and network that provides increased anonymity on the Internet. It creates a multi-hop proxy network and utilizes multilayer encryption to protect both the message and routing information. Tor utilizes \"Onion Routing,\" in which messages are encrypted with multiple layers of encryption; at each step in the proxy network, the topmost layer is decrypted and the contents forwarded on to the next node until it reaches its destination. (Citation: Dingledine Tor The Second-Generat"
