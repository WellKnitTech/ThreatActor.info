description: UAC-0099 is a threat actor that has been active since at least May 2023,
  targeting Ukrainian entities. They have been observed using a known WinRAR vulnerability
  to carry out attacks, indicating a level of sophistication. The actor relies on
  PowerShell and the creation of scheduled tasks to execute malicious VBS files for
  initial infection. Monitoring and limiting the functionality of these components
  can help mitigate the risk of UAC-0099 attacks.
