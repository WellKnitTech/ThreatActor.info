description: SAMBASPIDER is a threat actor associated to the Mispadu malware. On July
  24, USDoD allegedly scraped and leaked a 100,000-line Indicator of Compromise list
  from CrowdStrike, revealing detailed threat intelligence data. The leak, posted
  on Breach Forums, includes critical insights into the Mispadu malware and SAMBASPIDER
  threat actor.
