description: Turkish nationalist hacktivist group that has been active for roughly
  one year. According to Domaintools, the group’s site has been registered since December
  2015, with an active Twitter account since January 2016. The group carries out distributed
  denial-of-service (DDoS) attacks and defacements against the sites of news organizations
  and governments perceived to be critical of Turkey’s policies or leadership, and
  purports to act in defense of Islam
