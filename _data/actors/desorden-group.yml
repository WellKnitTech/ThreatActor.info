description: Desorden (Disorder in Spanish, previously known as ChaosCC), is a financially
  motivated hacker group. The group first emerged under the new name Desorden in September
  2021, on Raidforums. Today the group maintains users under that name on several
  popular English-speaking hacking forums, where they share their attacks and ransom
  demands, and offer databases for sale. The group gained an excellent reputation
  among the cybercriminal communities due to their successful operations and the unique
  data that they share and offer for sale.
