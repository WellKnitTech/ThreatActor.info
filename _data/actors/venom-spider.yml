description: VENOM SPIDER is the developer of a large toolset that includes SKID,
  VenomKit and Taurus Loader. Under the moniker 'badbullzvenom', the adversary has
  been an active member of Russian underground forums since at least 2012, specializing
  in the identification of vulnerabilities and the subsequent development of tools
  for exploitation, as well as for gaining and maintaining access to victim machines
  and carding services. Recent advertisements for the malware indicate that VENOM
  SPIDER limits the sale and use of its tools, selling modules only to trusted affiliates.
  This preference can be seen in the fact that adversaries observed using the tools
  include the targeted criminal adversary COBALT SPIDER and BGH adversaries WIZARD
  SPIDER and PINCHY SPIDER.
