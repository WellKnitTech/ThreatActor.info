description: Treasury has identified a sophisticated cyber-enabled ATM cash out campaign
  we are calling FASTCash. FASTCash has been active since late 2016 targeting banks
  in Africa and Asia to remotely compromise payment switch application servers within
  banks to facilitate fraudulent transactions, primarily involving ATMs, to steal
  cash equivalent to tens of millions of dollars. FBI has attributed malware used
  in this campaign to the North Korean government. We expect FASTCash to continue
  targeting retail payment systems vulnerable to remote exploitation.
