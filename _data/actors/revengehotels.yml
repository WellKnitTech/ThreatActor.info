name: RevengeHotels
aliases:
- RevengeHotels
description: RevengeHotels is a targeted cybercrime campaign that has been active
  since 2015, primarily targeting hotels, hostels, and tourism companies. The threat
  actor uses remote access Trojan malware to infiltrate hotel front desks and steal
  credit card data from guests and travelers. The campaign has impacted hotels in
  multiple countries, including Brazil, Argentina, Chile, and Mexico. The threat actor
  employs social engineering techniques and sells credentials from infected systems
  to other cybercriminals for remote access.
