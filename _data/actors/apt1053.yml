software:
  - name: "Impacket"
    mitre_id: "S0357"
    url: "https://attack.mitre.org/software/S0357"
    type: "tool"
    stix_id: "tool--26c87906-d750-42c5-946c-d4162c73fc7b"
    description: "Impacket is an open source collection of modules written in Python for programmatically constructing and manipulating network protocols. Impacket contains several tools for remote service execution, Kerberos manipulation, Windows credential dumping, packet sniffing, and relay attacks.(Citation: Impacket Tools)"
  - name: "Tasklist"
    mitre_id: "S0057"
    url: "https://attack.mitre.org/software/S0057"
    type: "tool"
    stix_id: "tool--2e45723a-31da-4a7e-aaa6-e01998a6788f"
    description: "The Tasklist utility displays a list of applications and services with their Process IDs (PID) for all tasks running on either a local or a remote computer. It is packaged with Windows operating systems and can be executed from the command-line interface. (Citation: Microsoft Tasklist)"
  - name: "Cobalt Strike"
    mitre_id: "S0154"
    url: "https://attack.mitre.org/software/S0154"
    type: "malware"
    stix_id: "malware--a7881f21-e978-4fe4-af56-92c9416a2616"
    description: "Cobalt Strike is a commercial, full-featured, remote access tool that bills itself as “adversary simulation software designed to execute targeted attacks and emulate the post-exploitation actions of advanced threat actors”. Cobalt Strike’s interactive post-exploit capabilities cover the full range of ATT&CK tactics, all executed within a single, integrated system.(Citation: cobaltstrike manual)\n\nIn addition to its own capabilities, Cobalt Strike leverages the capabilities of other well-known tool"
  - name: "Embargo"
    mitre_id: "S1247"
    url: "https://attack.mitre.org/software/S1247"
    type: "malware"
    stix_id: "malware--82adb90e-43b8-4bce-9efe-afeba65457b2"
    description: "Embargo is a ransomware variant written in Rust that has been active since at least May 2024.(Citation: Cyble Embargo Ransomware May 2024)(Citation: ESET Embargo Ransomware October 2024)  Embargo ransomware operations are associated with “double extortion” ransomware activity, where data is exfiltrated from victim environments prior to encryption, with threats to publish files if a ransom is not paid.(Citation: Cyble Embargo Ransomware May 2024)(Citation: ESET Embargo Ransomware October 2024)  Em"
  - name: "Rclone"
    mitre_id: "S1040"
    url: "https://attack.mitre.org/software/S1040"
    type: "tool"
    stix_id: "tool--59096109-a1dd-463b-87e7-a8d110fe3a79"
    description: "Rclone is a command line program for syncing files with cloud storage services such as Dropbox, Google Drive, Amazon S3, and MEGA. Rclone has been used in a number of ransomware campaigns, including those associated with the Conti and DarkSide Ransomware-as-a-Service operations.(Citation: Rclone)(Citation: Rclone Wars)(Citation: Detecting Rclone)(Citation: DarkSide Ransomware Gang)(Citation: DFIR Conti Bazar Nov 2021)"
  - name: "Nltest"
    mitre_id: "S0359"
    url: "https://attack.mitre.org/software/S0359"
    type: "tool"
    stix_id: "tool--981acc4c-2ede-4b56-be6e-fa1a75f37acf"
    description: "Nltest is a Windows command-line utility used to list domain controllers and enumerate domain trusts.(Citation: Nltest Manual)"
  - name: "Net"
    mitre_id: "S0039"
    url: "https://attack.mitre.org/software/S0039"
    type: "tool"
    stix_id: "tool--03342581-f790-4f03-ba41-e82e67392e23"
    description: "The Net utility is a component of the Windows operating system. It is used in command-line operations for control of users, groups, services, and network connections. (Citation: Microsoft Net Utility)\n\nNet has a great deal of functionality, (Citation: Savill 1999) much of which is useful for an adversary, such as gathering system and network information for Discovery, moving laterally through SMB/Windows Admin Shares using <code>net use</code> commands, and interacting with services. The net1.exe"
  - name: "AADInternals"
    mitre_id: "S0677"
    url: "https://attack.mitre.org/software/S0677"
    type: "tool"
    stix_id: "tool--2c5281dd-b5fd-4531-8aea-c1bf8a0f8756"
    description: "AADInternals is a PowerShell-based framework for administering, enumerating, and exploiting Azure Active Directory. The tool is publicly available on GitHub.(Citation: AADInternals Github)(Citation: AADInternals Documentation)"
