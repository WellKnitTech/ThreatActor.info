  - name: "Empire"
    mitre_id: "S0363"
    url: "https://attack.mitre.org/software/S0363"
    type: "tool"
    stix_id: "tool--3433a9e8-1c47-4320-b9bf-ed449061d1c3"
    description: "Empire is an open-source, cross-platform remote administration and post-exploitation framework that is publicly available on GitHub. While the tool itself is primarily written in Python, the post-exploitation agents are written in pure PowerShell for Windows and Python for Linux/macOS. Empire was one of five tools singled out by a joint report on public hacking tools being widely used by adversaries.(Citation: NCSC Joint Report Public Tools)(Citation: Github PowerShell Empire)(Citation: GitHub AT"
  - name: "gh0st RAT"
    mitre_id: "S0032"
    url: "https://attack.mitre.org/software/S0032"
    type: "malware"
    stix_id: "malware--88c621a7-aef9-4ae0-94e3-1fc87123eb24"
    description: "gh0st RAT is a remote access tool (RAT). The source code is public and it has been used by multiple groups.(Citation: FireEye Hacking Team)(Citation: Arbor Musical Chairs Feb 2018)(Citation: Nccgroup Gh0st April 2018)"
  - name: "Net"
    mitre_id: "S0039"
    url: "https://attack.mitre.org/software/S0039"
    type: "tool"
    stix_id: "tool--03342581-f790-4f03-ba41-e82e67392e23"
    description: "The Net utility is a component of the Windows operating system. It is used in command-line operations for control of users, groups, services, and network connections. (Citation: Microsoft Net Utility)\n\nNet has a great deal of functionality, (Citation: Savill 1999) much of which is useful for an adversary, such as gathering system and network information for Discovery, moving laterally through SMB/Windows Admin Shares using <code>net use</code> commands, and interacting with services. The net1.exe"
  - name: "PowerSploit"
    mitre_id: "S0194"
    url: "https://attack.mitre.org/software/S0194"
    type: "tool"
    stix_id: "tool--13cd9151-83b7-410d-9f98-25d0f0d1d80d"
    description: "PowerSploit is an open source, offensive security framework comprised of PowerShell modules and scripts that perform a wide range of tasks related to penetration testing such as code execution, persistence, bypassing anti-virus, recon, and exfiltration. (Citation: GitHub PowerSploit May 2012) (Citation: PowerShellMagazine PowerSploit July 2014) (Citation: PowerSploit Documentation)"
  - name: "MURKYTOP"
    mitre_id: "S0233"
    url: "https://attack.mitre.org/software/S0233"
    type: "malware"
    stix_id: "malware--049ff071-0b3c-4712-95d2-d21c6aa54501"
    description: "MURKYTOP is a reconnaissance tool used by Leviathan. (Citation: FireEye Periscope March 2018)"
  - name: "NanHaiShu"
    mitre_id: "S0228"
    url: "https://attack.mitre.org/software/S0228"
    type: "malware"
    stix_id: "malware--705f0783-5f7d-4491-b6b7-9628e6e006d2"
    description: "NanHaiShu is a remote access tool and JScript backdoor used by Leviathan. NanHaiShu has been used to target government and private-sector organizations that have relations to the South China Sea dispute. (Citation: Proofpoint Leviathan Oct 2017) (Citation: fsecure NanHaiShu July 2016)"
  - name: "Orz"
    mitre_id: "S0229"
    url: "https://attack.mitre.org/software/S0229"
    type: "malware"
    stix_id: "malware--06d735e7-1db1-4dbe-ab4b-acbe419f902b"
    description: "Orz is a custom JavaScript backdoor used by Leviathan. It was observed being used in 2014 as well as in August 2017 when it was dropped by Microsoft Publisher files. (Citation: Proofpoint Leviathan Oct 2017) (Citation: FireEye Periscope March 2018)"
  - name: "Cobalt Strike"
    mitre_id: "S0154"
    url: "https://attack.mitre.org/software/S0154"
    type: "malware"
    stix_id: "malware--a7881f21-e978-4fe4-af56-92c9416a2616"
    description: "Cobalt Strike is a commercial, full-featured, remote access tool that bills itself as “adversary simulation software designed to execute targeted attacks and emulate the post-exploitation actions of advanced threat actors”. Cobalt Strike’s interactive post-exploit capabilities cover the full range of ATT&CK tactics, all executed within a single, integrated system.(Citation: cobaltstrike manual)\n\nIn addition to its own capabilities, Cobalt Strike leverages the capabilities of other well-known tool"
  - name: "China Chopper"
    mitre_id: "S0020"
    url: "https://attack.mitre.org/software/S0020"
    type: "malware"
    stix_id: "malware--5a3a31fe-5a8f-48e1-bff0-a753e5b1be70"
    description: "China Chopper is a Web Shell hosted on Web servers to provide access back into an enterprise network that does not rely on an infected system calling back to a remote command and control server.(Citation: Lee 2013) It has been used by several threat groups.(Citation: Dell TG-3390)(Citation: FireEye Periscope March 2018)(Citation: CISA AA21-200A APT40 July 2021)(Citation: Rapid7 HAFNIUM Mar 2021)"
  - name: "Tor"
    mitre_id: "S0183"
    url: "https://attack.mitre.org/software/S0183"
    type: "tool"
    stix_id: "tool--ed7d0cb1-87a6-43b4-9f46-ef1bc56d6c68"
    description: "Tor is a software suite and network that provides increased anonymity on the Internet. It creates a multi-hop proxy network and utilizes multilayer encryption to protect both the message and routing information. Tor utilizes \"Onion Routing,\" in which messages are encrypted with multiple layers of encryption; at each step in the proxy network, the topmost layer is decrypted and the contents forwarded on to the next node until it reaches its destination. (Citation: Dingledine Tor The Second-Generat"
