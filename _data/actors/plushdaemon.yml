description: PlushDaemon is a China-aligned APT group that has conducted cyberespionage
  operations against targets in China, Taiwan, Hong Kong, South Korea, the United
  States, and New Zealand. They executed a supply chain attack on the South Korean
  VPN provider IPany, compromising its installer to deploy the SlowStepper backdoor,
  which features a toolkit of over 30 components. PlushDaemon primarily gains initial
  access by hijacking legitimate updates of Chinese applications and has also exploited
  vulnerabilities in legitimate web servers. Additionally, they have utilized the
  Visual Studio command line utility regcap.exe to side-load a malicious DLL named
  lregdll.dll.
