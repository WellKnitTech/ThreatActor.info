description: Mogilevich is a ransomware group known for claiming to breach organizations
  like Epic Games and Ireland's Department of Foreign Affairs, offering stolen data
  for sale without providing proof of the attacks. They operate as an extortion group,
  targeting high-profile victims and demanding payment for the data they claim to
  have stolen. Despite their claims, security researchers have noted that Mogilevich's
  tactics and website design suggest they may not be a sophisticated threat actor.
