description: Prodaft researchers have published a report on Paperbug, a cyber-espionage
  campaign carried out by suspected Russian-speaking group Nomadic Octopus and which
  targeted entities in Tajikistan. According to Prodaft, known compromised victims
  included high-ranking government officials, telcos, and public service infrastructures.
  Compromised devices also included OT devices, besides your typical computers, servers,
  and mobile devices. In typical Prodaft fashion, the company also gained access to
  one of the group's C&C server backend panels.
