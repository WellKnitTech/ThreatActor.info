description: CloudSorcerer is a sophisticated APT targeting Russian government entities,
  utilizing cloud infrastructure for stealth monitoring and data exfiltration. The
  malware leverages APIs and authentication tokens to access cloud resources for command
  and control, with GitHub serving as its initial C2 server. CloudSorcerer operates
  as separate modules depending on the process it's running in, executing from a single
  executable and utilizing complex inter-process communication through Windows pipes.
  The actor behind CloudSorcerer shows similarities to the CloudWizard APT in modus
  operandi, but the unique code and functionality suggest it is a new threat actor
  inspired by previous techniques.
