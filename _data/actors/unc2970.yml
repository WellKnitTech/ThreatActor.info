description: UNC2970 is a North Korean threat actor that primarily targets organizations
  through spear-phishing emails with job recruitment themes, often utilizing fake
  LinkedIn accounts to engage victims. The group employs the PLANKWALK backdoor and
  other malware families, leveraging compromised WordPress sites for command and control.
  They have been observed using BYOVD techniques to exploit vulnerable drivers for
  evading detection. Mandiant has noted a shift in UNC2970's targeting strategy, including
  a focus on security researchers and advancements in their operational capabilities
  against EDR tools.
