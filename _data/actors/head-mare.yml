description: Head Mare is a hacktivism focussed threat actor group known for targeting
  Russia and Belarus sectors using a remote access malware called PhantomRAT. They
  have been observed executing malicious code through specially crafted RAR archives,
  different from previous attacks exploiting vulnerabilities. The attribution of their
  campaign to Ukraine is uncertain due to limited visibility inside Russian networks.
  PhantomCore's use of RAR archives in their attack chain has been previously observed
  in other threat actor groups like Forest Blizzard.
