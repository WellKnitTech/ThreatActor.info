campaigns:
  - name: "Triton Safety Instrumented System Attack"
    campaign_id: "C0030"
    url: "https://attack.mitre.org/campaigns/C0030"
    stix_id: "campaign--45a98f02-852f-49b2-94c0-c63207bebbbf"
    description: "Triton Safety Instrumented System Attack was a campaign employed by TEMP.Veles which leveraged the Triton malware framework against a petrochemical organization.(Citation: Triton-EENews-2017) The malware and techniques used within this campaign targeted specific Triconex Safety Controllers within the environment.(Citation: FireEye TRITON 2018) The incident was eventually discovered due to a safety trip that occurred as a result of an issue in the malware.(Citation: FireEye TRITON 2017)\n"
  - name: "C0032"
    campaign_id: "C0032"
    url: "https://attack.mitre.org/campaigns/C0032"
    stix_id: "campaign--7ec2826c-0bf0-4b47-acae-fd683431a4ca"
    description: "C0032 was an extended campaign suspected to involve the Triton adversaries with related capabilities and techniques focused on gaining a foothold within IT environments. This campaign occurred in 2019 and was distinctly different from the Triton Safety Instrumented System Attack.(Citation: FireEye TRITON 2019)"
