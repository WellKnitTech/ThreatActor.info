description: Blackwood is a China-aligned APT group that has been active since at
  least 2018. They primarily engage in cyberespionage operations targeting individuals
  and companies in China, Japan, and the United Kingdom. Blackwood utilizes sophisticated
  techniques such as adversary-in-the-middle attacks to deliver their custom implant,
  NSPX30, through updates of legitimate software. They also have the capability to
  hide the location of their command and control servers by intercepting traffic generated
  by the implant.
