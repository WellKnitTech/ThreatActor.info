name: "LazyScripter"
aliases: ["LazyScripter"]
description: "LazyScripter is threat group that has mainly targeted the airlines industry since at least 2018, primarily using open-source toolsets. [MalwareBytes LazyScripter Feb 2021](https://web.archive.org/web/20211003035156/https://www.malwarebytes.com/resources/files/2021/02/lazyscripter.pdf)"
