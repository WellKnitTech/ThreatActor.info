software:
  - name: "Remcos"
    mitre_id: "S0332"
    url: "https://attack.mitre.org/software/S0332"
    type: "tool"
    stix_id: "tool--7cd0bc75-055b-4098-a00e-83dc8beaff14"
    description: "Remcos is a closed-source tool that is marketed as a remote control and surveillance software by a company called Breaking Security. Remcos has been observed being used in malware campaigns.(Citation: Riskiq Remcos Jan 2018)(Citation: Talos Remcos Aug 2018)"
  - name: "QuasarRAT"
    mitre_id: "S0262"
    url: "https://attack.mitre.org/software/S0262"
    type: "tool"
    stix_id: "tool--da04ac30-27da-4959-a67d-450ce47d9470"
    description: "QuasarRAT is an open-source, remote access tool that has been publicly available on GitHub since at least 2014. QuasarRAT is developed in the C# language.(Citation: GitHub QuasarRAT)(Citation: Volexity Patchwork June 2018)"
  - name: "njRAT"
    mitre_id: "S0385"
    url: "https://attack.mitre.org/software/S0385"
    type: "malware"
    stix_id: "malware--d906e6f7-434c-44c0-b51a-ed50af8f7945"
    description: "njRAT is a remote access tool (RAT) that was first observed in 2012. It has been used by threat actors in the Middle East.(Citation: Fidelis njRAT June 2013)"
  - name: "ngrok"
    mitre_id: "S0508"
    url: "https://attack.mitre.org/software/S0508"
    type: "tool"
    stix_id: "tool--2f7f03bb-f367-4a5a-ad9b-310a12a48906"
    description: "ngrok is a legitimate reverse proxy tool that can create a secure tunnel to servers located behind firewalls or on local machines that do not have a public IP. ngrok has been leveraged by threat actors in several campaigns including use for lateral movement and data exfiltration.(Citation: Zdnet Ngrok September 2018)(Citation: FireEye Maze May 2020)(Citation: Cyware Ngrok May 2019)(Citation: MalwareBytes LazyScripter Feb 2021)"
  - name: "Empire"
    mitre_id: "S0363"
    url: "https://attack.mitre.org/software/S0363"
    type: "tool"
    stix_id: "tool--3433a9e8-1c47-4320-b9bf-ed449061d1c3"
    description: "Empire is an open-source, cross-platform remote administration and post-exploitation framework that is publicly available on GitHub. While the tool itself is primarily written in Python, the post-exploitation agents are written in pure PowerShell for Windows and Python for Linux/macOS. Empire was one of five tools singled out by a joint report on public hacking tools being widely used by adversaries.(Citation: NCSC Joint Report Public Tools)(Citation: Github PowerShell Empire)(Citation: GitHub AT"
  - name: "Koadic"
    mitre_id: "S0250"
    url: "https://attack.mitre.org/software/S0250"
    type: "tool"
    stix_id: "tool--c8655260-9f4b-44e3-85e1-6538a5f6e4f4"
    description: "Koadic is a Windows post-exploitation framework and penetration testing tool that is publicly available on GitHub. Koadic has several options for staging payloads and creating implants, and performs most of its operations using Windows Script Host.(Citation: Github Koadic)(Citation: Palo Alto Sofacy 06-2018)(Citation: MalwareBytes LazyScripter Feb 2021)"
  - name: "KOCTOPUS"
    mitre_id: "S0669"
    url: "https://attack.mitre.org/software/S0669"
    type: "malware"
    stix_id: "malware--df9b350b-d4f9-4e79-a826-75cc75fbc1eb"
    description: "KOCTOPUS's batch variant is loader used by LazyScripter since 2018 to launch Octopus and Koadic and, in some cases, QuasarRAT. KOCTOPUS also has a VBA variant that has the same functionality as the batch version.(Citation: MalwareBytes LazyScripter Feb 2021)"
