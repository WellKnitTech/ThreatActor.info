description: HomeLand Justice is an Iranian state-sponsored cyber threat group that
  has been active since at least May 2021. They have targeted various organizations,
  including a well-known telecommunication company and the Albanian Parliament. The
  group engaged in information operations and messaging campaigns to amplify the impact
  of their attacks.
