name: "APT41"
aliases: ["Amoeba","APT41","Barium","BARIUM","Blackfly","Brass Typhoon","BRONZE ATLAS","BRONZE EXPORT","Double Dragon","Earth Baku","G0044","G0096","Grayfly","HOODOO","LEAD","Leopard Typhoon","Red Kelpie","TA415","TG-2633","Wicked Panda","WICKED PANDA","WICKED SPIDER","Wicked Spider","Winnti","Winnti Group","Winnti Umbrella"]
description: "APT41 is a threat group that researchers have assessed as Chinese state-sponsored espionage group that also conducts financially-motivated operations. Active since at least 2012, APT41 has been observed targeting various industries, including but not limited to healthcare, telecom, technology, finance, education, retail and video game industries in 14 countries. [apt41_mandiant](https://www.mandiant.com/sites/default/files/2022-02/rt-apt41-dual-operation.pdf) Notable behaviors include using a wide range of malware and tools to complete mission objectives. APT41 overlaps at least partially with public reporting on groups including BARIUM and Winnti Group. [FireEye APT41 Aug 2019](https://www.mandiant.com/sites/default/files/2022-02/rt-apt41-dual-operation.pdf) [Group IB APT 41 June 2021](https://www.group-ib.com/blog/colunmtk-apt41/)\n"
