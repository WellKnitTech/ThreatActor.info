campaigns:
  - name: "Versa Director Zero Day Exploitation"
    campaign_id: "C0039"
    url: "https://attack.mitre.org/campaigns/C0039"
    stix_id: "campaign--af0ec65a-caa9-40ef-b1c7-21b71fbf3a10"
    description: "Versa Director Zero Day Exploitation was conducted by Volt Typhoon from early June through August 2024 as zero-day exploitation of Versa Director servers controlling software-defined wide area network (SD-WAN) applications. Since tracked as CVE-2024-39717, exploitation focused on credential capture from compromised Versa Director servers at managed service providers (MSPs) and internet service providers (ISPs) to enable follow-on access to service provider clients. Versa Director Zero Day Exploit"
  - name: "KV Botnet Activity"
    campaign_id: "C0035"
    url: "https://attack.mitre.org/campaigns/C0035"
    stix_id: "campaign--0c259854-4044-4f6c-ac49-118d484b3e3b"
    description: "KV Botnet Activity consisted of exploitation of primarily “end-of-life” small office-home office (SOHO) equipment from manufacturers such as Cisco, NETGEAR, and DrayTek. KV Botnet Activity was used by Volt Typhoon to obfuscate connectivity to victims in multiple critical infrastructure segments, including energy and telecommunication companies and entities based on the US territory of Guam. While the KV Botnet is the most prominent element of this campaign, it overlaps with another botnet cluster"
