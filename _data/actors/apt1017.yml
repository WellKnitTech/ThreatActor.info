  - name: "VersaMem"
    mitre_id: "S1154"
    url: "https://attack.mitre.org/software/S1154"
    type: "malware"
    stix_id: "malware--0a6ec267-83a9-41a5-98c7-57c3ff81e11f"
    description: "VersaMem is a web shell designed for deployment to Versa Director servers following exploitation. Discovered in August 2024, VersaMem was used during Versa Director Zero Day Exploitation by Volt Typhoon to target ISPs and MSPs.  VersaMem is deployed as a Java Archive (JAR) and allows for credential capture for Versa Director logon activity as well as follow-on execution of arbitrary Java payloads.(Citation: Lumen Versa 2024)"
  - name: "Tasklist"
    mitre_id: "S0057"
    url: "https://attack.mitre.org/software/S0057"
    type: "tool"
    stix_id: "tool--2e45723a-31da-4a7e-aaa6-e01998a6788f"
    description: "The Tasklist utility displays a list of applications and services with their Process IDs (PID) for all tasks running on either a local or a remote computer. It is packaged with Windows operating systems and can be executed from the command-line interface. (Citation: Microsoft Tasklist)"
  - name: "Mimikatz"
    mitre_id: "S0002"
