description: PayTool is a threat actor that operates a phishing ecosystem focused
  on traffic violation and fine payment scams targeting Canadians through SMS-based
  social engineering. Their campaigns impersonate Canadian government traffic enforcement
  services, utilizing a federal-style "Traffic Ticket Search Portal" model that aggregates
  provincial fine payment portals. PayTool maintains a pool of generic domains to
  ensure continuity when specific provincial domains are blacklisted, exploiting brand
  trust with disposable domains. Recommendations include implementing DNS and web
  gateway controls to block newly registered domains and known PayTool-related IP
  ranges.
