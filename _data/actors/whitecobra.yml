name: WhiteCobra
aliases:
- WhiteCobra
description: WhiteCobra is a threat actor that has infiltrated the Visual Studio Code
  marketplace and Open VSX registry, deploying 24 malicious extensions targeting cryptocurrency
  development tools, particularly Solidity. The group employs social engineering tactics,
  manipulates download counts and reviews, and uses fake branding to establish credibility
  for their extensions, which deliver LummaStealer on Windows and unknown malware
  on macOS. WhiteCobra has been linked to a $500,000 cryptocurrency theft in July
  2025 and maintains detailed playbooks with revenue targets, showcasing their organized
  and persistent operations. Despite ongoing efforts by security researchers to remove
  their malicious extensions, WhiteCobra continues to upload new threats weekly, highlighting
  the sophistication of their TTPs.
