description: Cyber Toufan is a threat actor group that has gained prominence for its
  cyberattacks targeting Israeli organizations. The group's tactics suggest potential
  nation-state backing, possibly from Iran. They have been involved in hack-and-leak
  operations, data breaches, and data destruction, impacting over 100 organizations.
  Cyber Toufan's activities align with geopolitical tensions in the Middle East and
  their attacks are characterized by a combination of technical breaches and psychological
  warfare.
