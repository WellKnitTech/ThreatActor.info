description: 'DragonOK is a threat group that has targeted Japanese organizations
  with phishing emails. Due to overlapping TTPs, including similar custom tools, DragonOK
  is thought to have a direct or indirect relationship with the threat group Moafee.
  (Citation: Operation Quantum Entanglement) It is known to use a variety of malware,
  including Sysget/HelloBridge, PlugX, PoisonIvy, FormerFirstRat, NFlog, and NewCT.
  (Citation: New DragonOK)'
