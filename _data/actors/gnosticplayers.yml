description: "The hacker said that he put up the data for sale mainly because these\
  \ companies had failed to protect passwords with strong encryption algorithms like\
  \ bcrypt.\nMost of the hashed passwords the hacker put up for sale today can cracked\
  \ with various levels of difficulty --but they can be cracked.\n\"I got upset because\
  \ I feel no one is learning,\" the hacker told ZDNet in an online chat earlier today.\
  \ \"I just felt upset at this particular moment, because seeing this lack of security\
  \ in 2019 is making me angry.\"\nIn a conversation with ZDNet last month, the hacker\
  \ told us he wanted to hack and put up for sale more than one billion records and\
  \ then retire and disappear with the money.\nBut in a conversation today, the hacker\
  \ says this is not his target anymore, as he learned that other hackers have already\
  \ achieved the same goal before him.\n Gnosticplayers also revealed that not all\
  \ the data he obtained from hacked companies had been put up for sale. Some companies\
  \ gave into extortion demands and paid fees so breaches would remain private.\n\"\
  I came to an agreement with some companies, but the concerned startups won't see\
  \ their data for sale,\" he said. \"I did it that's why I can't publish the rest\
  \ of my databases or even name them.\""
