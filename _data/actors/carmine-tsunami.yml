name: Carmine Tsunami
aliases:
- DEV-0196
- QuaDream
- Carmine Tsunami
description: Carmine Tsunami is a threat actor linked to an Israel-based private sector
  offensive actor called QuaDream. QuaDream sells a platform called REIGN to governments
  for law enforcement purposes, which includes exploits, malware, and infrastructure
  for data exfiltration from mobile devices. Carmine Tsunami is associated with the
  iOS malware called KingsPawn and has targeted civil society victims, including journalists,
  political opposition figures, and NGO workers, in various regions. They utilize
  domain registrars and inexpensive cloud hosting providers, often using single domains
  per IP address and deploying free Let's Encrypt SSL certificates.
