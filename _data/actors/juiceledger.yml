name: JuiceLedger
aliases:
- JuiceLedger
description: JuiceLedger is a threat actor known for infostealing through their JuiceStealer
  .NET assembly. They have evolved from spreading fraudulent applications to conducting
  supply chain attacks, targeting PyPI contributors with phishing campaigns and typosquatting.
  Their malicious packages contain a code snippet that downloads and executes JuiceStealer,
  which has evolved to support additional browsers and Discord. Victims of JuiceLedger
  attacks are advised to reset passwords and report any suspicious activity to security@pypi.org.
