description: TAG-150, also known as GrayBravo, is a sophisticated threat actor responsible
  for developing multiple custom malware families, including CastleLoader and CastleRAT,
  and operates a large-scale, multi-layered infrastructure. The group employs the
  ClickFix technique to distribute malware through phishing attacks that impersonate
  legitimate services, leveraging deceptive domains and fake repositories. Insikt
  Group has identified four distinct activity clusters associated with TAG-150, each
  targeting different victim profiles and utilizing unique TTPs.
