description: The PassCV group continues to be one of the most successful and active
  threat groups that leverage a wide array of stolen Authenticode-signing certificates.  Snorre
  Fagerland of Blue Coat Systems first coined the term PassCV in a blog post. His
  post provides a good introduction to the group and covers some of the older infrastructure,
  stolen code-signing certificate reuse, and other connections associated with the
  PassCV malware. There are several clues alluding to the possibility that multiple
  groups may be utilizing the same stolen signing certificates, but at this time SPEAR
  believes the current attacks are more likely being perpetrated by a single group
  employing multiple publicly available Remote Administration Tools (RATs).  The PassCV
  group has been operating with continued success and has already started to expand
  their malware repertoire into different off-the-shelf RATs and custom code. SPEAR
  identified eighteen previously undisclosed stolen Authenticode certificates. These
  certificates were originally issued to companies and individuals scattered across
  China, Taiwan, Korea, Europe, the United States and Russia.  In this post we expand
  the usage of the term ‘PassCV’ to encompass the malware mentioned in the Blue Coat
  Systems report, as well as the APT group behind the larger C2 infrastructure and
  stolen Authenticode certificates. We’d like to share some of our findings as they
  pertain to the stolen certificates, command and control infrastructure, and some
  of the newer custom RATs they’ve begun development on.
