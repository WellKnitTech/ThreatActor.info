name: "ToddyCat"
aliases: ["Toddy Cat","ToddyCat","Websiic","Storm-0247"]
description: "ToddyCat is a sophisticated threat group that has been active since at least 2020 using custom loaders and malware in multi-stage infection chains against government and military targets across Europe and Asia. [Kaspersky ToddyCat June 2022](https://securelist.com/toddycat/106799/) [Kaspersky ToddyCat Check Logs October 2023](https://securelist.com/toddycat-keep-calm-and-check-logs/110696/)"
url: "/apt1022"
country: "China"
sector_focus: ["Military","Government"]
targeted_victims: ["Afghanistan","India","Indonesia","Iran","Kyrgyzstan","Malaysia","Pakistan","Russia","Slovakia","Taiwan","Thailand","United Kingdom","Uzbekistan","Vietnam"]
