software:
  - name: "Cobalt Strike"
    mitre_id: "S0154"
    url: "https://attack.mitre.org/software/S0154"
    type: "malware"
    stix_id: "malware--a7881f21-e978-4fe4-af56-92c9416a2616"
    description: "Cobalt Strike is a commercial, full-featured, remote access tool that bills itself as “adversary simulation software designed to execute targeted attacks and emulate the post-exploitation actions of advanced threat actors”. Cobalt Strike’s interactive post-exploit capabilities cover the full range of ATT&CK tactics, all executed within a single, integrated system.(Citation: cobaltstrike manual)\n\nIn addition to its own capabilities, Cobalt Strike leverages the capabilities of other well-known tool"
  - name: "LoFiSe"
    mitre_id: "S1101"
    url: "https://attack.mitre.org/software/S1101"
    type: "malware"
    stix_id: "malware--452da2d9-706c-4185-ad6f-f5edaf4b9f48"
    description: "LoFiSe has been used by ToddyCat since at least 2023 to identify and collect files of interest on targeted systems.(Citation: Kaspersky ToddyCat Check Logs October 2023)"
  - name: "China Chopper"
    mitre_id: "S0020"
    url: "https://attack.mitre.org/software/S0020"
    type: "malware"
    stix_id: "malware--5a3a31fe-5a8f-48e1-bff0-a753e5b1be70"
    description: "China Chopper is a Web Shell hosted on Web servers to provide access back into an enterprise network that does not rely on an infected system calling back to a remote command and control server.(Citation: Lee 2013) It has been used by several threat groups.(Citation: Dell TG-3390)(Citation: FireEye Periscope March 2018)(Citation: CISA AA21-200A APT40 July 2021)(Citation: Rapid7 HAFNIUM Mar 2021)"
  - name: "netstat"
    mitre_id: "S0104"
    url: "https://attack.mitre.org/software/S0104"
    type: "tool"
    stix_id: "tool--4664b683-f578-434f-919b-1c1aad2a1111"
    description: "netstat is an operating system utility that displays active TCP connections, listening ports, and network statistics. (Citation: TechNet Netstat)"
  - name: "Ping"
    mitre_id: "S0097"
    url: "https://attack.mitre.org/software/S0097"
    type: "tool"
    stix_id: "tool--b77b563c-34bb-4fb8-86a3-3694338f7b47"
    description: "Ping is an operating system utility commonly used to troubleshoot and verify network connections. (Citation: TechNet Ping)"
  - name: "Pcexter"
    mitre_id: "S1102"
    url: "https://attack.mitre.org/software/S1102"
    type: "malware"
    stix_id: "malware--e4feffc2-53d1-45c9-904e-adb9faca0d15"
    description: "Pcexter is an uploader that has been used by ToddyCat since at least 2023 to exfiltrate stolen files.(Citation: Kaspersky ToddyCat Check Logs October 2023)"
  - name: "Net"
    mitre_id: "S0039"
    url: "https://attack.mitre.org/software/S0039"
    type: "tool"
    stix_id: "tool--03342581-f790-4f03-ba41-e82e67392e23"
    description: "The Net utility is a component of the Windows operating system. It is used in command-line operations for control of users, groups, services, and network connections. (Citation: Microsoft Net Utility)\n\nNet has a great deal of functionality, (Citation: Savill 1999) much of which is useful for an adversary, such as gathering system and network information for Discovery, moving laterally through SMB/Windows Admin Shares using <code>net use</code> commands, and interacting with services. The net1.exe"
  - name: "Samurai"
    mitre_id: "S1099"
    url: "https://attack.mitre.org/software/S1099"
    type: "malware"
    stix_id: "malware--ae91fb8f-5031-4f57-9839-e3be3ed503f0"
    description: "Samurai is a passive backdoor that has been used by ToddyCat since at least 2020. Samurai allows arbitrary C# code execution and is used with multiple modules for remote administration and lateral movement.(Citation: Kaspersky ToddyCat June 2022)"
  - name: "Ninja"
    mitre_id: "S1100"
    url: "https://attack.mitre.org/software/S1100"
    type: "malware"
    stix_id: "malware--023254de-caaf-4a05-b2c7-e4e2f283f7a5"
    description: "Ninja is a malware developed in C++ that has been used by ToddyCat to penetrate networks and control remote systems since at least 2020.  Ninja is possibly part of a post exploitation toolkit exclusively used by ToddyCat and allows multiple operators to work simultaneously on the same machine. Ninja has been used against government and military entities in Europe and Asia and observed in specific infection chains being deployed by Samurai.(Citation: Kaspersky ToddyCat June 2022)"
