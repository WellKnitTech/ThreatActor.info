description: DEV-1101 is a threat actor tracked by Microsoft who is responsible for
  developing and advertising phishing kits, specifically AiTM phishing kits. These
  kits are capable of bypassing multifactor authentication and are available for purchase
  or rent by other cybercriminals. DEV-1101 offers an open-source kit with various
  enhancements, such as mobile device management and CAPTCHA evasion. Their tool has
  been used in high-volume phishing campaigns by multiple actors, including DEV-0928,
  and is sold for $300 with VIP licenses available for $1,000.
