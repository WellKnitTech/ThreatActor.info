description: DarkPink is an APT group that has been active since mid-2021, primarily
  targeting government, military, and non-profit organizations in Southeast Asia and
  Europe. The group employs spear phishing techniques, utilizing ISO images and malicious
  PDF files to deliver custom Trojan programs like TelePowerBot and KamiKakaBot for
  information theft. They have exploited vulnerabilities such as CVE-2023-38831 to
  enhance their attack processes and maintain persistence through DLL side-loading
  and scheduled tasks. DarkPink's operations are characterized by stealth and precision,
  making them a significant threat in the cyber landscape.
