description: Karkadann is a threat actor that has been active since at least October
  2020, targeting government bodies and news outlets in the Middle East. They have
  been involved in watering hole attacks, compromising high-profile websites to inject
  malicious JavaScript code. The group has been linked to another commercial spyware
  company called Candiru, suggesting they may utilize multiple spyware technologies.
  There are similarities in the infrastructure and tactics used by Karkadann in their
  campaigns.
