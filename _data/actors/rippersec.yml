description: RipperSec is a pro-Palestinian, likely Malaysian hacktivist group created
  in June 2023, known for conducting DDoS attacks, data breaches, and defacements
  primarily targeting government and educational websites, as well as organizations
  perceived to support Israel. The group has claimed 196 DDoS attacks, with a significant
  portion directed at Israel, and utilizes a tool called MegaMedusa for their operations.
  RipperSec operates on Telegram, where it has amassed over 2,000 members, and collaborates
  with various like-minded hacktivist groups. Their attack strategy relies heavily
  on community involvement rather than sophisticated infrastructure.
