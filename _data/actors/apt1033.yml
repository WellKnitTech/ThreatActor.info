description: 'Star Blizzard is a cyber espionage and influence group originating in
  Russia that has been active since at least 2019. Star Blizzard campaigns align closely
  with Russian state interests and have included persistent phishing and credential
  theft against academic, defense, government, NGO, and think tank organizations in
  NATO countries, particularly the US and the UK.(Citation: Microsoft Star Blizzard
  August 2022)(Citation: CISA Star Blizzard Advisory December 2023)(Citation: StarBlizzard)(Citation:
  Google TAG COLDRIVER January 2024)

