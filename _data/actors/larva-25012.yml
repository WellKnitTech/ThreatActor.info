description: Larva‑25012 is a threat actor known for deploying Proxyware, utilizing
  malware disguised as a Notepad++ installer. The actor injects Proxyware into the
  Windows Explorer process and employs Python-based loaders to evade detection. They
  distribute Proxyware installers primarily through advertisements on websites offering
  free YouTube video downloads and fake sites for cracked software. Larva‑25012 has
  been active since at least 2024, distributing multiple types of Proxyware, including
  DigitalPulse, Honeygain, and Infatica.
