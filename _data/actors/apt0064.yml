name: "APT33"
aliases: ["APT 33","APT33","ATK35","COBALT TRINITY","Elfin","G0064","HOLMIUM","MAGNALLIUM","Peach Sandstorm","Refined Kitten","TA451"]
description: "APT33 is a suspected Iranian threat group that has carried out operations since at least 2013. The group has targeted organizations across multiple industries in the United States, Saudi Arabia, and South Korea, with a particular interest in the aviation and energy sectors. [FireEye APT33 Sept 2017](https://www.fireeye.com/blog/threat-research/2017/09/apt33-insights-into-iranian-cyber-espionage.html) [FireEye APT33 Webinar Sept 2017](https://www.brighttalk.com/webcast/10703/275683)"
