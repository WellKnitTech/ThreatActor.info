software:
  - name: "PowerSploit"
    mitre_id: "S0194"
    url: "https://attack.mitre.org/software/S0194"
    type: "tool"
    stix_id: "tool--13cd9151-83b7-410d-9f98-25d0f0d1d80d"
    description: "PowerSploit is an open source, offensive security framework comprised of PowerShell modules and scripts that perform a wide range of tasks related to penetration testing such as code execution, persistence, bypassing anti-virus, recon, and exfiltration. (Citation: GitHub PowerSploit May 2012) (Citation: PowerShellMagazine PowerSploit July 2014) (Citation: PowerSploit Documentation)"
  - name: "AutoIt backdoor"
    mitre_id: "S0129"
    url: "https://attack.mitre.org/software/S0129"
    type: "malware"
    stix_id: "malware--f5352566-1a64-49ac-8f7f-97e1d1a03300"
    description: "AutoIt backdoor is malware that has been used by the actors responsible for the MONSOON campaign. The actors frequently used it in weaponized .pps files exploiting CVE-2014-6352. (Citation: Forcepoint Monsoon) This malware makes use of the legitimate scripting language for Windows GUI automation with the same name."
  - name: "PoshC2"
    mitre_id: "S0378"
    url: "https://attack.mitre.org/software/S0378"
    type: "tool"
    stix_id: "tool--4b57c098-f043-4da2-83ef-7588a6d426bc"
    description: "PoshC2 is an open source remote administration and post-exploitation framework that is publicly available on GitHub. The server-side components of the tool are primarily written in Python, while the implants are written in PowerShell. Although PoshC2 is primarily focused on Windows implantation, it does contain a basic Python dropper for Linux/macOS.(Citation: GitHub PoshC2)"
  - name: "Ruler"
    mitre_id: "S0358"
    url: "https://attack.mitre.org/software/S0358"
    type: "tool"
    stix_id: "tool--90ac9266-68ce-46f2-b24f-5eb3b2a8ea38"
    description: "Ruler is a tool to abuse Microsoft Exchange services. It is publicly available on GitHub and the tool is executed via the command line. The creators of Ruler have also released a defensive tool, NotRuler, to detect its usage.(Citation: SensePost Ruler GitHub)(Citation: SensePost NotRuler)"
  - name: "Mimikatz"
    mitre_id: "S0002"
    url: "https://attack.mitre.org/software/S0002"
    type: "tool"
    stix_id: "tool--afc079f3-c0ea-4096-b75d-3f05338b7f60"
    description: "Mimikatz is a credential dumper capable of obtaining plaintext Windows account logins and passwords, along with many other features that make it useful for testing the security of networks. (Citation: Deply Mimikatz) (Citation: Adsecurity Mimikatz Guide)"
  - name: "NanoCore"
    mitre_id: "S0336"
    url: "https://attack.mitre.org/software/S0336"
    type: "malware"
    stix_id: "malware--b4d80f8b-d2b9-4448-8844-4bef777ed676"
    description: "NanoCore is a modular remote access tool developed in .NET that can be used to spy on victims and steal information. It has been used by threat actors since 2013.(Citation: DigiTrust NanoCore Jan 2017)(Citation: Cofense NanoCore Mar 2018)(Citation: PaloAlto NanoCore Feb 2016)(Citation: Unit 42 Gorgon Group Aug 2018)"
  - name: "DEADWOOD"
    mitre_id: "S1134"
    url: "https://attack.mitre.org/software/S1134"
    type: "malware"
    stix_id: "malware--f2e6af17-3828-4f10-88e7-343591618ddb"
    description: "DEADWOOD is wiper malware written in C++ using Boost libraries. DEADWOOD was first observed in an unattributed wiping event in Saudi Arabia in 2019, and has since been incorporated into Agrius operations.(Citation: SentinelOne Agrius 2021)"
  - name: "StoneDrill"
    mitre_id: "S0380"
    url: "https://attack.mitre.org/software/S0380"
    type: "malware"
    stix_id: "malware--8dbadf80-468c-4a62-b817-4e4d8b606887"
    description: "StoneDrill is wiper malware discovered in destructive campaigns against both Middle Eastern and European targets in association with APT33.(Citation: FireEye APT33 Sept 2017)(Citation: Kaspersky StoneDrill 2017)"
  - name: "POWERTON"
    mitre_id: "S0371"
    url: "https://attack.mitre.org/software/S0371"
    type: "malware"
    stix_id: "malware--e85cae1a-bce3-4ac4-b36b-b00acac0567b"
    description: "POWERTON is a custom PowerShell backdoor first observed in 2018. It has typically been deployed as a late-stage backdoor by APT33. At least two variants of the backdoor have been identified, with the later version containing improved functionality.(Citation: FireEye APT33 Guardrail)"
  - name: "LaZagne"
    mitre_id: "S0349"
    url: "https://attack.mitre.org/software/S0349"
    type: "tool"
    stix_id: "tool--b76b2d94-60e4-4107-a903-4a3a7622fb3b"
    description: "LaZagne is a post-exploitation, open-source tool used to recover stored passwords on a system. It has modules for Windows, Linux, and OSX, but is mainly focused on Windows systems. LaZagne is publicly available on GitHub.(Citation: GitHub LaZagne Dec 2018)"
  - name: "TURNEDUP"
    mitre_id: "S0199"
    url: "https://attack.mitre.org/software/S0199"
    type: "malware"
    stix_id: "malware--db1355a7-e5c9-4e2c-8da7-eccf2ae9bf5c"
    description: "TURNEDUP is a non-public backdoor. It has been dropped by APT33's StoneDrill malware. (Citation: FireEye APT33 Sept 2017) (Citation: FireEye APT33 Webinar Sept 2017)"
  - name: "NETWIRE"
    mitre_id: "S0198"
    url: "https://attack.mitre.org/software/S0198"
    type: "malware"
    stix_id: "malware--2a70812b-f1ef-44db-8578-a496a227aef2"
    description: "NETWIRE is a publicly available, multiplatform remote administration tool (RAT) that has been used by criminal and APT groups since at least 2012.(Citation: FireEye APT33 Sept 2017)(Citation: McAfee Netwire Mar 2015)(Citation: FireEye APT33 Webinar Sept 2017)"
  - name: "Net"
    mitre_id: "S0039"
    url: "https://attack.mitre.org/software/S0039"
    type: "tool"
    stix_id: "tool--03342581-f790-4f03-ba41-e82e67392e23"
    description: "The Net utility is a component of the Windows operating system. It is used in command-line operations for control of users, groups, services, and network connections. (Citation: Microsoft Net Utility)\n\nNet has a great deal of functionality, (Citation: Savill 1999) much of which is useful for an adversary, such as gathering system and network information for Discovery, moving laterally through SMB/Windows Admin Shares using <code>net use</code> commands, and interacting with services. The net1.exe"
  - name: "Pupy"
    mitre_id: "S0192"
    url: "https://attack.mitre.org/software/S0192"
    type: "tool"
    stix_id: "tool--cb69b20d-56d0-41ab-8440-4a4b251614d4"
    description: "Pupy is an open source, cross-platform (Windows, Linux, OSX, Android) remote administration and post-exploitation tool. (Citation: GitHub Pupy) It is written in Python and can be generated as a payload in several different ways (Windows exe, Python file, PowerShell oneliner/file, Linux elf, APK, Rubber Ducky, etc.). (Citation: GitHub Pupy) Pupy is publicly available on GitHub. (Citation: GitHub Pupy)"
  - name: "Empire"
    mitre_id: "S0363"
    url: "https://attack.mitre.org/software/S0363"
    type: "tool"
    stix_id: "tool--3433a9e8-1c47-4320-b9bf-ed449061d1c3"
    description: "Empire is an open-source, cross-platform remote administration and post-exploitation framework that is publicly available on GitHub. While the tool itself is primarily written in Python, the post-exploitation agents are written in pure PowerShell for Windows and Python for Linux/macOS. Empire was one of five tools singled out by a joint report on public hacking tools being widely used by adversaries.(Citation: NCSC Joint Report Public Tools)(Citation: Github PowerShell Empire)(Citation: GitHub AT"
  - name: "ftp"
    mitre_id: "S0095"
    url: "https://attack.mitre.org/software/S0095"
    type: "tool"
    stix_id: "tool--cf23bf4a-e003-4116-bbae-1ea6c558d565"
    description: "ftp is a utility commonly available with operating systems to transfer information over the File Transfer Protocol (FTP). Adversaries can use it to transfer other tools onto a system or to exfiltrate data.(Citation: Microsoft FTP)(Citation: Linux FTP)"
