name: Water Barghest
aliases:
- Water Barghest
description: Water Barghest is a cybercriminal group that has compromised over 20,000
  IoT devices by October 2024, monetizing them through a residential proxy marketplace.
  They automate the entire process from identifying vulnerable devices using n-day
  and zero-day exploits to deploying Ngioweb malware and selling the compromised assets.
  Their operations include leveraging Ubiquiti EdgeRouter devices for espionage and
  utilizing automated scripts to exploit vulnerabilities within minutes of discovery.
  Water Barghest has maintained a low profile for years, but their activities gained
  attention due to the deployment of a zero-day vulnerability against Cisco IOS XE
  devices in October 2023.
