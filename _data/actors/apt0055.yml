description: 'NEODYMIUM is an activity group that conducted a campaign in May 2016
  and has heavily targeted Turkish victims. The group has demonstrated similarity
  to another activity group called PROMETHIUM due to overlapping victim and campaign
  characteristics. (Citation: Microsoft NEODYMIUM Dec 2016) (Citation: Microsoft SIR
  Vol 21) NEODYMIUM is reportedly associated closely with BlackOasis operations, but
  evidence that the group names are aliases has not been identified. (Citation: CyberScoop
  BlackOasis Oct 2017)'
