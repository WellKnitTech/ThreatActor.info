software:
  - name: "Wevtutil"
    mitre_id: "S0645"
    url: "https://attack.mitre.org/software/S0645"
    type: "tool"
    stix_id: "tool--f91162cc-1686-4ff8-8115-bf3f61a4cc7a"
    description: "Wevtutil is a Windows command-line utility that enables administrators to retrieve information about event logs and publishers.(Citation: Wevtutil Microsoft Documentation)"
  - name: "certutil"
    mitre_id: "S0160"
    url: "https://attack.mitre.org/software/S0160"
    type: "tool"
    stix_id: "tool--0a68f1f1-da74-4d28-8d9a-696c082706cc"
    description: "certutil is a command-line utility that can be used to obtain certificate authority information and configure Certificate Services. (Citation: TechNet Certutil)"
  - name: "CHOPSTICK"
    mitre_id: "S0023"
    url: "https://attack.mitre.org/software/S0023"
    type: "malware"
    stix_id: "malware--ccd61dfc-b03f-4689-8c18-7c97eab08472"
    description: "CHOPSTICK is a malware family of modular backdoors used by APT28. It has been used since at least 2012 and is usually dropped on victims as second-stage malware, though it has been used as first-stage malware in several cases. It has both Windows and Linux variants. (Citation: FireEye APT28) (Citation: ESET Sednit Part 2) (Citation: FireEye APT28 January 2017) (Citation: DOJ GRU Indictment Jul 2018) It is tracked separately from the X-Agent for Android."
  - name: "Net"
    mitre_id: "S0039"
    url: "https://attack.mitre.org/software/S0039"
    type: "tool"
    stix_id: "tool--03342581-f790-4f03-ba41-e82e67392e23"
    description: "The Net utility is a component of the Windows operating system. It is used in command-line operations for control of users, groups, services, and network connections. (Citation: Microsoft Net Utility)\n\nNet has a great deal of functionality, (Citation: Savill 1999) much of which is useful for an adversary, such as gathering system and network information for Discovery, moving laterally through SMB/Windows Admin Shares using <code>net use</code> commands, and interacting with services. The net1.exe"
  - name: "Forfiles"
    mitre_id: "S0193"
    url: "https://attack.mitre.org/software/S0193"
    type: "tool"
    stix_id: "tool--90ec2b22-7061-4469-b539-0989ec4f96c2"
    description: "Forfiles is a Windows utility commonly used in batch jobs to execute commands on one or more selected files or directories (ex: list all directories in a drive, read the first line of all files created yesterday, etc.). Forfiles can be executed from either the command line, Run window, or batch files/scripts. (Citation: Microsoft Forfiles Aug 2016)"
  - name: "DealersChoice"
    mitre_id: "S0243"
    url: "https://attack.mitre.org/software/S0243"
    type: "malware"
    stix_id: "malware--8f460983-1bbb-4e7e-8094-f0b5e720f658"
    description: "DealersChoice is a Flash exploitation framework used by APT28. (Citation: Sofacy DealersChoice)"
  - name: "Mimikatz"
    mitre_id: "S0002"
    url: "https://attack.mitre.org/software/S0002"
    type: "tool"
    stix_id: "tool--afc079f3-c0ea-4096-b75d-3f05338b7f60"
    description: "Mimikatz is a credential dumper capable of obtaining plaintext Windows account logins and passwords, along with many other features that make it useful for testing the security of networks. (Citation: Deply Mimikatz) (Citation: Adsecurity Mimikatz Guide)"
  - name: "ADVSTORESHELL"
    mitre_id: "S0045"
    url: "https://attack.mitre.org/software/S0045"
    type: "malware"
    stix_id: "malware--fb575479-14ef-41e9-bfab-0b7cf10bec73"
    description: "ADVSTORESHELL is a spying backdoor that has been used by APT28 from at least 2012 to 2016. It is generally used for long-term espionage and is deployed on targets deemed interesting after a reconnaissance phase. (Citation: Kaspersky Sofacy) (Citation: ESET Sednit Part 2)"
  - name: "Cannon"
    mitre_id: "S0351"
    url: "https://attack.mitre.org/software/S0351"
    type: "malware"
    stix_id: "malware--d20b397a-ea47-48a9-b503-2e2a3551e11d"
    description: "Cannon is a Trojan with variants written in C# and Delphi. It was first observed in April 2018. (Citation: Unit42 Cannon Nov 2018)(Citation: Unit42 Sofacy Dec 2018)"
  - name: "Komplex"
    mitre_id: "S0162"
    url: "https://attack.mitre.org/software/S0162"
    type: "malware"
    stix_id: "malware--f108215f-3487-489d-be8b-80e346d32518"
    description: "Komplex is a backdoor that has been used by APT28 on OS X and appears to be developed in a similar manner to XAgentOSX (Citation: XAgentOSX 2017) (Citation: Sofacy Komplex Trojan)."
  - name: "HIDEDRV"
    mitre_id: "S0135"
    url: "https://attack.mitre.org/software/S0135"
    type: "malware"
    stix_id: "malware--e669bb87-f773-4c7b-bfcc-a9ffebfdd8d4"
    description: "HIDEDRV is a rootkit used by APT28. It has been deployed along with Downdelph to execute and hide that malware. (Citation: ESET Sednit Part 3) (Citation: Sekoia HideDRV Oct 2016)"
  - name: "JHUHUGIT"
    mitre_id: "S0044"
    url: "https://attack.mitre.org/software/S0044"
    type: "malware"
    stix_id: "malware--8ae43c46-57ef-47d5-a77a-eebb35628db2"
    description: "JHUHUGIT is malware used by APT28. It is based on Carberp source code and serves as reconnaissance malware. (Citation: Kaspersky Sofacy) (Citation: F-Secure Sofacy 2015) (Citation: ESET Sednit Part 1) (Citation: FireEye APT28 January 2017)"
  - name: "Koadic"
    mitre_id: "S0250"
    url: "https://attack.mitre.org/software/S0250"
    type: "tool"
    stix_id: "tool--c8655260-9f4b-44e3-85e1-6538a5f6e4f4"
    description: "Koadic is a Windows post-exploitation framework and penetration testing tool that is publicly available on GitHub. Koadic has several options for staging payloads and creating implants, and performs most of its operations using Windows Script Host.(Citation: Github Koadic)(Citation: Palo Alto Sofacy 06-2018)(Citation: MalwareBytes LazyScripter Feb 2021)"
  - name: "Winexe"
    mitre_id: "S0191"
    url: "https://attack.mitre.org/software/S0191"
    type: "tool"
    stix_id: "tool--96fd6cc4-a693-4118-83ec-619e5352d07d"
    description: "Winexe is a lightweight, open source tool similar to PsExec designed to allow system administrators to execute commands on remote servers. (Citation: Winexe Github Sept 2013) Winexe is unique in that it is a GNU/Linux based client. (Citation: Überwachung APT28 Forfiles June 2015)"
  - name: "Responder"
    mitre_id: "S0174"
    url: "https://attack.mitre.org/software/S0174"
    type: "tool"
    stix_id: "tool--a1dd2dbd-1550-44bf-abcc-1a4c52e97719"
    description: "Responder is an open source tool used for LLMNR, NBT-NS and MDNS poisoning, with built-in HTTP/SMB/MSSQL/FTP/LDAP rogue authentication server supporting NTLMv1/NTLMv2/LMv2, Extended Security NTLMSSP and Basic HTTP authentication. (Citation: GitHub Responder)"
  - name: "cipher.exe"
    mitre_id: "S1205"
    url: "https://attack.mitre.org/software/S1205"
    type: "tool"
    stix_id: "tool--da66959d-9875-4fde-bfed-11111a55895e"
    description: "cipher.exe is a native Microsoft utility that manages encryption of directories and files on NTFS (New Technology File System) partitions by using the Encrypting File System (EFS).(Citation: cipher.exe)"
  - name: "XTunnel"
    mitre_id: "S0117"
    url: "https://attack.mitre.org/software/S0117"
    type: "malware"
    stix_id: "malware--7343e208-7cab-45f2-a47b-41ba5e2f0fab"
    description: "XTunnel a VPN-like network proxy tool that can relay traffic between a C2 server and a victim. It was first seen in May 2013 and reportedly used by APT28 during the compromise of the Democratic National Committee. (Citation: Crowdstrike DNC June 2016) (Citation: Invincea XTunnel) (Citation: ESET Sednit Part 2)"
  - name: "Drovorub"
    mitre_id: "S0502"
    url: "https://attack.mitre.org/software/S0502"
    type: "malware"
    stix_id: "malware--99164b38-1775-40bc-b77b-a2373b14540a"
    description: "Drovorub is a Linux malware toolset comprised of an agent, client, server, and kernel modules, that has been used by APT28.(Citation: NSA/FBI Drovorub August 2020)"
  - name: "LAMEHUG"
    mitre_id: "S9035"
    url: "https://attack.mitre.org/software/S9035"
    type: "malware"
    stix_id: "malware--c55e0410-842d-4365-a2c8-26c0330f85b8"
    description: "LAMEHUG is Python-based information stealer first identified in July 2025 by Ukraine's Computer Emergency Response Team (CERT-UA) in phishing emails targeting Ukrainian government officials. LAMEHUG is the first known malware to integrate artificial intelligence (AI) directly into its attack workflow by querying large language models (LLMs) hosted on Hugging Face to dynamically generate reconnaissance, data theft, and system manipulation commands in real time.  LAMEHUG has been attributed to APT2"
  - name: "Tor"
    mitre_id: "S0183"
    url: "https://attack.mitre.org/software/S0183"
    type: "tool"
    stix_id: "tool--ed7d0cb1-87a6-43b4-9f46-ef1bc56d6c68"
    description: "Tor is a software suite and network that provides increased anonymity on the Internet. It creates a multi-hop proxy network and utilizes multilayer encryption to protect both the message and routing information. Tor utilizes \"Onion Routing,\" in which messages are encrypted with multiple layers of encryption; at each step in the proxy network, the topmost layer is decrypted and the contents forwarded on to the next node until it reaches its destination. (Citation: Dingledine Tor The Second-Generat"
  - name: "CORESHELL"
    mitre_id: "S0137"
    url: "https://attack.mitre.org/software/S0137"
    type: "malware"
    stix_id: "malware--60c18d06-7b91-4742-bae3-647845cd9d81"
    description: "CORESHELL is a downloader used by APT28. The older versions of this malware are known as SOURFACE and newer versions as CORESHELL.(Citation: FireEye APT28) (Citation: FireEye APT28 January 2017)"
  - name: "OLDBAIT"
    mitre_id: "S0138"
    url: "https://attack.mitre.org/software/S0138"
    type: "malware"
    stix_id: "malware--2dd34b01-6110-4aac-835d-b5e7b936b0be"
    description: "OLDBAIT is a credential harvester used by APT28. (Citation: FireEye APT28) (Citation: FireEye APT28 January 2017)"
  - name: "Downdelph"
    mitre_id: "S0134"
    url: "https://attack.mitre.org/software/S0134"
    type: "malware"
    stix_id: "malware--08d20cd2-f084-45ee-8558-fa6ef5a18519"
    description: "Downdelph is a first-stage downloader written in Delphi that has been used by APT28 in rare instances between 2013 and 2015. (Citation: ESET Sednit Part 3)"
  - name: "XAgentOSX"
    mitre_id: "S0161"
    url: "https://attack.mitre.org/software/S0161"
    type: "malware"
    stix_id: "malware--59a97b15-8189-4d51-9404-e1ce8ea4a069"
    description: "XAgentOSX is a trojan that has been used by APT28  on OS X and appears to be a port of their standard CHOPSTICK or XAgent trojan. (Citation: XAgentOSX 2017)"
  - name: "USBStealer"
    mitre_id: "S0136"
    url: "https://attack.mitre.org/software/S0136"
    type: "malware"
    stix_id: "malware--af2ad3b7-ab6a-4807-91fd-51bcaff9acbb"
    description: "USBStealer is malware that has been used by APT28 since at least 2005 to extract information from air-gapped networks. It does not have the capability to communicate over the Internet and has been used in conjunction with ADVSTORESHELL. (Citation: ESET Sednit USBStealer 2014) (Citation: Kaspersky Sofacy)"
  - name: "Zebrocy"
    mitre_id: "S0251"
    url: "https://attack.mitre.org/software/S0251"
    type: "malware"
    stix_id: "malware--a4f57468-fbd5-49e4-8476-52088220b92d"
    description: "Zebrocy is a Trojan that has been used by APT28 since at least November 2015. The malware comes in several programming language variants, including C++, Delphi, AutoIt, C#, VB.NET, and Golang. (Citation: Palo Alto Sofacy 06-2018)(Citation: Unit42 Cannon Nov 2018)(Citation: Unit42 Sofacy Dec 2018)(Citation: CISA Zebrocy Oct 2020) "
  - name: "reGeorg"
    mitre_id: "S1187"
    url: "https://attack.mitre.org/software/S1187"
    type: "malware"
    stix_id: "malware--0e17b066-50dd-4c2f-83bf-205c5eb2bb34"
    description: "reGeorg is an open-source web shell written in Python that can be used as a proxy to bypass firewall rules and tunnel data in and out of targeted networks.(Citation: Fortinet reGeorg MAR 2019)(Citation: GitHub reGeorg 2016)"
  - name: "Fysbis"
    mitre_id: "S0410"
    url: "https://attack.mitre.org/software/S0410"
    type: "malware"
    stix_id: "malware--50d6688b-0985-4f3d-8cbe-0c796b30703b"
    description: "Fysbis is a Linux-based backdoor used by APT28 that dates back to at least 2014.(Citation: Fysbis Palo Alto Analysis)"
  - name: "LoJax"
    mitre_id: "S0397"
    url: "https://attack.mitre.org/software/S0397"
    type: "malware"
    stix_id: "malware--b865dded-0553-4962-a44b-6fe7863effed"
    description: "LoJax is a UEFI rootkit used by APT28 to persist remote access software on targeted systems.(Citation: ESET LoJax Sept 2018)"
  - name: "X-Agent for Android"
    mitre_id: "S0314"
    url: "https://attack.mitre.org/software/S0314"
    type: "malware"
    stix_id: "malware--56660521-6db4-4e5a-a927-464f22954b7c"
    description: "X-Agent for Android is Android malware that was placed in a repackaged version of a Ukrainian artillery targeting application. The malware reportedly retrieved general location data on where the victim device was used, and therefore could likely indicate the potential location of Ukrainian artillery. (Citation: CrowdStrike-Android) Is it tracked separately from the CHOPSTICK."
