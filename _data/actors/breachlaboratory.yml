description: BreachLaboratory is a cybercrime actor that specializes in the extraction
  and sale of sensitive financial and identity datasets from various organizations.
  They have claimed to exfiltrate approximately 950,000 records from Grupo Catalana
  Occidente and over 18,000 records from Bank Mandiri, with data including customer
  names, account details, and SWIFT codes. The actor operates on underground forums,
  selling structured datasets such as CSV files and SQL dumps, and emphasizes the
  validity and financial utility of the data. Their activities indicate a focus on
  monetization through direct database sales and potential downstream fraud enablement.
