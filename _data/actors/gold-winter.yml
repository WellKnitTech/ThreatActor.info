description: GOLD WINTER are a financially motivated group, likely based in Russia,
  who operate the Hades ransomware. Hades activity was first identified in December
  2020 and its lack of presence on underground forums and marketplaces leads CTU researchers
  to conclude that it is not operated under a ransomware as a service affiliate model.
  GOLD WINTER do employ name-and-shame tactics, where data is stolen and used as additional
  leverage over victims, but rather than a single centralized leak site CTU researchers
  have observed the group using Tor sites customized for each victim that include
  a Tox chat ID for communication, which also appears to be unique for each victim.
