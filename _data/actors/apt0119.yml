description: 'Indrik Spider is a Russia-based cybercriminal group that has been active
  since at least 2014. Indrik Spider initially started with the Dridex banking Trojan,
  and then by 2017 they began running ransomware operations using BitPaymer, WastedLocker,
  and Hades ransomware. Following U.S. sanctions and an indictment in 2019, Indrik
  Spider changed their tactics and diversified their toolset.(Citation: Crowdstrike
  Indrik November 2018)(Citation: Crowdstrike EvilCorp March 2021)(Citation: Treasury
  EvilCorp Dec 2019)'
