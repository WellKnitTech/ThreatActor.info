description: Storm-0494 is a threat actor that facilitates Gootloader infections,
  which are then exploited by groups like Vice Society to deploy tools such as the
  Supper backdoor, AnyDesk, and MEGA. They utilize RDP for lateral movement and employ
  the WMI Provider Host to deploy the INC ransomware payload. Microsoft has identified
  their activities as part of a campaign targeting the U.S. health sector. Their operations
  are characterized by financially motivated tactics.
