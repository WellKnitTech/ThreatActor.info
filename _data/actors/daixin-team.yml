description: Daixin is a threat actor group that has been active since at least June
  2022. They primarily target the healthcare and public health sector with ransomware
  attacks, stealing sensitive data and threatening to release it if a ransom is not
  paid. They have successfully targeted various industries, including healthcare,
  aerospace, automotive, and packaged foods. Daixin gains initial access through VPN
  servers and exploits vulnerabilities or uses phishing attacks to obtain credentials.
  They have been responsible for cyberattacks on organizations such as the North Texas
  Municipal Water District and TransForm Shared Service Org, impacting their networks
  and stealing customer and patient information.
