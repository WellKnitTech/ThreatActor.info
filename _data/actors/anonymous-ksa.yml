description: Anonymous KSA is a Saudi hacking group that has executed cyber attacks
  targeting Indian institutions, including a significant breach of UIDAI's data storage
  units, leading to access to sensitive information and system disruption. The group
  claims these actions are in response to India's normalization of ties with Israel
  and its treatment of Palestinians. They have called for support for the Palestinian
  cause and accountability for the damage caused by their operations. The group's
  TTPs include targeting government agencies and leveraging public sentiment to justify
  their actions.
