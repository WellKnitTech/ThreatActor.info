description: 'Dragonfly is a cyber espionage group that has been attributed to Russia''s
  Federal Security Service (FSB) Center 16.(Citation: DOJ Russia Targeting Critical
  Infrastructure March 2022)(Citation: UK GOV FSB Factsheet April 2022) Active since
  at least 2010, Dragonfly has targeted defense and aviation companies, government
  entities, companies related to industrial control systems, and critical infrastructure
  sectors worldwide through supply chain, spearphishing, and drive-by compromise attacks.(Citation:
  Symantec Dragonfly)(Citation: Secureworks IRON LIBERTY July 2019)(Citation: Symantec
  Dragonfly Sept 2017)(Citation: Fortune Dragonfly 2.0 Sept 2017)(Citation: Gigamon
  Berserk Bear October 2021)(Citation: CISA AA20-296A Berserk Bear December 2020)(Citation:
  Symantec Dragonfly 2.0 October 2017)'
